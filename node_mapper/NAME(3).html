<!doctype html>
<html lang="en" style="--white: #FFFFFF;"><head>
  <meta charset="utf-8">
  <title>NAME</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap');
    
    :root {
      --white: #FFFFFF;
      --light-grey:  #d8d8d8;
      --panel-grey: #C2C2C2;
      --shadow-grey: #9E9E9E;
      --near-black: #383838;
      --text-black: #020202;
      --light-yellow: #FFEDB4;
      --main-yellow: #FFD241;
      --shadow-yellow: #DEB555;
      --error-red: #dc2626;
      --font-family: 'Rubik', Arial, Helvetica, sans-serif;
    }
    
    html,body { 
      width:100%;
      height: 100vh;
      margin:0; 
      font-family: var(--font-family); 
      background:var(--white); 
      align-items: center;
      justify-content: center;
    }
    html, body {overscroll-behavior: none;}

    #wrap { display:flex; width:100%; height:100%; overflow:hidden; }

    /* GRAPH AREA */
    #graph-area { position:relative; flex:1; background:var(--white); }
    canvas { width:100%; height:100%; display:block; background:var(--white); }

    /* LOGO */
    #logo {
      position: absolute;
      bottom: 6px;
      right: 22px;
      z-index: 10;
      opacity: 1;
      pointer-events: none;
    }
    
    #logo img {
      height: 55px;
      width: auto;
    }

    /* Legend styles */
    #legend-container {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 96%;
      max-height: 30vh;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      justify-content: center;
      align-items: center;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.95);
      border: 0px solid var(--panel-grey);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 100;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
    }

    #legend-container.collapsed {
      max-height: 0;
      padding: 0 12px;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      font-weight: 500;
      user-select: none;
      line-height: 1.2;
    }

    .legend-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .legend-item.inactive {
      opacity: 0.4;
    }

    .legend-color-box {
      width: 8px;
      height: 8px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    /* Shape Legend Container */
    #shape-legend-container {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 96%;
      max-height: 30vh;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      justify-content: center;
      align-items: center;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.95);
      border: 0px solid var(--panel-grey);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .shape-legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      user-select: none;
      line-height: 1.2;
    }

    .shape-legend-icon {
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
    }

    #legend-toggle {
      display: none;
      position: absolute;
      justify-content: center;
      align-items: center;
      padding: 4px;
      border: 1px solid var(--near-black);
      top: 12px;
      right: 12px;
      height: 20px;
      width: 20px;
      background: var(--white);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      z-index: 101;
      user-select: none;
      transition: all 0.2s;
      color: var(--text-black);
      line-height: 28px; 
    }

    #legend-toggle:hover {
      background: rgba(255, 255, 255, 1);
      background-color: var(--light-yellow);
    }

    #legend-toggle-icon {
      display: flex;
      transition: transform 0.3s ease;
      transform: rotate(90deg);
    }

    #legend-toggle-icon.collapsed {
      transform: rotate(90deg);
    }

    /* Mobile view adjustments */
    @media (max-width: 768px) {
      #legend-toggle {
        display: block;
      }
      
      #legend-container {
        left: auto;
        right: 10px;
        transform: none;
        padding-top: 10px;
        justify-content: flex-start;
      }
      
      #legend-container.collapsed {
        padding-top: 0;
      }
    }

    /* TOP CONTROLS - ZOOM */
    #top-controls {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    #zoom-controls {
      display: flex;
      gap: 8px;
    }
    
    .zoom-btn {
      height: 28px;
      width: 28px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: var(--white);
      color: var(--text-black);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family);
      border: 1px solid var(--near-black);
    }
    
    .zoom-btn:hover {
      background: var(--light-yellow);
    }
    
    #fullscreen-btn {
      height: 28px;
      width: 28px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: var(--white);
      color: var(--text-black);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family);
      border: 1px solid var(--near-black);
    }
    
    #fullscreen-btn:hover {
      background: var(--light-yellow);
    }

    #share-btn {
      height: 28px;
      width: 28px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: var(--white);
      color: var(--text-black);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family);
      border: 1px solid var(--near-black);
    }
    
    #share-btn:hover {
      background: var(--light-yellow);
    }

    #chart-title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-black);
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    #chart-subtitle {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-black);
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    /* INFO PANEL (RIGHT) */
    #info-panel {
      display: none;
      width: clamp(220px, 28vw, 420px);
      min-width: 200px;  
      max-width: 420px;
      height: 100vh;
      background: var(--white);
      color: var(--text-black);
      padding: clamp(8px, 1.2vw, 16px) clamp(10px, 1.5vw, 20px) clamp(8px, 1.2vw, 16px) clamp(8px, 1vw, 12px);
      box-sizing: border-box;
      flex-direction: column;
      border-left: 1px solid var(--white);
      font-size: clamp(12px, 1.1vw, 15px);
      overflow: hidden;
      transition: width 0.3s ease, min-width 0.3s ease, max-width 0.3s ease, padding 0.3s ease;
      position: relative;
    }
    
    #controls { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
      flex-shrink: 0; 
      margin-bottom: 8px;
    }
    #search-box { display: flex; width: 100%; gap: 6px; flex-wrap: wrap; }
    #search-input { 
      flex: 1; 
      min-width: 0;
      padding: 6px 8px; 
      border-radius: 4px; 
      border: 1px solid var(--shadow-grey); 
      background: rgba(255,255,255,0.5); 
      color: var(--text-black);
      font-family: var(--font-family); 
    }
    #search-btn { 
      height: 29px;
      padding: 1px 8px; 
      border-radius: 4px; 
      border: none; 
      cursor: pointer; 
      background: var(--main-yellow); 
      color: var(--text-black);
      font-family: var(--font-family);
      flex-shrink: 0;
      font-size: 18px;
      white-space: nowrap;
    }
    #clear-btn { 
      height: 29px;
      padding: 6px 6px; 
      border-radius: 4px; 
      border: none; 
      cursor: pointer; 
      background: var(--main-yellow); 
      color: var(--text-black);
      font-family: var(--font-family);
      flex-shrink: 0;
      white-space: nowrap;
      font-weight: bold;
    }
    
    #search-btn:hover, #clear-btn:hover {
      background: var(--light-yellow);
    }
    
    /* Hide search buttons in story mode */
    .story-mode-hide {
      display: none !important;
    }

    #suggestions { 
      background: rgba(255,255,255,0.5); 
      border: 1px solid var(--shadow-grey); 
      max-height: 160px; 
      overflow: auto; 
      display: none; 
      padding: 6px; 
      border-radius: 4px; 
    }
    .suggestion { 
      padding: 6px; 
      cursor: pointer; 
      border-bottom: 1px dashed var(--shadow-grey); 
    }
    .suggestion:hover { 
      background: var(--light-yellow); 
    }

    #node-info { 
      margin-top: 0px; 
      margin-bottom: 6px; 
      padding-left: 6px; 
      padding-right: 6px; 
      background: var(--white); 
      border-radius: 6px; 
      flex-shrink: 0;
    }
    #node-title { 
      font-weight: 700; 
      margin-top: 8px;
      font-size: clamp(13px, 1.1vw, 16px);
    }
    .muted { color: var(--shadow-grey); font-weight: 700; }

    #node-links {
      margin-top: 6px;
      flex-shrink: 0;
    }

    #connections-box {
      margin-top: 4px;
      background: var(--white);
      border-radius: 6px;
      padding: 6px;
      overflow: auto;
      border: 1px solid var(--shadow-grey);
      flex: 1;
      min-height: 2;
    }
    .conn-item {
      padding: clamp(4px, 0.5vw, 6px);
      cursor: pointer;
      font-size: clamp(12px, 1vw, 14px);
      color: var(--text-black);
      border-bottom: 1px dashed var(--shadow-grey);
    }
    .conn-item:hover { 
      background: var(--light-yellow); 
    }

    #msg { margin-top: 6px; color: var(--error-red); font-size: 14px; min-height: 18px; }

    /* MOBILE RESPONSIVE - HORIZONTAL BOTTOM PANEL */
    @media (max-width: 700px) {
      #wrap {
        flex-direction: column;
      }
      
      #graph-area {
        flex: 1;
        height: auto;
        max-height: 60vh;
      }
      
      #info-panel {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        height: 40vh;
        padding: 12px;
        border-left: none;
        border-top: 2px solid var(--shadow-grey);
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto auto auto 1fr auto;
        gap: 2px;
      }
      
      /* Row 1: Controls + Story button */
      #controls {
        grid-column: 1 / 2;
        grid-row: 1;
        margin-bottom: 0;
      }
      
      #search-box {
        display: flex;
        gap: 3px;
      }
      
      #search-input {
        flex: 1;
        min-width: 40px;
        font-size: 12px;
        padding: 4px 6px;
      }
      
      #search-btn {
        height: 29px;
        padding: 0px 6px;
        font-size: 16px;
      }
      
      #clear-btn {
        height: 29px;
        padding: 6px 6px;
        font-size: 11px;
      }
      
      #story-btn {
        height: 29px;
        grid-column: 2;
        grid-row: 1;
        width: auto !important;
        margin: 0 !important;
        padding: 6px 6px !important;
        font-size: 11px !important;
        align-self: start;
      }
      
      /* Row 2: Suggestions */
      #suggestions {
        grid-column: 1 / -1;
        grid-row: 2;
      }
      
      /* Row 3: Story view content */
      #view-content {
        grid-column: 1 / -1;
        grid-row: 2;
      }
      
      /* Row 4: Node info (title/description) */
      #node-info {
        grid-column: 1 / -1;
        grid-row: 3;
      }
      
      #node-title {
        font-size: 13px;
        grid-row: 2;
      }
      
      /* Row 5: Node links label */
      #node-links {
        grid-column: 1 / -1;
        grid-row: 4;
      }
      
      /* Row 6: Connections box (flexible/scrollable) */
      #connections-box {
        grid-column: 1 / -1;
        grid-row: 4;
        overflow: auto;
        min-height: 2px;
      }
      
      /* Row 7: Message */
      #msg {
        grid-column: 1 / -1;
        grid-row: 7;
      }
      
      #logo {
        bottom: 12px;
        right: 12px;
      }
      
      #logo img {
        height: 40px;
      }
    }

    /* LOADING OVERLAY */
    #loading-overlay {
      position: fixed;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: rgba(250,250,250,0.9);
      z-index: 99999;
      font-size: 16px;
      color: var(--text-black);
    }
    .spinner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 8px solid var(--shadow-grey);
      border-left-color: var(--main-yellow);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* STORY MODE BUTTONS */
    #story-btn {
      height: 29px;
      padding: 6px 6px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--main-yellow);
      color: black;
      font-family: var(--font-family);
      font-weight: bold;
      flex-shrink: 0;
      white-space: nowrap;
      margin-bottom: 8px;
      width: 100%;
      display: none;
      animation: outlinePulse 2s ease-in-out infinite;
    }
    
    @media (max-width: 768px) {
      #story-btn {
        width: auto;
      }
    }

    #story-btn:hover {
      background: var(--light-yellow);
    }

    #story-nav-container {
      display: none;
      gap: 4px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    #story-nav-container.active {
      display: flex;
    }

    .story-nav-btn {
      padding: 6px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--main-yellow);
      color: black;
      font-family: var(--font-family);
      font-weight: bold;
      font-size: 13px;
      white-space: nowrap;
      flex: 1;
    }

    .story-nav-btn:hover:not(:disabled) {
      background: var(--light-yellow);
    }

    .story-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .exit-story-nav-btn {
      padding: 6px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--panel-grey);
      color: black;
      font-family: var(--font-family);
      font-weight: bold;
      font-size: 13px;
      white-space: nowrap;
      flex: 1;
    }

    .exit-story-nav-btn:hover:not(:disabled) {
      background: var(--light-grey);
    }

    .exit-story-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @keyframes outlinePulse {
      0%, 100% { 
        outline: 0px solid var(--main-yellow);
        outline-offset: 0px;
        opacity: 1;
      }
      50% { 
        outline: 0px solid var(--light-yellow);
        outline-offset: 0px;
        opacity: 0.8;
      }
    }

    /* ENTITY MODAL IN STORY MODE */
    #entity-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--panel-grey);
      z-index: 1000;
      display: none;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
    }

    #entity-modal.active {
      display: flex;
    }

    #entity-modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--error-red);
      color: white;
      font-family: var(--font-family);
      font-weight: bold;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }

    #entity-modal-close:hover {
      background: #b91c1c;
    }

    #entity-modal-content {
      flex: 1;
      overflow: auto;
      margin-top: 8px;
    }

    /* VIEW CONTENT STYLES */
    #view-content {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #view-content.active {
      display: flex;
    }
    #view-content {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #view-content.active {
      display: block;
    }

    .view-title {
      font-size: 28px;
      font-weight: 700;
      margin-top: 12px;
      margin-bottom: 12px;
      color: var(--text-black);
    }

    .view-progress {
      font-size: 13px;
      font-weight: 700;
      color: var(--shadow-grey);
      margin-top: 4px;
    }

    .view-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 12px;
      object-fit: contain;
    }

    .view-text {
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
      min-height: 0;
    }

    /* Story mode MOBILE adjustments */
    @media (max-width: 768px) {
      .view-title {
        font-size: 20px !important;
        margin-top: 6px !important;
        margin-bottom: 6px !important;
      }
      
      .view-text {
        font-size: 14px !important;
        line-height: 1.4 !important;
        padding-bottom: 6px !important;
      }
      
      .view-image {
        display: none !important;
      }
      
      #story-nav-container {
        margin-bottom: 6px !important;
        gap: 3px !important;
      }
      
      .story-nav-btn {
        padding: 6px 7px !important;
        font-size: 11px !important;
      }

      .exit-story-nav-btn {
        padding: 6px 7px !important;
        font-size: 11px !important;
      }
    }
  </style>

  <div id="wrap">
    <div id="graph-area">

  /************************************************************************

  function resizeCanvas() {
    // Clear inline styles to let CSS percentage sizing work
    canvas.style.width = '';
    canvas.style.height = '';
    
    // Force reflow to get actual available space
    void canvas.offsetHeight;
    
    const rect = canvas.getBoundingClientRect();
    const hiResScale = devicePixelRatio * 1.5;
    canvas.width  = Math.max(600, Math.floor(rect.width  * hiResScale));
    canvas.height = Math.max(400, Math.floor(rect.height * hiResScale));
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  /************************************************************************
   * NODE SIZING
   ************************************************************************/
  function updateNodeSizes() {
    if (nodes.length === 0) return;
    
    const mode = formattingSettings.nodeSizeMode;
    
    if (mode === 'custom') {
      // Fixed size for all nodes
      nodes.forEach(n => {
        n.baseR = formattingSettings.nodeSize;
        n.r = n.baseR;
      });
    } else {
      // Compute the metric for each node based on mode
      let metricValues = [];
      nodes.forEach(n => {
        let val = 0;
        if (mode === 'connections') {
          val = (adjacency.get(n.id) || new Set()).size;
        } else if (mode === 'connectionsOutTotal') {
          val = connectionOutTotals.get(n.id) || 0;
        } else if (mode === 'connectionsInTotal') {
          val = connectionInTotals.get(n.id) || 0;
        }
        n._sizeMetric = val;
        metricValues.push(val);
      });
      
      const maxVal = Math.max(...metricValues, 1);
      const minVal = Math.min(...metricValues, 0);
      
      nodes.forEach(n => {
        const normalized = maxVal > minVal 
          ? (n._sizeMetric - minVal) / (maxVal - minVal)
          : 0.5;
        n.baseR = formattingSettings.minNodeSize + normalized * (formattingSettings.maxNodeSize - formattingSettings.minNodeSize);
        n.r = n.baseR;
      });
    }
  }

  /************************************************************************
   * VALUE FORMATTING
   ************************************************************************/
  function formatValue(value, prefix) {
    if (value == null || isNaN(value)) return '';
    const absVal = Math.abs(value);
    let num, suffix;
    if (absVal >= 1e9) { num = value / 1e9; suffix = 'B'; }
    else if (absVal >= 1e6) { num = value / 1e6; suffix = 'M'; }
    else if (absVal >= 1e3) { num = value / 1e3; suffix = 'k'; }
    else { return (prefix || '') + String(Math.round(value)); }
    let str = num.toFixed(1);
    if (str.endsWith('.0')) str = str.slice(0, -2);
    return (prefix || '') + str + suffix;
  }

  /************************************************************************
   * PHYSICS STRENGTH MAPPING
   ************************************************************************/
  function getForceValue(strengthLabel, type) {
    const label = (strengthLabel || 'Moderately').trim();
    const map = {
      // linkStrength: how rigidly connected nodes pull together (0-1)
      attract:      { 'Barely at all': 0.05, 'A bit': 0.15, 'Moderately': 0.3,  'A lot': 0.5,  'Strongly': 0.7 },
      // linkDistance: target distance in px between connected nodes
      linkDistance:  { 'Barely at all': 800,  'A bit': 650,  'Moderately': 500,   'A lot': 300,  'Strongly': 150 },
      // chargeStrength: repulsion between ALL node pairs (negative = repel)
      repel:        { 'Barely at all': -50,   'A bit': -150, 'Moderately': -300,  'A lot': -600, 'Strongly': -1000 },
      // collisionPadding: extra px around node radius for collision avoidance
      padding:      { 'Barely at all': 10,     'A bit': 20,   'Moderately': 40,    'A lot': 80,   'Strongly': 160 }
    };
    return map[type]?.[label] ?? map[type]?.['Moderately'];
  }

  /************************************************************************
   * AUTO-LOAD DATA FROM GOOGLE SHEETS
   ************************************************************************/
  async function autoLoadData() {
    if (!CONFIG.entitiesUrl || !CONFIG.connectionsUrl) {
      loadingText.textContent = 'Set entitiesUrl and connectionsUrl in CONFIG.';
      return;
    }

    loadingOverlay.style.display = 'flex';
    loadingText.textContent = 'Loading data...';
    
    try {
      // Fetch entities and connections (required)
      const [entitiesResponse, connectionsResponse] = await Promise.all([
        fetch(CONFIG.entitiesUrl),
        fetch(CONFIG.connectionsUrl)
      ]);
      
      if (!entitiesResponse.ok || !connectionsResponse.ok) {
        throw new Error('Could not load required sheets (Entities and Connections)');
      }
      
      const entitiesText = await entitiesResponse.text();
      const connectionsText = await connectionsResponse.text();
      
      const entitiesData = Papa.parse(entitiesText, { header: true, skipEmptyLines: true }).data;
      const connectionsData = Papa.parse(connectionsText, { header: true, skipEmptyLines: true }).data;

      // NOTE: formatting is no longer read from a sheet — it is set via the
      // in-tool Options menu and stored in the saved HTML file.

      // Try to load views (optional)
      if (CONFIG.viewsUrl) {
        try {
          const viewsResponse = await fetch(CONFIG.viewsUrl);
          if (viewsResponse.ok) {
            const viewsText = await viewsResponse.text();
            const viewsDataParsed = Papa.parse(viewsText, { header: true, skipEmptyLines: true }).data;
            parseViewsData(viewsDataParsed);
          }
        } catch (e) {
          // Views sheet is optional, ignore errors
        }
      }
      
      loadSession(entitiesData, connectionsData);
      
    } catch (err) {
      loadingText.textContent = 'Error: ' + err.message;
      setTimeout(() => {
        // Update story button visibility
    updateStoryButtonVisibility();

    loadingOverlay.style.display = 'none';
      }, 3000);
    }
  }

  function parseViewsData(data) {
    if (!data || data.length === 0) return;
    
    // Clean headers
    data.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });

    viewsData = data.map(r => ({
      id: String(r['View ID'] || '').trim(),
      title: String(r['View Title'] || '').trim(),
      text: String(r['View Text'] || '').trim(),
      image: String(r['View Image'] || '').trim()
    })).filter(v => v.id);

    // Build views by ID map
    viewsById.clear();
    viewsData.forEach(v => {
      viewsById.set(v.id, v);
    });

    // Sort view IDs numerically
    sortedViewIds = viewsData.map(v => v.id).sort((a, b) => {
      const numA = parseInt(a);
      const numB = parseInt(b);
      if (!isNaN(numA) && !isNaN(numB)) {
        return numA - numB;
      }
      return a.localeCompare(b);
    });
  }

  /************************************************************************
   * LOAD SESSION
   ************************************************************************/
  function loadSession(entitiesData, connectionsData) {
    // Clean headers
    entitiesData.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });
    
    connectionsData.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });

    // Check if Entities.csv has Views column
    if (entitiesData.length > 0) {
      hasViewsColumn = 'Views' in entitiesData[0];
    }

    // Create nodes
    nodes = entitiesData.map((d, i) => createNodeFromData(d, i));
    nodeById = new Map(nodes.map(n => [n.id, n]));

    // Build entity views map if we have views
    if (hasViewsColumn) {
      buildEntityViewsMap(entitiesData);
      buildViewEntitiesCache();
    }

    // Create links
    processLinksData(connectionsData);

    // Build adjacency and compute connection value totals
    buildAdjacency();
    computeConnectionValueTotals();

    // Apply any manually-saved node positions (overrides sheet X/Y)
    applySavedPositions();

    nameIndex = nodes.map(n => n.name);

    // Calculate node sizes
    updateNodeSizes();

    // Determine layout: if most nodes have grid coords, use static grid;
    // otherwise let physics handle positioning
    const gridCount = nodes.filter(n => n.hasGridCoords).length;
    const isStaticLayout = gridCount > nodes.length * 0.5;

    // Compute initial grid layout (positions grid nodes, scales radii)
    computeGridLayout();

    // Load images
    loadAllImages();
    
    // Load background image if enabled
    loadBackgroundImage();

    // Preload all story mode view images immediately
    preloadStoryImages();

    // Apply physics settings from formatting
    CONFIG.force.linkStrength = getForceValue(formattingSettings.attractStrength, 'attract');
    CONFIG.force.linkDistance = getForceValue(formattingSettings.attractStrength, 'linkDistance');
    CONFIG.force.chargeStrength = getForceValue(formattingSettings.repelStrength, 'repel');
    CONFIG.force.collisionPadding = getForceValue(formattingSettings.paddingStrength, 'padding');

    // Start physics (for non-grid nodes)
    updatePhysics(isStaticLayout);

    // Update story button visibility
    updateStoryButtonVisibility();
    
    // Update UI elements from formatting
    updateLogoFromSettings();
    updateTitleFromSettings();
    updateShareFromSettings();
    updateInfoPanelVisibility();

    // Update legend after nodes are loaded
    updateCategoryColors();
    updateLegend();
    updateShapeLegend();
    
    // FORCE legend update again to be absolutely certain
    setTimeout(() => {
      updateCategoryColors();
      updateLegend();
      updateShapeLegend();
      computeGridLayout();
      render();
    }, 150);

    loadingOverlay.style.display = 'none';
  }

  /************************************************************************
   * GRID LAYOUT — maps grid coordinates to canvas pixels
   * Grid is 60×60: x ∈ [-30,30], y ∈ [-30,30], (0,0) = centre
   * Positive Y = up (canvas Y is inverted)
   ************************************************************************/
  function computeGridLayout() {
    if (nodes.length === 0) return;

    const cw = canvas.width / devicePixelRatio;
    const ch = canvas.height / devicePixelRatio;
    const legendPad = getLegendPadding();
    const pad = CONFIG.gridPadding;

    const availW = cw - pad * 2;
    const availH = ch - pad * 2 - legendPad;

    // One grid unit = gridScale pixels; fit 60 units into the smaller axis
    gridScale = Math.min(availW, availH) / CONFIG.gridUnits;

    // UI scale: how big things look relative to a ~900px-wide reference
    uiScale = Math.min(availW, availH) / CONFIG.baseChartWidth;

    const centerX = cw / 2;
    const centerY = pad + legendPad + availH / 2;
    gridCenterX = centerX;
    gridCenterY = centerY;

    nodes.forEach(n => {
      // Only reposition nodes that have grid coordinates
      if (n.hasGridCoords) {
        const px = centerX + n.gridX * gridScale;
        const py = centerY - n.gridY * gridScale;   // flip Y
        n.x = px;
        n.y = py;
        n.fx = px;
        n.fy = py;
      }

      // Scale radius for ALL nodes (grid + physics)
      n.r = (n.baseR || formattingSettings.minNodeSize)
            * formattingSettings.sizeScale
            * uiScale;
    });

    // Update collision force if simulation is active
    if (simulation && simulation.force('collision')) {
      simulation.force('collision').radius(d => d.r + CONFIG.force.collisionPadding);
    }
  }

  /************************************************************************
   * GRID <-> PIXEL HELPERS + POSITION PERSISTENCE
   ************************************************************************/
  function gridToPixel(gx, gy) {
    return { x: gridCenterX + gx * gridScale, y: gridCenterY - gy * gridScale };
  }
  function pixelToGrid(px, py) {
    if (!gridScale) return { gx: 0, gy: 0 };
    return { gx: (px - gridCenterX) / gridScale, gy: (gridCenterY - py) / gridScale };
  }

  // Freeze every currently-unfixed node at its present position (mode 'freezeAfterInitial')
  function freezeAllNodes() {
    nodes.forEach(n => {
      if (!n.hasGridCoords) {
        const g = pixelToGrid(n.x, n.y);
        n.gridX = g.gx;
        n.gridY = g.gy;
        n.hasGridCoords = true;
        n.fx = n.x;
        n.fy = n.y;
      }
    });
    if (simulation) simulation.stop();
  }

  // Apply manually-saved grid positions (overrides any X/Y from the sheet)
  function applySavedPositions() {
    if (!savedPositions || savedPositions.size === 0) return;
    nodes.forEach(n => {
      if (savedPositions.has(n.name)) {
        const p = savedPositions.get(n.name);
        n.gridX = p.x;
        n.gridY = p.y;
        n.hasGridCoords = true;
      }
    });
  }

  function rebuildShapeCategoryMap() {
    shapeCategoryMap.clear();
    shapeLegendEntries.forEach(e => {
      if (e.enabled && e.label) shapeCategoryMap.set(e.label, e.shape);
    });
  }

  function sanitizeFilename(name) {
    return (String(name || 'chart').trim() || 'chart')
      .replace(/[^a-z0-9\-_ ]/gi, '')
      .replace(/\s+/g, '-')
      .slice(0, 80) || 'chart';
  }

  // Apply a parsed saved-chart data object to the live viewer state.
  // Used by both the standalone boot path and the tool's "load saved chart".
  function applyChartData(data) {
    if (!data) return;
    if (data.settings) Object.assign(formattingSettings, data.settings);
    if (Array.isArray(data.colorLegend)) colorLegendEntries = data.colorLegend;
    if (Array.isArray(data.shapeLegend)) { shapeLegendEntries = data.shapeLegend; rebuildShapeCategoryMap(); }
    if (data.physicsMode) physicsMode = data.physicsMode;
    if (data.title) { chartName = data.title; document.title = data.title; }
    if (data.urls) {
      CONFIG.entitiesUrl = data.urls.entities || '';
      CONFIG.connectionsUrl = data.urls.connections || '';
      CONFIG.viewsUrl = data.urls.views || '';
    }
    CONFIG.formattingUrl = ''; // formatting now lives in settings, never a sheet
    if (data.positions) {
      savedPositions = new Map(Object.entries(data.positions).map(([k, v]) => [k, { x: v.x, y: v.y }]));
    }
    if (formattingSettings.backgroundColor) {
      document.documentElement.style.setProperty('--white', formattingSettings.backgroundColor);
    }
  }

    function createNodeFromData(d, i) {
        const id = d['Entity Name'] ? String(d['Entity Name']).trim() : `__P_${i}`;
        
        const show = d['Show'] === undefined ? true : (String(d['Show']).toUpperCase() === 'TRUE' || d['Show'] === '1' || d['Show'] === true);

        // Force all nodes to start without grid coordinates. 
        // Ignores the spreadsheet entirely.
        const hasGridCoords = false;
        const gridX = 0;
        const gridY = 0;

        const cw = canvas.width / devicePixelRatio;
        const ch = canvas.height / devicePixelRatio;
        const x = Math.random() * cw;
        const y = Math.random() * ch;
        
        return {
        id, 
        name: id, 
        raw: d, 
        show,
        hasGridCoords,
        gridX,
        gridY,
        image: d['Image'] ? d['Image'].trim() : null, 
        imageBitmap: null,
        x, 
        y,
        fx: null,
        fy: null,
        vx: 0, 
        vy: 0, 
        baseR: formattingSettings.minNodeSize,
        r: formattingSettings.minNodeSize
        };
    }

  function processLinksData(connectionsData) {
    _lineSizeRange = null; // Reset line sizing cache
    const tmpLinks = connectionsData.map(r => {
      const rawValue = (r['Value']||'').toString().trim().replace(/[, ]/g, '');
      const parsedValue = parseFloat(rawValue);
      return {
        sourceName: (r['A']||'').toString().trim(),
        targetName: (r['B']||'').toString().trim(),
        connectionValue: !isNaN(parsedValue) ? parsedValue : null,
        source: (r['Source']||'').toString().trim(),
        note: (r['Note']||'').toString().trim(),
        text: (r['Text']||'').toString().trim()
      };
    }).filter(l => l.sourceName && l.targetName);

    // Add missing nodes from links
    tmpLinks.forEach(l => {
      if (!nodeById.has(l.sourceName)) {
        const n = { 
          id: l.sourceName, 
          name: l.sourceName, 
          raw: {}, 
          show: true,
          hasGridCoords: false,
          gridX: 0,
          gridY: 0,
          image: null, 
          imageBitmap: null, 
          x: Math.random() * (canvas.width/(devicePixelRatio)), 
          y: Math.random() * (canvas.height/(devicePixelRatio)), 
          fx: null,
          fy: null,
          vx: 0, 
          vy: 0, 
          baseR: formattingSettings.minNodeSize,
          r: formattingSettings.minNodeSize
        };
        nodes.push(n);
        nodeById.set(n.id, n);
      }
      if (!nodeById.has(l.targetName)) {
        const n = { 
          id: l.targetName, 
          name: l.targetName, 
          raw: {}, 
          show: true,
          hasGridCoords: false,
          gridX: 0,
          gridY: 0,
          image: null, 
          imageBitmap: null, 
          x: Math.random() * (canvas.width/(devicePixelRatio)), 
          y: Math.random() * (canvas.height/(devicePixelRatio)), 
          fx: null,
          fy: null,
          vx: 0, 
          vy: 0, 
          baseR: formattingSettings.minNodeSize,
          r: formattingSettings.minNodeSize
        };
        nodes.push(n);
        nodeById.set(n.id, n);
      }
    });

    // Build links with references to node objects
    links = tmpLinks.map(l => ({
      source: nodeById.get(l.sourceName),
      target: nodeById.get(l.targetName),
      connectionValue: l.connectionValue,
      sourceUrl: l.source,
      note: l.note,
      text: l.text
    })).filter(l => l.source && l.target);
  }

  function buildEntityViewsMap(entitiesData) {
    entityViewsMap.clear();
    entityHighlightsMap.clear();
    
    entitiesData.forEach(row => {
      const entityName = String(row['Entity Name'] || '').trim();
      const viewsStr = String(row['Views'] || '').trim();
      const highlightStr = String(row['View Highlight'] || '').trim();
      
      if (entityName && viewsStr) {
        const viewIds = viewsStr.split(',').map(id => id.trim()).filter(id => id);
        entityViewsMap.set(entityName, viewIds);
      }
      
      if (entityName && highlightStr) {
        const highlightViewIds = highlightStr.split(',').map(id => id.trim()).filter(id => id);
        entityHighlightsMap.set(entityName, new Set(highlightViewIds));
      }
    });
  }

  function buildViewEntitiesCache() {
    viewEntitiesCache.clear();
    
    // Initialize cache for all views
    sortedViewIds.forEach(viewId => {
      viewEntitiesCache.set(viewId, []);
    });

    // Populate cache
    entityViewsMap.forEach((viewIds, entityId) => {
      viewIds.forEach(viewId => {
        // Only add if view exists in viewsById
        if (viewsById.has(viewId)) {
          const entityList = viewEntitiesCache.get(viewId);
          if (entityList) {
            entityList.push(entityId);
          }
        }
      });
    });
  }

  function updateStoryButtonVisibility() {
    const shouldShow = viewsData.length > 0 && hasViewsColumn;
    storyBtn.style.display = shouldShow ? 'block' : 'none';
  }

  function buildAdjacency() {
    adjacency.clear();
    connectionSources.clear();
    connectionTexts.clear();
    
    links.forEach(l => {
      const sId = l.source.id;
      const tId = l.target.id;
      
      if (!adjacency.has(sId)) adjacency.set(sId, new Set());
      if (!adjacency.has(tId)) adjacency.set(tId, new Set());
      adjacency.get(sId).add(tId);
      adjacency.get(tId).add(sId);
      
      // Track source URLs for connections
      if (l.sourceUrl) {
        if (!connectionSources.has(sId)) connectionSources.set(sId, new Map());
        if (!connectionSources.has(tId)) connectionSources.set(tId, new Map());
        connectionSources.get(sId).set(tId, l.sourceUrl);
        connectionSources.get(tId).set(sId, l.sourceUrl);
      }
      
      // Track text descriptions for connections
      if (l.text) {
        if (!connectionTexts.has(sId)) connectionTexts.set(sId, new Map());
        if (!connectionTexts.has(tId)) connectionTexts.set(tId, new Map());
        connectionTexts.get(sId).set(tId, l.text);
        connectionTexts.get(tId).set(sId, l.text);
      }
    });
  }

  function computeConnectionValueTotals() {
    connectionOutTotals.clear();
    connectionInTotals.clear();
    links.forEach(l => {
      const sId = l.source.id;
      const tId = l.target.id;
      const val = l.connectionValue;
      if (val != null && !isNaN(val)) {
        connectionOutTotals.set(sId, (connectionOutTotals.get(sId) || 0) + val);
        connectionInTotals.set(tId, (connectionInTotals.get(tId) || 0) + val);
      }
    });
  }

  function loadBackgroundImage() {
    if (formattingSettings.backgroundImageEnabled && formattingSettings.backgroundImageUrl) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { backgroundImageObj = img; render(); };
      img.onerror = () => { backgroundImageObj = null; };
      img.src = formattingSettings.backgroundImageUrl;
    } else {
      backgroundImageObj = null;
    }
  }

  function updateLogoFromSettings() {
    const logoEl = document.getElementById('logo');
    const logoImg = logoEl ? logoEl.querySelector('img') : null;
    if (!formattingSettings.logoEnabled) {
      if (logoEl) logoEl.style.display = 'none';
    } else {
      if (logoEl) logoEl.style.display = 'block';
      if (logoImg && formattingSettings.logoUrl) logoImg.src = formattingSettings.logoUrl;
    }

  function updateTitleFromSettings() {
    const titleEl = document.getElementById('chart-title');
    const subtitleEl = document.getElementById('chart-subtitle');
    if (titleEl) {
      titleEl.style.display = formattingSettings.chartTitleEnabled && formattingSettings.chartTitle ? 'block' : 'none';
      titleEl.textContent = formattingSettings.chartTitle || '';
    }
    if (subtitleEl) {
      subtitleEl.style.display = formattingSettings.chartSubtitleEnabled && formattingSettings.chartSubtitle ? 'block' : 'none';
      subtitleEl.textContent = formattingSettings.chartSubtitle || '';
    }

  function updateShareFromSettings() {
    const shareBtn = document.getElementById('share-btn');
    if (shareBtn) {
      shareBtn.style.display = formattingSettings.sharingEnabled ? 'flex' : 'none';
    }
  }

  function updateInfoPanelVisibility() {
    const panel = document.getElementById('info-panel');
    if (!panel) return;
    if (formattingSettings.infoPanelOn) {
      const isMobile = window.matchMedia('(max-width: 700px)').matches;
      panel.style.display = isMobile ? 'grid' : 'flex';
    } else {
      panel.style.display = 'none';
    }
    setTimeout(() => {
      resizeCanvas();
