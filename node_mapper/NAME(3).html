  /************************************************************************
   * STORY MODE
   ************************************************************************/
  function enterStoryMode() {
    if (sortedViewIds.length === 0) return;
    
    isStoryMode = true;
    currentViewIndex = 0;
    
    // Clear selection
    selectedNode = null;
    clearInfoPanel();
    
    // Hide normal UI elements
    storyBtn.style.display = 'none';
    nodeInfo.style.display = 'none';
    document.getElementById('node-links').style.display = 'none';
    connectionsBox.style.display = 'none';
    
    // Hide search controls and clear button in story mode
    document.getElementById('controls').classList.add('story-mode-hide');
    clearBtn.classList.add('story-mode-hide');
    
    // Show story UI elements
    storyNavContainer.classList.add('active');
    viewContent.classList.add('active');
    
    // Display current view
    updateStoryModeUI();
    
    // Animate pan & zoom to first view's nodes
    animateToViewNodes();
  }

  function exitStoryMode() {
    isStoryMode = false;
    
    // Clear selection
    selectedNode = null;
    hideEntityModal();
    
    // Reset zoom and pan
    zoomLevel = 1.0;
    panX = 0;
    panY = 0;
    
    // Show normal UI elements
    updateStoryButtonVisibility();
    nodeInfo.style.display = 'block';
    document.getElementById('node-links').style.display = 'block';
    connectionsBox.style.display = 'block';
    
    // Show search controls and clear button when exiting story mode
    document.getElementById('controls').classList.remove('story-mode-hide');
    clearBtn.classList.remove('story-mode-hide');
    
    // Hide story UI elements
    storyNavContainer.classList.remove('active');
    viewContent.classList.remove('active');
    
    // Clear info panel
    clearInfoPanel();
    render();
  }

  function navigateView(direction) {
    if (direction === 'prev' && currentViewIndex > 0) {
      currentViewIndex--;
    } else if (direction === 'next' && currentViewIndex < sortedViewIds.length - 1) {
      currentViewIndex++;
    }
    
    // Clear selection and hide modal when navigating
    selectedNode = null;
    hideEntityModal();
    
    updateStoryModeUI();
    
    // Animate pan & zoom to focus on current view nodes
    animateToViewNodes();
  }
  
  function animateToViewNodes() {
    const viewId = sortedViewIds[currentViewIndex];
    const viewEntities = new Set(viewEntitiesCache.get(viewId) || []);
    
    // Filter nodes in current view
    const viewNodes = nodes.filter(n => viewEntities.has(n.id));
    
    if (viewNodes.length === 0) {
      render();
      return;
    }
    
    // Calculate bounding box of view nodes including their radii
    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    
    viewNodes.forEach(n => {
      const radius = n.r || 15; // Use actual node radius
      minX = Math.min(minX, n.x - radius);
      maxX = Math.max(maxX, n.x + radius);
      minY = Math.min(minY, n.y - radius);
      maxY = Math.max(maxY, n.y + radius);
    });
    
    const width = maxX - minX;
    const height = maxY - minY;
    const dataCenterX = (minX + maxX) / 2;
    const dataCenterY = (minY + maxY) / 2;
    
    // Calculate target zoom to fit all nodes with padding
    const canvasWidth = canvas.width / devicePixelRatio;
    const canvasHeight = canvas.height / devicePixelRatio;
    const canvasCenterX = canvasWidth / 2;
    
    // In Story Mode, account for legend space at top
    const legendSpace = 50; // Legend height + margin
    const effectiveHeight = canvasHeight - legendSpace;
    const canvasCenterY = legendSpace + (effectiveHeight / 2); // Shift center down
    
    const padding = 70; // padding in pixels
    
    const targetZoomX = width > 0 ? (canvasWidth - padding * 2) / width : 1.5;
    const targetZoomY = height > 0 ? (effectiveHeight - padding * 2) / height : 1.5;
    let targetZoom = Math.min(targetZoomX, targetZoomY);
    
    // Clamp zoom to configured limits
    targetZoom = Math.max(CONFIG.zoomMin, Math.min(CONFIG.zoomMax, targetZoom));
    
    // Calculate target pan to center the nodes
    // Based on the transform: screen = (data - canvasCenter) * zoom + pan + canvasCenter
    // To center data at canvasCenter: pan = -(data - canvasCenter) * zoom
    const targetPanX = -(dataCenterX - canvasCenterX) * targetZoom;
    const targetPanY = -(dataCenterY - canvasCenterY) * targetZoom;
    
    // Store starting values
    const startZoom = zoomLevel;
    const startPanX = panX;
    const startPanY = panY;
    
    // Animation parameters
    const duration = 600; // milliseconds
    const startTime = Date.now();
    
    function animate() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      
      // Ease-in-out function for smooth animation
      const eased = progress < 0.5 
        ? 2 * progress * progress 
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;
      
      // Interpolate zoom and pan
      zoomLevel = startZoom + (targetZoom - startZoom) * eased;
      panX = startPanX + (targetPanX - startPanX) * eased;
      panY = startPanY + (targetPanY - startPanY) * eased;
      
      render();
      
      if (progress < 1) {
        requestAnimationFrame(animate);
      }
    }
    
    animate();
  }

  function updateStoryModeUI() {
    const viewId = sortedViewIds[currentViewIndex];
    const view = viewsById.get(viewId);
    
    if (!view) return;
    
    // Update progress
    viewProgress.textContent = `Page ${currentViewIndex + 1} of ${sortedViewIds.length}`;
    
    // Update title
    viewTitle.textContent = view.title;
    
    // Update image
    if (view.image) {
      viewImage.src = view.image;
      viewImage.style.display = 'block';
    } else {
      viewImage.style.display = 'none';
    }
    
    // Update text
    viewText.innerHTML = processHtmlLinks(view.text);
    
    // Update navigation buttons
    storyPrevBtn.disabled = currentViewIndex === 0;
    storyNextBtn.disabled = currentViewIndex === sortedViewIds.length - 1;
  }

  function showEntityModal(node) {
    entityModal.classList.add('active');
    populateEntityModal(node);
  }

  function hideEntityModal() {
    entityModal.classList.remove('active');
    selectedNode = null;
  }

  function populateEntityModal(d) {
    const desc = (d.raw && (d.raw['Description'] || '')) || '';
    const colorCat = (d.raw && (d.raw['Color Legend Category'] || '')) || '';

    // Build category/value summary for modal
    let catHtml = '';
    if (formattingSettings.showColorLegendCategoryName && colorCat) {
      const title = formattingSettings.colorLegendCategoryTitle || 'Category';
      catHtml = `<div style="font-size: 16px; font-weight: bold; margin-top: 6px;">${title}: ${colorCat}</div>`;
    }
    
    let valHtml = '';
    if (formattingSettings.showTotalInValue) {
      const totalIn = connectionInTotals.get(d.id) || 0;
      if (totalIn > 0) valHtml += `<div style="font-size:14px;margin-top:4px;"><b>${formattingSettings.totalInTitle}:</b> ${formatValue(totalIn, formattingSettings.connectionValuePrefix)}</div>`;
    }
    if (formattingSettings.showTotalOutValue) {
      const totalOut = connectionOutTotals.get(d.id) || 0;
      if (totalOut > 0) valHtml += `<div style="font-size:14px;margin-top:4px;"><b>${formattingSettings.totalOutTitle}:</b> ${formatValue(totalOut, formattingSettings.connectionValuePrefix)}</div>`;
    }

    entityModalTitle.html(`
      <div style="display:flex; align-items:center; gap:8px; font-size:24px; font-weight:700;">
        <span>${d.name}</span>
        ${d.image ? `<img src="${d.image}" style="width:40px; height:40px; object-fit:cover; border-radius:50%;">` : ''}
      </div>
      ${catHtml}
      ${valHtml}
      ${desc ? `<div style="font-size: 14px; font-weight: normal; max-height: 350px; overflow-y: auto; margin-top: 6px;">${processHtmlLinks(desc.replace(/\n/g, '<br>'))}</div>` : ''}

    `);

    // Get current view's entities for filtering connections
    const currentViewId = sortedViewIds[currentViewIndex];
    const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);

    const conns = Array.from(adjacency.get(d.id) || []).slice();
    
    // Filter connections to only show those in current view
    const filteredConns = conns.filter(name => currentViewEntities.has(name));
    
    filteredConns.sort((a,b) => a.localeCompare(b, undefined, {sensitivity:'base'}));
    entityModalConnections.innerHTML = '';
    
    if (filteredConns.length === 0) {
      entityModalConnections.innerHTML = '<div class="muted" style="margin-top: 8px;">No connections in this view</div>';
      return;
    }
    
    const connBox = document.createElement('div');
    connBox.style.marginTop = '8px';
    connBox.style.background = 'var(--light-grey)';
    connBox.style.borderRadius = '6px';
    connBox.style.padding = '6px';
    connBox.style.border = '1px solid var(--shadow-grey)';
    connBox.style.maxHeight = '300px';
    connBox.style.overflow = 'auto';
    
    const frag = document.createDocumentFragment();
    const nodeSourceMap = connectionSources.get(d.id);
    const nodeTextsMap = connectionTexts.get(d.id);
    
    filteredConns.forEach(name => {
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.style.display = 'flex';
      item.style.alignItems = 'center';
      item.style.justifyContent = 'space-between';
      item.style.gap = '8px';
      
      const nameSpan = document.createElement('span');
      // Display the text description if available, otherwise fall back to node name
      const textDesc = nodeTextsMap ? nodeTextsMap.get(name) : null;
      nameSpan.innerHTML = processHtmlLinks(textDesc || name);
      nameSpan.style.flex = '1';
      nameSpan.style.cursor = 'pointer';
      nameSpan.addEventListener('click', () => {
        const targetNode = nodeById.get(name);
        if (targetNode) {
          selectedNode = targetNode;
          populateEntityModal(targetNode);
          render();
        }
      });
      item.appendChild(nameSpan);
      
      const sourceUrl = nodeSourceMap ? nodeSourceMap.get(name) : null;
      if (sourceUrl) {
        const sourceIcon = document.createElement('a');
        sourceIcon.href = normalizeUrl(sourceUrl) || '#';
        sourceIcon.target = '_blank';
        sourceIcon.rel = 'noopener';
        sourceIcon.innerHTML = '➜]';
        sourceIcon.style.fontSize = '16px';
        sourceIcon.style.textDecoration = 'none';
        sourceIcon.style.cursor = 'pointer';
        sourceIcon.style.flexShrink = '0';
        sourceIcon.title = 'Source';
        sourceIcon.addEventListener('click', (e) => {
          e.stopPropagation();
        });
        item.appendChild(sourceIcon);
      }
      
      
      // Add hover handlers to highlight connection in chart
      item.addEventListener('mouseenter', () => {
        hoveredConnection = { source: d.id, target: name };
        render();
      });
      item.addEventListener('mouseleave', () => {
        hoveredConnection = null;
        render();
      });
      frag.appendChild(item);
    });
    
    connBox.appendChild(frag);
    entityModalConnections.appendChild(connBox);
  }

  /************************************************************************
   * IMAGE LOADING
   ************************************************************************/
  function loadAllImages() {
    const imgNodes = nodes.filter(n => n.image && CONFIG.showImages);
    Promise.allSettled(imgNodes.map(n => loadImage(n))).then(() => render());
  }

  function loadImage(node) {
    return new Promise(resolve => {
      // Request a CORS-clean image FIRST. Drawing a non-CORS image onto the
      // canvas taints it and permanently blocks toDataURL()/PNG export, so we
      // only fall back to a plain (tainting) load if the host refuses CORS.
      const corsImg = new Image();
      corsImg.crossOrigin = 'anonymous';
      corsImg.onload = () => {
        node.imageBitmap = corsImg;
        resolve();
      };
      corsImg.onerror = () => {
        // Host didn't allow cross-origin use. Load normally so the image still
        // displays on screen (note: this taints the canvas, disabling PNG export).
        const plainImg = new Image();
        plainImg.onload = () => { node.imageBitmap = plainImg; resolve(); };
        plainImg.onerror = () => { node.imageBitmap = null; resolve(); };
        plainImg.src = node.image;
      };
      corsImg.src = node.image;
    });
  }

  /************************************************************************
   * PRELOAD STORY MODE VIEW IMAGES
   ************************************************************************/
  const storyImageCache = new Map();

  function preloadStoryImages() {
    viewsData.forEach(v => {
      if (v.image && !storyImageCache.has(v.image)) {
        const img = new Image();
        img.src = v.image;
        storyImageCache.set(v.image, img);
      }
    });
  }

  /************************************************************************
   * PHYSICS SIMULATION
   ************************************************************************/
  function updatePhysics(isStaticLayout) {
    if (simulation) simulation.stop();
    
    const visibleNodes = nodes.filter(n => n.show);
    const visibleLinks = links.filter(l => l.source.show && l.target.show);
    
    if (visibleNodes.length === 0) {
      render();
      return;
    }
    
    const cw = canvas.width / devicePixelRatio;
    const ch = canvas.height / devicePixelRatio;
    const nodeCount = visibleNodes.length;
    
    // Scale link distance with node count so larger graphs spread out more
    const scaledLinkDist = CONFIG.force.linkDistance * Math.max(1, Math.sqrt(nodeCount / 15));
    
    simulation = d3.forceSimulation(visibleNodes)
      // Link force: pulls connected nodes toward target distance
      .force('link', d3.forceLink(visibleLinks)
        .id(d => d.id)
        .distance(scaledLinkDist)
        .strength(CONFIG.force.linkStrength))
      // Many-body force: repulsion between all node pairs (Coulomb-like)
      // distanceMax limits the range so far-away nodes don't repel as strongly
      .force('charge', d3.forceManyBody()
        .strength(CONFIG.force.chargeStrength)
        .distanceMax(scaledLinkDist * 4)
        .distanceMin(10))
      // Gentle centering: pulls nodes toward canvas center (prevents drift)
      .force('x', d3.forceX(cw / 2).strength(0.03))
      .force('y', d3.forceY(ch / 2).strength(0.03))
      // Collision: prevents node overlap with padding
      .force('collision', d3.forceCollide()
        .radius(d => d.r + CONFIG.force.collisionPadding)
        .strength(0.8)
        .iterations(2))
      // Simulation parameters
      .velocityDecay(CONFIG.force.velocityDecay)
      .alphaDecay(0.06)  
      .alphaMin(0.0005)
      .on('tick', () => {
        visibleNodes.forEach(n => {
          n.x = Math.max(n.r + PADDING, Math.min(cw - n.r - PADDING, n.x));
          n.y = Math.max(n.r + PADDING, Math.min(ch - n.r - PADDING, n.y));
          
          // Track physics-positioned nodes
          if (!n.hasGridCoords) {
            n.physicsX = n.x;
            n.physicsY = n.y;
          }
        });
        render();
      })
      .on('end', () => {
        // In 'freeze after initial placement' mode, pin every node where
        // physics left it; the simulation then never runs again.
        if (physicsMode === 'freezeAfterInitial') {
          freezeAllNodes();
          render();
        }
      })
;
    
    simulation.alpha(1.0).restart();
  }
  
  /************************************************************************
   * RENDERING HELPERS
   ************************************************************************/
  function clearCanvas() {
    const bgColor = formattingSettings.backgroundColor || '#FFFFFF';
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width/(devicePixelRatio), canvas.height/(devicePixelRatio));
    
    // Draw background image if enabled
    if (backgroundImageObj) {
      const cw = canvas.width / devicePixelRatio;
      const ch = canvas.height / devicePixelRatio;
      const img = backgroundImageObj;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      const scale = Math.max(cw / iw, ch / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = (cw - dw) / 2;
      const dy = (ch - dh) / 2;
      ctx.drawImage(img, dx, dy, dw, dh);
    }
  }

  function applyTransform() {
    const centerX = (canvas.width/(devicePixelRatio)) / 2;
    const centerY = (canvas.height/(devicePixelRatio)) / 2;
    ctx.translate(centerX + panX, centerY + panY);
    ctx.scale(zoomLevel, zoomLevel);
    ctx.translate(-centerX, -centerY);
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawChevronLabel(x1, y1, x2, y2, text, lineColor) {
    if (!text || text.trim() === '') return;
    
    // Calculate curve control point (same as in drawLink)
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Perpendicular offset (15% of distance for subtle curve)
    const offset = dist * 0.15;
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;
    
    // Control point perpendicular to line
    const controlX = midX - (dy / dist) * offset;
    const controlY = midY + (dx / dist) * offset;
    
    // Text measurements - calculate first to know chevron size
    ctx.save();
    const fontSize = 16 / zoomLevel;
    ctx.font = `${fontSize}px Rubik, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const metrics = ctx.measureText(text);
    const textWidth = metrics.width;
    
    // Chevron dimensions
    const padding = 8 / zoomLevel;
    const chevronWidth = textWidth + padding * 2;
    const chevronHeight = fontSize + padding * 2;
    const chevronPointSize = chevronHeight * 0.4;
    
    // Helper function to get point on quadratic bezier curve
    function getPointOnCurve(t) {
      return {
        x: (1-t)*(1-t)*x1 + 2*(1-t)*t*controlX + t*t*x2,
        y: (1-t)*(1-t)*y1 + 2*(1-t)*t*controlY + t*t*y2
      };
    }
    
    // Helper function to get tangent on quadratic bezier curve
    function getTangentOnCurve(t) {
      const tx = 2*(1-t)*(controlX - x1) + 2*t*(x2 - controlX);
      const ty = 2*(1-t)*(controlY - y1) + 2*t*(y2 - controlY);
      const length = Math.sqrt(tx * tx + ty * ty);
      return { x: tx / length, y: ty / length, length };
    }
    
    // Approximate arc length using numerical integration
    function approximateArcLength(t1, t2, steps = 10) {
      let length = 0;
      for (let i = 0; i < steps; i++) {
        const t = t1 + (t2 - t1) * (i / steps);
        const tangent = getTangentOnCurve(t);
        length += tangent.length * (t2 - t1) / steps;
      }
      return length;
    }
    
    // Find approximate t values for the left and right edges of chevron
    // by calculating what portion of the curve the chevron should occupy
    const totalArcLength = approximateArcLength(0, 1);
    const halfChevronWidth = (chevronWidth + chevronPointSize) / 2;
    
    // Find t values that correspond to the desired arc-length positions
    let tLeft = 0.5, tRight = 0.5;
    
    // Use iterative approach to find t values at specific arc lengths
    if (totalArcLength > 0) {
      // For left edge: find t where arc length from 0 to t equals half curve - half chevron
      const targetLeftLength = totalArcLength / 2 - halfChevronWidth;
      if (targetLeftLength > 0) {
        for (let i = 0; i < 5; i++) { // 5 iterations for reasonable accuracy
          const currentLength = approximateArcLength(0, tLeft);
          const error = currentLength - targetLeftLength;
          if (Math.abs(error) < 1) break;
          tLeft -= error / totalArcLength * 0.5; // Adjust t
          tLeft = Math.max(0.1, Math.min(0.9, tLeft)); // Keep in bounds
        }
      }
      
      // For right edge: find t where arc length from 0 to t equals half curve + half chevron
      const targetRightLength = totalArcLength / 2 + halfChevronWidth;
      if (targetRightLength < totalArcLength) {
        for (let i = 0; i < 5; i++) {
          const currentLength = approximateArcLength(0, tRight);
          const error = currentLength - targetRightLength;
          if (Math.abs(error) < 1) break;
          tRight -= error / totalArcLength * 0.5;
          tRight = Math.max(0.1, Math.min(0.9, tRight));
        }
      }
    }
    
    // Get positions for left and right edges along the curve
    const leftPoint = getPointOnCurve(tLeft);
    const rightPoint = getPointOnCurve(tRight);
    
    // Calculate the geometric center of the chevron (midpoint between left and right)
    const curveX = (leftPoint.x + rightPoint.x) / 2;
    const curveY = (leftPoint.y + rightPoint.y) / 2;
    
    // Get tangent at the geometric center for text orientation
    const tCenter = (tLeft + tRight) / 2;
    const centerTangent = getTangentOnCurve(tCenter);
    const ux = centerTangent.x;
    const uy = centerTangent.y;
    
    // Get tangents at left and right for perpendicular offsets
    const leftTangent = getTangentOnCurve(tLeft);
    const rightTangent = getTangentOnCurve(tRight);
    
    // Perpendicular vectors
    const leftPx = -leftTangent.y;
    const leftPy = leftTangent.x;
    const rightPx = -rightTangent.y;
    const rightPy = rightTangent.x;
    
    const halfHeight = chevronHeight / 2;
    
    // Left side vertices using curve position
    const leftTopX = leftPoint.x + leftPx * halfHeight;
    const leftTopY = leftPoint.y + leftPy * halfHeight;
    const leftBottomX = leftPoint.x - leftPx * halfHeight;
    const leftBottomY = leftPoint.y - leftPy * halfHeight;
    
    // Right side vertices using curve position
    const rightTopX = rightPoint.x + rightPx * halfHeight;
    const rightTopY = rightPoint.y + rightPy * halfHeight;
    const rightBottomX = rightPoint.x - rightPx * halfHeight;
    const rightBottomY = rightPoint.y - rightPy * halfHeight;
    
    // Point extends from right edge
    const rightPointX = rightPoint.x + rightTangent.x * chevronPointSize;
    const rightPointY = rightPoint.y + rightTangent.y * chevronPointSize;
    
    // Draw chevron shape
    ctx.fillStyle = lineColor;
    ctx.beginPath();
    ctx.moveTo(leftTopX, leftTopY);
    ctx.lineTo(rightTopX, rightTopY);
    ctx.lineTo(rightPointX, rightPointY);
    ctx.lineTo(rightBottomX, rightBottomY);
    ctx.lineTo(leftBottomX, leftBottomY);
    ctx.closePath();
    ctx.fill();
    
    // Draw text with rotation
    ctx.save();
    // Calculate angle from tangent at center
    let angle = Math.atan2(uy, ux);
    
    // Keep text readable (flip if upside down)
    if (angle > Math.PI / 2 || angle < -Math.PI / 2) {
      angle += Math.PI;
    }
    
    // Translate to curve position, rotate, then draw text at origin
    ctx.translate(curveX, curveY);
    ctx.rotate(angle);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(text, 0, 0);
    ctx.restore();
    
    ctx.restore();
  }

  function drawLink(l, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    
    // Check if either end of the link is hovered
    const isHovered = (hoveredNode && (l.source === hoveredNode || l.target === hoveredNode)) ||
                      (hoveredConnection && 
                       ((l.source.id === hoveredConnection.source && l.target.id === hoveredConnection.target) ||
                        (l.source.id === hoveredConnection.target && l.target.id === hoveredConnection.source)));
    
    // Check if either end is selected OR both ends are connected to the selected node
    const isSelected = selectedNode && (
      l.source === selectedNode || 
      l.target === selectedNode ||
      (adjacency.get(selectedNode.id)?.has(l.source.id) && adjacency.get(selectedNode.id)?.has(l.target.id))
    );
    
    // Check if either end is highlighted in current view (Story Mode)
    let isHighlighted = false;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const sourceHighlights = entityHighlightsMap.get(l.source.id);
      const targetHighlights = entityHighlightsMap.get(l.target.id);
      isHighlighted = (sourceHighlights && sourceHighlights.has(currentViewId)) || 
                      (targetHighlights && targetHighlights.has(currentViewId));
    }
    
    // Use default formatting (no conditional format)
    const lineColor = isHovered ? formattingSettings.lineHoverColor : formattingSettings.lineColor;
    
    // Determine base line thickness
    let baseLineThickness;
    if (formattingSettings.lineSizeMode === 'connectionValue' && l.connectionValue != null && !isNaN(l.connectionValue)) {
      baseLineThickness = getScaledLineThickness(l.connectionValue);
    } else {
      baseLineThickness = formattingSettings.lineThickness;
    }
    // Hover/selected lines are 1px thicker
    if (isHovered) baseLineThickness += 1;
    
    // Scale line thickness with the UI scale factor
    const lineThickness = baseLineThickness * uiScale;
    
    // Calculate curve control point for subtle curve
    const dx = l.target.x - l.source.x;
    const dy = l.target.y - l.source.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Perpendicular offset (15% of distance for subtle curve)
    const offset = dist * 0.15;
    const midX = (l.source.x + l.target.x) / 2;
    const midY = (l.source.y + l.target.y) / 2;
    
    // Control point perpendicular to line
    const controlX = midX - (dy / dist) * offset;
    const controlY = midY + (dx / dist) * offset;
    
    ctx.beginPath();
    // Draw tapered line: 1.5x width at source (A), 0.5x at target (B)
    const halfWidthSrc = (lineThickness / zoomLevel) * 0.75; // 1.5x / 2
    const halfWidthTgt = (lineThickness / zoomLevel) * 0.25; // 0.5x / 2
    
    // Perpendicular at source
    const t0 = { x: 2*(controlX - l.source.x), y: 2*(controlY - l.source.y) };
    const t0Len = Math.sqrt(t0.x*t0.x + t0.y*t0.y) || 1;
    const p0x = -t0.y / t0Len, p0y = t0.x / t0Len;
    
    // Perpendicular at target
    const t1 = { x: 2*(l.target.x - controlX), y: 2*(l.target.y - controlY) };
    const t1Len = Math.sqrt(t1.x*t1.x + t1.y*t1.y) || 1;
    const p1x = -t1.y / t1Len, p1y = t1.x / t1Len;
    
    // Perpendicular at control point (midpoint tangent)
    const tMid = { x: l.target.x - l.source.x, y: l.target.y - l.source.y };
    const tMidLen = Math.sqrt(tMid.x*tMid.x + tMid.y*tMid.y) || 1;
    const pMx = -tMid.y / tMidLen, pMy = tMid.x / tMidLen;
    const halfWidthMid = (halfWidthSrc + halfWidthTgt) / 2;
    
    // Draw filled shape: top edge (source→target), then bottom edge (target→source)
    ctx.moveTo(l.source.x + p0x * halfWidthSrc, l.source.y + p0y * halfWidthSrc);
    ctx.quadraticCurveTo(
      controlX + pMx * halfWidthMid, controlY + pMy * halfWidthMid,
      l.target.x + p1x * halfWidthTgt, l.target.y + p1y * halfWidthTgt
    );
    ctx.lineTo(l.target.x - p1x * halfWidthTgt, l.target.y - p1y * halfWidthTgt);
    ctx.quadraticCurveTo(
      controlX - pMx * halfWidthMid, controlY - pMy * halfWidthMid,
      l.source.x - p0x * halfWidthSrc, l.source.y - p0y * halfWidthSrc
    );
    ctx.closePath();
    ctx.fillStyle = lineColor;
    ctx.fill();
    
    // Draw chevron label based on showConnectionLabels setting
    const shouldShowLabel = formattingSettings.showConnectionLabels === 'always' 
      || (formattingSettings.showConnectionLabels === 'hover' && (isSelected || isHovered || isHighlighted));
    if (shouldShowLabel) {
      // Build chevron text: Note + formatted Value
      let chevronText = l.note || '';
      if (l.connectionValue != null && !isNaN(l.connectionValue)) {
        const fmtVal = formatValue(l.connectionValue, formattingSettings.connectionValuePrefix);
        if (chevronText) {
          chevronText += ' ' + fmtVal;
        } else {
          chevronText = fmtVal;
        }
      }
      if (chevronText) {
        ctx.globalAlpha = 1.0;
        drawChevronLabel(l.source.x, l.source.y, l.target.x, l.target.y, chevronText, lineColor);
      }
    }
    
    ctx.restore();
  }

  // Compute min/max connection values for line scaling (cached)
  let _lineSizeRange = null;
  function getLineSizeRange() {
    if (_lineSizeRange) return _lineSizeRange;
    const values = links.filter(l => l.connectionValue != null && !isNaN(l.connectionValue)).map(l => l.connectionValue);
    if (values.length === 0) return { min: 0, max: 1 };
    _lineSizeRange = { min: Math.min(...values), max: Math.max(...values) };
    return _lineSizeRange;
  }

  function getScaledLineThickness(value) {
    const range = getLineSizeRange();
    if (range.max === range.min) return 11; // midpoint
    const normalized = (value - range.min) / (range.max - range.min);
    return 2 + normalized * (20 - 2);
  }

  function drawNode(n, opacity, showImage=true) {
    ctx.save();
    const x = n.x, y = n.y;
    
    // No conditional formatting — use defaults only
    const isHovered = (hoveredNode && n === hoveredNode) ||
                      (hoveredConnection && (n.id === hoveredConnection.source || n.id === hoveredConnection.target));
    const isSelected = selectedNode && n === selectedNode;
    
    // Check if this node is connected to the hovered node
    const isConnectedToHovered = hoveredNode && hoveredNode !== n && 
                                  adjacency.get(hoveredNode.id)?.has(n.id);
    
    // Check if this node should be highlighted in the current view (Story Mode)
    let isHighlightedInView = false;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const highlightViews = entityHighlightsMap.get(n.id);
      isHighlightedInView = highlightViews && highlightViews.has(currentViewId);
    }
    
    // Get node shape from Shape Legend Category
    const shape = getNodeShape(n);
    
    // Use default formatting colors, with Color Legend Category on OUTLINE
    const nodeCats = getNodeCategories(n);
    const catColor = nodeCats.length > 0 ? categoryColorMap.get(nodeCats[0]) : null;
    const baseNodeColor = formattingSettings.nodeColor;
    const nodeColor = isHovered ? formattingSettings.nodeHoverColor : baseNodeColor;
    const baseOutlineColor = catColor || formattingSettings.outlineColor;
    const outlineColor = (isHovered || isSelected || isConnectedToHovered || isHighlightedInView) ? formattingSettings.outlineHoverColor : baseOutlineColor;
    const baseOutlineThickness = (isHovered || isSelected || isConnectedToHovered || isHighlightedInView) ? (formattingSettings.outlineThickness + 1) : formattingSettings.outlineThickness;
    
    // Scale outline thickness with the UI scale factor
    const outlineThickness = baseOutlineThickness * uiScale;
    
    // Node radius already includes scale factor from computeGridLayout
    const r = n.r;

    if (showImage && n.imageBitmap) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      // Clip to shape
      drawShapePath(ctx, shape, x, y, r);
      ctx.clip();
      const img = n.imageBitmap;
      const iw = img.width || img.naturalWidth || 1;
      const ih = img.height || img.naturalHeight || 1;
      const target = r * 2;
      const scale = Math.max(target / iw, target / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = x - dw / 2;
      const dy = y - dh / 2;
      try {
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, dx, dy, dw, dh);
      } catch (e) {
        drawShapePath(ctx, shape, x, y, r);
        ctx.fillStyle = nodeColor;
        ctx.fill();
      }
      ctx.restore();
    } else {
      ctx.save();
      ctx.globalAlpha = opacity;
      drawShapePath(ctx, shape, x, y, r);
      ctx.fillStyle = nodeColor;
      ctx.fill();
      ctx.restore();
    }

    // Draw outline with glow if this is the selected node
    ctx.save();
    ctx.globalAlpha = opacity;
    
    // Add pulsing glow for selected node
    if (selectedNode && n === selectedNode) {
      const pulsePhase = Math.sin(animationTime * 0.002) * 0.5 + 0.5; // Oscillates between 0 and 1
      const glowSize = (5 + pulsePhase * 10) * uiScale; // Scale glow with UI
      const glowAlpha = 0.5 + pulsePhase * 0.5; // Varies between 0.5 and 1
      
      // Convert hover outline color to rgba for glow effect
      const hoverColor = formattingSettings.outlineHoverColor;
      const rr = parseInt(hoverColor.slice(1, 3), 16);
      const gg = parseInt(hoverColor.slice(3, 5), 16);
      const bb = parseInt(hoverColor.slice(5, 7), 16);
      
      ctx.shadowColor = `rgba(${rr}, ${gg}, ${bb}, ${glowAlpha})`;
      ctx.shadowBlur = glowSize;
    }
    
    drawShapePath(ctx, shape, x, y, r);
    ctx.lineWidth = outlineThickness / zoomLevel;
    ctx.strokeStyle = outlineColor;
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawLabel(n) {
    const text = n.name || '';
    if (!text) return;
    ctx.save();
    ctx.font = `${CONFIG.labelFontSize / zoomLevel}px Rubik, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const metrics = ctx.measureText(text);
    const textW = metrics.width;
    const pad = CONFIG.labelBoxPadding / zoomLevel;
    const boxW = textW + pad * 2;
    const boxH = (CONFIG.labelFontSize + 6) / zoomLevel;
    const x = n.x - boxW / 2;
    const y = n.y + n.r + CONFIG.labelOffsetY / zoomLevel;

    ctx.save();
    ctx.globalAlpha = CONFIG.labelBoxOpacity;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    roundRectPath(x, y, boxW, boxH, 6 / zoomLevel);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#111827';
    ctx.fillText(text, n.x, y + boxH / 2);
    ctx.restore();
  }

  function shouldHighlightNode(node) {
    // In story mode, nodes not in current view should be unhighlighted (low opacity)
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);
      if (!currentViewEntities.has(node.id)) {
        return false; // Not in current view, show with low opacity
      }
    }
    
    if (!selectedNode) return true;
    const activeSet = new Set([selectedNode.id, ...(adjacency.get(selectedNode.id) || [])]);
    return activeSet.has(node.id);
  }


  /************************************************************************
   * LEGEND FUNCTIONS
   ************************************************************************/
  // Function to extract unique categories and assign colors
  // Helper: get color legend category for a node (single value, not comma-separated)
  function getNodeCategories(node) {
    if (!node.raw || !node.raw['Color Legend Category']) return [];
    const cat = node.raw['Color Legend Category'].trim();
    return cat ? [cat] : [];
  }

  // Helper: get shape legend category for a node
  function getNodeShapeCategory(node) {
    if (!node.raw || !node.raw['Shape Legend Category']) return '';
    return node.raw['Shape Legend Category'].trim();
  }

  function updateCategoryColors() {
    // Build color map from colorLegendEntries (from Options CSV)
    categoryColorMap.clear();
    const enabledEntries = colorLegendEntries.filter(e => e.enabled && e.label && e.color);
    enabledEntries.forEach(e => {
      categoryColorMap.set(e.label, e.color);
    });
    
    // Collect unique categories from nodes, maintaining CSV legend order
    const categories = new Set();
    nodes.forEach(node => {
      getNodeCategories(node).forEach(cat => categories.add(cat));
    });
    
    // Order categories according to colorLegendEntries order
    const legendLabelOrder = colorLegendEntries.filter(e => e.enabled && e.label).map(e => e.label);
    uniqueCategories = [];
    legendLabelOrder.forEach(label => {
      if (categories.has(label)) uniqueCategories.push(label);
    });
    // Append any categories not in the legend entries at the end
    categories.forEach(cat => {
      if (!uniqueCategories.includes(cat)) uniqueCategories.push(cat);
    });
    
    // Only keep categories that have a color mapping in the legend
    // (nodes without a matching category get default color)
    
    // Add all categories as active by default
    uniqueCategories.forEach(cat => {
      if (!activeCategories.has(cat)) {
        activeCategories.add(cat);
      }
    });
    
    // Remove categories that no longer exist
    const currentCategories = new Set(uniqueCategories);
    Array.from(activeCategories).forEach(cat => {
      if (!currentCategories.has(cat)) {
        activeCategories.delete(cat);
      }
    });
    
    // Build shape categories
    const shapeCats = new Set();
    nodes.forEach(node => {
      const sc = getNodeShapeCategory(node);
      if (sc) shapeCats.add(sc);
    });
    uniqueShapeCategories = Array.from(shapeCats);
    // Maintain order from shapeLegendEntries
    const shapeLabelOrder = shapeLegendEntries.filter(e => e.enabled && e.label).map(e => e.label);
    uniqueShapeCategories.sort((a, b) => {
      const ia = shapeLabelOrder.indexOf(a);
      const ib = shapeLabelOrder.indexOf(b);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    });
    uniqueShapeCategories.forEach(cat => {
      if (!activeShapeCategories.has(cat)) activeShapeCategories.add(cat);
    });
    const currentShapeCats = new Set(uniqueShapeCategories);
    Array.from(activeShapeCategories).forEach(cat => {
      if (!currentShapeCats.has(cat)) activeShapeCategories.delete(cat);
    });
  }

  // Function to update legend display
  function updateLegend() {
    if (!legendContainer) return;
    
    // Only show legend if there are enabled color legend entries with matching categories
    const legendCategories = uniqueCategories.filter(cat => categoryColorMap.has(cat));
    
    if (legendCategories.length === 0) {
      legendContainer.style.display = 'none';
      return;
    }
    
    legendContainer.style.display = 'flex';
    legendContainer.innerHTML = '';
    
    legendCategories.forEach(category => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      if (!activeCategories.has(category)) {
        item.classList.add('inactive');
      }
      
      const colorBox = document.createElement('div');
      colorBox.className = 'legend-color-box';
      colorBox.style.backgroundColor = categoryColorMap.get(category);
      
      const label = document.createElement('span');
      label.textContent = category;
      
      item.appendChild(colorBox);
      item.appendChild(label);
      
      item.addEventListener('click', () => {
        const isOnlyActive = activeCategories.size === 1 && activeCategories.has(category);
        
        if (isOnlyActive) {
          activeCategories.clear();
          uniqueCategories.forEach(cat => activeCategories.add(cat));
        } else {
          activeCategories.clear();
          activeCategories.add(category);
        }
        
        updateLegend();
        render();
      });
      
      legendContainer.appendChild(item);
    });
    
    legendContainer.style.display = 'flex';
    legendContainer.style.visibility = 'visible';
    legendContainer.style.opacity = '1';
  }

  /************************************************************************
   * SHAPE DRAWING HELPERS
   ************************************************************************/
  function drawShapePath(ctx, shape, x, y, r) {
    switch (shape) {
      case 'square':
        ctx.beginPath();
        ctx.rect(x - r, y - r, r * 2, r * 2);
        break;
      case 'triangle':
        ctx.beginPath();
        ctx.moveTo(x, y - r * 1.15);
        ctx.lineTo(x + r * 1.05, y + r * 0.75);
        ctx.lineTo(x - r * 1.05, y + r * 0.75);
        ctx.closePath();
        break;
      case 'diamond':
        ctx.beginPath();
        ctx.moveTo(x, y - r * 1.15);
        ctx.lineTo(x + r * 1.0, y);
        ctx.lineTo(x, y + r * 1.15);
        ctx.lineTo(x - r * 1.0, y);
        ctx.closePath();
        break;
      case 'circle':
      default:
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        break;
    }
  }

  function getNodeShape(node) {
    // Check Shape Legend Category
    const shapeCat = getNodeShapeCategory(node);
    if (shapeCat && shapeCategoryMap.has(shapeCat)) {
      return shapeCategoryMap.get(shapeCat);
    }
    return formattingSettings.nodeShape || 'circle';
  }

  /************************************************************************
   * SHAPE LEGEND
   ************************************************************************/
  const SHAPE_ICONS = { circle: '〇', square: '▢', triangle: '△', diamond: '◇' };

  function updateShapeLegend() {
    if (!shapeLegendContainer) return;

    const activeItems = shapeLegendEntries.filter(e => e.enabled && e.label.trim());
    if (activeItems.length === 0) {
      shapeLegendContainer.style.display = 'none';
      return;
    }

    shapeLegendContainer.style.display = 'flex';
    shapeLegendContainer.innerHTML = '';

    activeItems.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'shape-legend-item';
      item.style.cursor = 'pointer';
      item.style.transition = 'all 0.2s';
      
      // Dim if this shape category is filtered out
      if (!activeShapeCategories.has(entry.label)) {
        item.style.opacity = '0.4';
      }

      const icon = document.createElement('span');
      icon.className = 'shape-legend-icon';
      icon.textContent = SHAPE_ICONS[entry.shape] || '〇';

      const label = document.createElement('span');
      label.textContent = entry.label;

      item.appendChild(icon);
      item.appendChild(label);
      
      item.addEventListener('click', () => {
        const isOnlyActive = activeShapeCategories.size === 1 && activeShapeCategories.has(entry.label);
        if (isOnlyActive) {
          activeShapeCategories.clear();
          uniqueShapeCategories.forEach(cat => activeShapeCategories.add(cat));
        } else {
          activeShapeCategories.clear();
          activeShapeCategories.add(entry.label);
        }
        updateShapeLegend();
        render();
      });
      
      shapeLegendContainer.appendChild(item);
    });
  }

  /************************************************************************
   * RENDER
   ************************************************************************/
  function drawGridOverlay() {
    const half = CONFIG.gridUnits / 2; // 30
    ctx.save();
    ctx.lineWidth = 1 / zoomLevel;
    for (let i = -half; i <= half; i++) {
      const isAxis = (i === 0);
      const isMajor = (i % 5 === 0);
      ctx.strokeStyle = isAxis ? 'rgba(0,0,0,0.32)'
        : isMajor ? 'rgba(0,0,0,0.16)'
        : 'rgba(0,0,0,0.06)';
      // vertical line at grid-x = i
      const v1 = gridToPixel(i, -half), v2 = gridToPixel(i, half);
      ctx.beginPath(); ctx.moveTo(v1.x, v1.y); ctx.lineTo(v2.x, v2.y); ctx.stroke();
      // horizontal line at grid-y = i
      const h1 = gridToPixel(-half, i), h2 = gridToPixel(half, i);
      ctx.beginPath(); ctx.moveTo(h1.x, h1.y); ctx.lineTo(h2.x, h2.y); ctx.stroke();
    }
    ctx.restore();
  }

  function render() {
    animationTime = Date.now();
    clearCanvas();
    if (!nodes || nodes.length === 0) return;

    ctx.save();
    applyTransform();

    // Snap-grid overlay (only while dragging a node in the tool)
    if (showGridOverlay) drawGridOverlay();

    // Filter nodes based on story mode
    let visibleNodes = nodes.filter(n => n.show);
    const highlightedNodes = [];
    const unhighlightedNodes = [];
    
    visibleNodes.forEach(node => {
      // Check if node should be highlighted based on selection AND legend filtering
      let shouldHighlight = shouldHighlightNode(node);
      
      // If color legend filtering is active, dim non-matching nodes
      if (activeCategories.size < uniqueCategories.length) {
        const nodeCats = getNodeCategories(node);
        if (nodeCats.length === 0 || !nodeCats.some(c => activeCategories.has(c))) {
          shouldHighlight = false;
        }
      }
      
      // If shape legend filtering is active, dim non-matching nodes
      if (activeShapeCategories.size < uniqueShapeCategories.length) {
        const sc = getNodeShapeCategory(node);
        if (!sc || !activeShapeCategories.has(sc)) {
          shouldHighlight = false;
        }
      }
      
      if (shouldHighlight) {
        highlightedNodes.push(node);
      } else {
        unhighlightedNodes.push(node);
      }
    });

    // Draw unhighlighted nodes first (dimmed)
    unhighlightedNodes.forEach(n => drawNode(n, CONFIG.unconnectedOpacity, CONFIG.showImages));

    const highlightedSet = new Set(highlightedNodes.map(n => n.id));
    let visibleLinks = links.filter(l => l.source.show && l.target.show);
    
    // In story mode, only show links where BOTH nodes are in current view
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);
      visibleLinks = visibleLinks.filter(l => currentViewEntities.has(l.source.id) && currentViewEntities.has(l.target.id));
    }
    
    // Draw links - ONLY draw links between highlighted nodes when there's a selection
    // Sort links by priority: selected & hovered > selected & not hovered > unselected & hovered > unselected & not hovered
    
    // Helper function to check if a node's category is active
    const isNodeCategoryActive = (node) => {
      // Color legend filter
      if (uniqueCategories.length > 0 && activeCategories.size < uniqueCategories.length) {
        const nodeCats = getNodeCategories(node);
        if (nodeCats.length === 0 || !nodeCats.some(c => activeCategories.has(c))) return false;
      }
      // Shape legend filter
      if (uniqueShapeCategories.length > 0 && activeShapeCategories.size < uniqueShapeCategories.length) {
        const sc = getNodeShapeCategory(node);
        if (!sc || !activeShapeCategories.has(sc)) return false;
      }
      return true;
    };
    const sortedLinks = visibleLinks.slice().sort((a, b) => {
      const aIsSelected = selectedNode && (a.source === selectedNode || a.target === selectedNode);
      const bIsSelected = selectedNode && (b.source === selectedNode || b.target === selectedNode);
      const aIsHovered = hoveredNode && (a.source === hoveredNode || a.target === hoveredNode);
      const bIsHovered = hoveredNode && (b.source === hoveredNode || b.target === hoveredNode);
      
      // Calculate priority (higher number = drawn later = appears on top)
      const aPriority = (aIsSelected ? 2 : 0) + (aIsHovered ? 1 : 0);
      const bPriority = (bIsSelected ? 2 : 0) + (bIsHovered ? 1 : 0);
      
      return aPriority - bPriority; // Draw lower priority first
    });
    
    if (selectedNode) {
      sortedLinks.forEach(l => {
        if (highlightedSet.has(l.source.id) && highlightedSet.has(l.target.id)) {
          const bothActive = isNodeCategoryActive(l.source) && isNodeCategoryActive(l.target);
          const opacity = bothActive ? CONFIG.linkOpacitySelected : CONFIG.unconnectedOpacity;
          drawLink(l, opacity);
        }
      });
    } else {
      sortedLinks.forEach(l => {
        const bothActive = isNodeCategoryActive(l.source) && isNodeCategoryActive(l.target);
        const opacity = bothActive ? CONFIG.linkOpacityNoSelection : CONFIG.unconnectedOpacity;
        drawLink(l, opacity);
      });
    }

    // Draw highlighted nodes on top
    highlightedNodes.forEach(n => drawNode(n, CONFIG.pointOpacity, CONFIG.showImages));

    // Draw labels based on showNodeLabels setting
    if (formattingSettings.showNodeLabels === 'always') {
      // Draw labels for ALL visible highlighted nodes
      highlightedNodes.forEach(n => drawLabel(n));
      unhighlightedNodes.forEach(n => drawLabel(n));
    } else {
      // Default 'hover' mode: labels on selection, connections, and hover
      if (selectedNode) {
        highlightedNodes.forEach(n => {
          if (adjacency.get(selectedNode.id).has(n.id) || n === selectedNode) {
            drawLabel(n);
          }
        });
      }

      // Draw label for hovered node (if not already labeled)
      if (hoveredNode && hoveredNode !== selectedNode && hoveredNode.show) {
        drawLabel(hoveredNode);
      }
    }

    ctx.restore();
    
    // Schedule next animation frame only if a node is selected (for glow animation)
    if (selectedNode && !animationScheduled) {
      animationScheduled = true;
      setTimeout(() => {
        animationScheduled = false;
        requestAnimationFrame(render);
      }, 50); // ~20 FPS for smooth animation with less CPU usage
    }
  }

  /************************************************************************
   * INTERACTION HELPERS
   ************************************************************************/
  function getCanvasPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.clientX - rect.left) * (canvas.width / (devicePixelRatio)) / rect.width;
    const y = (evt.clientY - rect.top) * (canvas.height / (devicePixelRatio)) / rect.height;
    
    const centerX = (canvas.width/(devicePixelRatio)) / 2;
    const centerY = (canvas.height/(devicePixelRatio)) / 2;
    
    const transformedX = (x - centerX - panX) / zoomLevel + centerX;
    const transformedY = (y - centerY - panY) / zoomLevel + centerY;
    
    return { x: transformedX, y: transformedY };
  }

  function findNodeAtPos(x, y) {
    if (!nodes || nodes.length === 0) return null;
    let visibleNodes = nodes.filter(n => n.show);
    
    if (selectedNode) {
      const activeSet = new Set([selectedNode.id, ...(adjacency.get(selectedNode.id) || [])]);
      const activeNodes = visibleNodes.filter(n => activeSet.has(n.id));
      for (let i = activeNodes.length - 1; i >= 0; i--) {
        const n = activeNodes[i];
        if (Math.hypot(n.x - x, n.y - y) <= n.r) return n;
      }
      const otherNodes = visibleNodes.filter(n => !activeSet.has(n.id));
      for (let i = otherNodes.length - 1; i >= 0; i--) {
        const n = otherNodes[i];
        if (Math.hypot(n.x - x, n.y - y) <= n.r) return n;
      }
    } else {
      for (let i = visibleNodes.length - 1; i >= 0; i--) {
        const n = visibleNodes[i];
        if (Math.hypot(n.x - x, n.y - y) <= n.r) return n;
      }
    }
    return null;
  }

  function updateCanvasCursor() {
    if (isDragging) {
      canvas.style.cursor = 'grabbing';
    } else if (zoomLevel > 1.0) {
      canvas.style.cursor = 'grab';
    } else {
      canvas.style.cursor = 'default';
    }
  }

  /************************************************************************
   * CANVAS EVENT LISTENERS
   ************************************************************************/
  canvas.addEventListener('mousedown', (evt) => {
    if (evt.button !== 0) return;
    if (AUTH && AUTH.onDown(evt)) return; // authoring drag took over

    didDrag = false;

    if (zoomLevel > 1.0) {
      // Panning canvas
      isDragging = true;
      dragStartX = evt.clientX;
      dragStartY = evt.clientY;
      dragStartPanX = panX;
      dragStartPanY = panY;
      updateCanvasCursor();
      evt.preventDefault();
    }
  });

  canvas.addEventListener('mousemove', (evt) => {
    if (AUTH && AUTH.onMove(evt)) return; // authoring drag took over

    if (isDragging && zoomLevel > 1.0) {
      didDrag = true;
      const deltaX = evt.clientX - dragStartX;
      const deltaY = evt.clientY - dragStartY;
      panX = dragStartPanX + deltaX / zoomLevel;
      panY = dragStartPanY + deltaY / zoomLevel;
      render();
      evt.preventDefault();
    } else {
      // Hover effect
      const pos = getCanvasPos(evt);
      const n = findNodeAtPos(pos.x, pos.y);
      if (n !== hoveredNode) {
        hoveredNode = n;
        render();
      }
      if (AUTH && !isStoryMode) {
        canvas.style.cursor = n ? 'grab' : (zoomLevel > 1.0 ? 'grab' : 'default');
      }
    }
  });

  canvas.addEventListener('mouseup', (evt) => {
    if (AUTH && AUTH.onUp(evt)) return; // authoring drag took over

    if (isDragging) {
      isDragging = false;
      updateCanvasCursor();
      
      // Only treat as click if we didn't drag
      if (!didDrag) {
        const pos = getCanvasPos(evt);
        const n = findNodeAtPos(pos.x, pos.y);
        if (n) {
          selectedNode = n;
          if (isStoryMode) {
            showEntityModal(n);
          } else {
            populateInfoPanel(n);
          }
          render();
        } else {
          selectedNode = null;
          if (isStoryMode) {
            hideEntityModal();
          } else {
            clearInfoPanel();
          }
          render();
        }
      }
      evt.preventDefault();
      return;
    }
  });

  canvas.addEventListener('click', (evt) => {
    if (didDrag) {
      didDrag = false;
      evt.preventDefault();
      return;
    }
    if (isDragging) return;
    const pos = getCanvasPos(evt);
    const n = findNodeAtPos(pos.x, pos.y);
    if (n) {
      selectedNode = n;
      if (isStoryMode) {
        showEntityModal(n);
      } else {
        populateInfoPanel(n);
      }
      render();
    } else {
      selectedNode = null;
      hoveredConnection = null;
      if (isStoryMode) {
        hideEntityModal();
      } else {
        clearInfoPanel();
      }
      render();
    }
  });

  canvas.addEventListener('mouseleave', (evt) => {
    isDragging = false;
    didDrag = false;
    updateCanvasCursor();
    if (hoveredNode) {
      hoveredNode = null;
      render();
    }
  });

  canvas.addEventListener('wheel', (evt) => {
    evt.preventDefault();
    if (evt.deltaY < 0) {
      zoomIn();
    } else {
      zoomOut();
    }
  });

  /************************************************************************
   * ZOOM CONTROLS
   ************************************************************************/
  function zoomIn() {
    zoomLevel = Math.min(CONFIG.zoomMax, zoomLevel + CONFIG.zoomStep);
    updateCanvasCursor();
    render();
  }
  
  function zoomOut() {
    zoomLevel = Math.max(CONFIG.zoomMin, zoomLevel - CONFIG.zoomStep);
    updateCanvasCursor();
    render();
  }
  
  function resetZoom() {
    zoomLevel = 0.9;
    panX = 0;
    panY = 0;
    
    // CRITICAL: Clear inline styles that lock canvas size!
    // resizeCanvas() sets inline styles, which prevent proper resizing
    canvas.style.width = '';
    canvas.style.height = '';
    
    // Force reflow so getBoundingClientRect() reads the CSS size
    void canvas.offsetHeight;
    
    // Now resize canvas (will read correct CSS dimensions)
    resizeCanvas();
    
    // Rescale nodes to fit the actual available space
    if (nodes.length > 0) {
      computeGridLayout();
    }
    
    // Update simulation center
    if (simulation && simulation.force) { 
      const c = simulation.force('center'); 
      if (c) {
        c.x((canvas.width/(devicePixelRatio))/2);
        c.y((canvas.height/(devicePixelRatio))/2);
      }
    }
    
    updateCanvasCursor();
    render();
  }

  zoomInBtn.addEventListener('click', zoomIn);
  zoomOutBtn.addEventListener('click', zoomOut);
  zoomResetBtn.addEventListener('click', resetZoom);

  /************************************************************************
   * FULLSCREEN FUNCTIONALITY
   ************************************************************************/
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      // Enter fullscreen
      const element = document.documentElement; // or document.getElementById('wrap') for just the tool
      if (element.requestFullscreen) {
        element.requestFullscreen().catch(err => {
        });
      } else if (element.webkitRequestFullscreen) { // Safari
        element.webkitRequestFullscreen();
      } else if (element.msRequestFullscreen) { // IE11
        element.msRequestFullscreen();
      }
    } else {
      // Exit fullscreen
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) { // Safari
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) { // IE11
        document.msExitFullscreen();
      }
    }
  }

  function updateFullscreenButton() {
    if (document.fullscreenElement) {
      fullscreenBtn.innerHTML = '◱'; // Exit fullscreen icon
      fullscreenBtn.title = 'Exit Fullscreen';
    } else {
      fullscreenBtn.innerHTML = '⌜⌟'; // Enter fullscreen icon
      fullscreenBtn.title = 'Enter Fullscreen';
    }
    
    // Force immediate reflow and resize with multiple attempts
    // This ensures proper resizing especially on mobile
    setTimeout(() => {
      // Force browser to reflow layout
      const wrapper = document.getElementById('wrap');
      const graphArea = document.getElementById('graph-area');
      
      // Force reflow
      void wrapper.offsetHeight;
      void graphArea.offsetHeight;
      void canvas.offsetHeight;
      
      // Clear any inline styles that might be constraining
      canvas.style.width = '';
      canvas.style.height = '';
      
      // Trigger resize and rescale
      resizeCanvas();
      if (nodes.length > 0) {
        computeGridLayout();
      }
      render();
    }, 50);
    
    // Second attempt after initial reflow
    setTimeout(() => {
      resizeCanvas();
      if (nodes.length > 0) {
        computeGridLayout();
      }
      render();
    }, 150);
    
    // Final resize after fullscreen animation completes
    setTimeout(() => {
      resizeCanvas();
      if (nodes.length > 0) {
        computeGridLayout();
      }
      render();
    }, 500);
  }

  fullscreenBtn.addEventListener('click', toggleFullscreen);

  // Share button - copies sharing URL to clipboard
  const shareBtn = document.getElementById('share-btn');
  shareBtn.addEventListener('click', () => {
    const url = formattingSettings.sharingUrl;
    if (url) {
      const fullUrl = /^https?:\/\//i.test(url) ? url : 'https://' + url;
      navigator.clipboard.writeText(fullUrl).then(() => {
        const origText = shareBtn.innerHTML;
        shareBtn.innerHTML = '✓';
        setTimeout(() => { shareBtn.innerHTML = origText; }, 1500);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = fullUrl;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const origText = shareBtn.innerHTML;
        shareBtn.innerHTML = '✓';
        setTimeout(() => { shareBtn.innerHTML = origText; }, 1500);
      });
    }
  });
  
  // Update button when fullscreen state changes (including when user presses ESC)
  document.addEventListener('fullscreenchange', updateFullscreenButton);
  document.addEventListener('webkitfullscreenchange', updateFullscreenButton); // Safari
  document.addEventListener('msfullscreenchange', updateFullscreenButton); // IE11


  /************************************************************************
   * INFO PANEL
   ************************************************************************/
  function normalizeUrl(u) {
    if (!u) return null;
    const s = String(u).trim();
    if (s === '') return null;
    if (/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(s)) return s;
    return 'https://' + s.replace(/^[\/]+/, '');
  }

  function processHtmlLinks(html) {
    if (!html) return html;
    const temp = document.createElement('div');
    temp.innerHTML = html;
    const links = temp.querySelectorAll('a');
    links.forEach(link => {
      if (!link.hasAttribute('target')) {
        link.setAttribute('target', '_blank');
      }
      if (!link.hasAttribute('rel')) {
        link.setAttribute('rel', 'noopener');
      }
    });
    return temp.innerHTML;
  }

  function populateInfoPanel(d) {
    const desc = (d.raw && (d.raw['Description'] || '')) || '';
    const colorCat = (d.raw && (d.raw['Color Legend Category'] || '')) || '';
    const shapeCat = (d.raw && (d.raw['Shape Legend Category'] || '')) || '';

    // Build info sections
    let categoryHtml = '';
    if (formattingSettings.showColorLegendCategoryName && colorCat) {
      const title = formattingSettings.colorLegendCategoryTitle || 'Category';
      const catColor = categoryColorMap.get(colorCat);
      const colorDot = catColor ? `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${catColor};margin-right:4px;vertical-align:middle;"></span>` : '';
      categoryHtml += `<div style="font-size:14px;font-weight:bold;margin-top:6px;">${title}: ${colorDot}${colorCat}</div>`;
    }
    if (formattingSettings.showShapeLegendCategoryName && shapeCat) {
      const title = formattingSettings.shapeLegendCategoryTitle || 'Type';
      categoryHtml += `<div style="font-size:14px;font-weight:bold;margin-top:4px;">${title}: ${shapeCat}</div>`;
    }
    
    // Total IN/OUT values
    let valueSummaryHtml = '';
    if (formattingSettings.showTotalInValue) {
      const totalIn = connectionInTotals.get(d.id) || 0;
      if (totalIn > 0) {
        const fmtVal = formatValue(totalIn, formattingSettings.connectionValuePrefix);
        valueSummaryHtml += `<div style="font-size:14px;margin-top:4px;"><b>${formattingSettings.totalInTitle}:</b> ${fmtVal}</div>`;
      }
    }
    if (formattingSettings.showTotalOutValue) {
      const totalOut = connectionOutTotals.get(d.id) || 0;
      if (totalOut > 0) {
        const fmtVal = formatValue(totalOut, formattingSettings.connectionValuePrefix);
        valueSummaryHtml += `<div style="font-size:14px;margin-top:4px;"><b>${formattingSettings.totalOutTitle}:</b> ${fmtVal}</div>`;
      }
    }

    nodeTitleEl.html(`
      <div style="display:flex; align-items:center; gap:8px; font-size:clamp(18px,1.8vw,24px); font-weight:700;">
        <span>${d.name}</span>
        ${d.image ? `<img src="${d.image}" style="width:clamp(28px,3vw,40px); height:clamp(28px,3vw,40px); object-fit:cover; border-radius:50%;">` : ''}
      </div>
      ${categoryHtml}
      ${valueSummaryHtml}
      ${desc ? `<div style="font-size:clamp(12px,1vw,14px); font-weight: normal; max-height: 350px; overflow-y: auto; margin-top: 6px;">${processHtmlLinks(desc.replace(/\n/g, '<br>'))}</div>` : ''}
    `);

    nodeLinkEl.html(formattingSettings.showConnectionsBoxTitle 
      ? `<b style="font-size:13px;">${formattingSettings.connectionsBoxTitle}</b>` 
      : '');

    const conns = Array.from(adjacency.get(d.id) || []).slice();
    conns.sort((a,b) => a.localeCompare(b, undefined, {sensitivity:'base'}));
    connectionsBox.innerHTML = '';
    if (conns.length === 0) {
      connectionsBox.innerHTML = '<div class="muted">No connections</div>';
      return;
    }
    const frag = document.createDocumentFragment();
    const nodeSourceMap = connectionSources.get(d.id);
    const nodeTextsMap = connectionTexts.get(d.id);
    conns.forEach(name => {
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.style.display = 'flex';
      item.style.alignItems = 'center';
      item.style.justifyContent = 'space-between';
      item.style.gap = '8px';
      
      const nameSpan = document.createElement('span');
      // Display the text description if available, otherwise fall back to node name
      const textDesc = nodeTextsMap ? nodeTextsMap.get(name) : null;
      nameSpan.innerHTML = processHtmlLinks(textDesc || name);
      nameSpan.style.flex = '1';
      nameSpan.style.cursor = 'pointer';
      nameSpan.addEventListener('click', () => {
        const targetNode = nodeById.get(name);
        if (targetNode) {
          selectedNode = targetNode;
          populateInfoPanel(targetNode);
          render();
          connectionsBox.scrollTop = 0;
        }
      });
      item.appendChild(nameSpan);
      
      const sourceUrl = nodeSourceMap ? nodeSourceMap.get(name) : null;
      if (sourceUrl) {
        const sourceIcon = document.createElement('a');
        sourceIcon.href = normalizeUrl(sourceUrl) || '#';
        sourceIcon.target = '_blank';
        sourceIcon.rel = 'noopener';
        sourceIcon.innerHTML = '➜]';
        sourceIcon.style.fontSize = '16px';
        sourceIcon.style.textDecoration = 'none';
        sourceIcon.style.cursor = 'pointer';
        sourceIcon.style.flexShrink = '0';
        sourceIcon.title = 'Source';
        sourceIcon.addEventListener('click', (e) => {
          e.stopPropagation();
        });
        item.appendChild(sourceIcon);
      }
      
      
      // Add hover handlers to highlight connection in chart
      item.addEventListener('mouseenter', () => {
        hoveredConnection = { source: d.id, target: name };
        render();
      });
      item.addEventListener('mouseleave', () => {
        hoveredConnection = null;
        render();
      });
      frag.appendChild(item);
    });
    connectionsBox.appendChild(frag);
  }

  function clearInfoPanel() {
    nodeTitleEl.html('Click/hover on map or search for a person/group');
    nodeLinkEl.html('');
    connectionsBox.innerHTML = '';
  }

  /************************************************************************
   * SEARCH
   ************************************************************************/
  searchInput.addEventListener('input', onSearchInput);
  searchBtn.addEventListener('click', () => performSearch(searchInput.value.trim()));
  searchInput.addEventListener('keydown', (ev) => { 
    if (ev.key === 'Enter') { 
      performSearch(searchInput.value.trim()); 
      ev.preventDefault(); 
    } 
  });

  clearBtn.addEventListener('click', () => { 
    selectedNode = null;
    hoveredConnection = null;
    
    if (isStoryMode) {
      hideEntityModal();
    } else {
      clearInfoPanel();
    }
    
    render(); 
    searchInput.value = ''; 
    suggestionsEl.style('display', 'none').html(''); 
    msgEl.text('');
  });

  function onSearchInput() {
    const q = searchInput.value.trim();
    suggestionsEl.style('display', 'none').html('');
    msgEl.text('');
    if (!q || q.length < 3) return;
    const term = q.toLowerCase();
    const matches = [];
    
    // In story mode, only search within current view's entities
    let searchSpace = nameIndex;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = viewEntitiesCache.get(currentViewId) || [];
      searchSpace = currentViewEntities;
    }
    
    for (const name of searchSpace) {
      if (name && name.toLowerCase().includes(term)) matches.push(name);
      if (matches.length >= CONFIG.maxSuggestions) break;
    }
    if (matches.length === 0) {
      suggestionsEl.style('display','block').html('<div class="muted">No suggestions</div>');
      return;
    }
    suggestionsEl.style('display','block').html('');
    matches.forEach(m => {
      suggestionsEl.append('div').attr('class','suggestion').text(m).on('click', () => {
        searchInput.value = m;
        suggestionsEl.style('display','none').html('');
        performSearch(m);
      });
    });
  }

  function performSearch(q) {
    if (!q) return;
    
    // In story mode, only search within current view's entities
    let searchNodes = nodes;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);
      searchNodes = nodes.filter(n => currentViewEntities.has(n.id));
    }
    
    const exact = searchNodes.find(n => n.name && n.name.toLowerCase() === q.toLowerCase());
    if (exact) {
      selectedNode = exact;
      
      if (isStoryMode) {
        showEntityModal(exact);
      } else {
        populateInfoPanel(exact);
      }
      
      render(); 
      msgEl.text(''); 
      return;
    }
    const matches = searchNodes.filter(n => n.name && n.name.toLowerCase().includes(q.toLowerCase()));
    if (matches.length === 1) {
      selectedNode = matches[0];
      
      if (isStoryMode) {
        showEntityModal(matches[0]);
      } else {
        populateInfoPanel(matches[0]);
      }
      
      render(); 
      msgEl.text(''); 
      return;
    } else if (matches.length > 1) {
      suggestionsEl.style('display','block').html('');
      matches.slice(0, CONFIG.maxSuggestions).forEach(m => {
        suggestionsEl.append('div').attr('class','suggestion').text(m.name).on('click', () => {
          searchInput.value = m.name;
          suggestionsEl.style('display','none').html('');
          selectedNode = m;
          
          if (isStoryMode) {
            showEntityModal(m);
          } else {
            populateInfoPanel(m);
          }
          
          render();
        });
      });
      msgEl.text('Multiple matches — click a suggestion.'); 
      return;
    } else {
      msgEl.text('Search term not found. Please try again.');
    }
  }

  /************************************************************************
   * STORY MODE EVENT LISTENERS
   ************************************************************************/
  storyBtn.addEventListener('click', enterStoryMode);
  storyExitBtn.addEventListener('click', exitStoryMode);
  storyPrevBtn.addEventListener('click', () => navigateView('prev'));
  storyNextBtn.addEventListener('click', () => navigateView('next'));
  entityModalClose.addEventListener('click', hideEntityModal);

  /************************************************************************
   * INITIALIZE
   ************************************************************************/
  /************************************************************************
   * BOOT
   * - Standalone exported file: an embedded #leo-chart-data block exists,
   *   so we apply it and load the chart immediately (pure viewer).
   * - Tool: no embedded data; the authoring shell shows the start page and
   *   triggers loading once the user creates or loads a chart.
   ************************************************************************/
  function bootFromEmbeddedData() {
    const el = document.getElementById('leo-chart-data');
    if (!el) return false;
    try {
      applyChartData(JSON.parse(el.textContent));
    } catch (e) {
      console.error('Could not parse embedded chart data:', e);
    }
    render();
    autoLoadData();
    return true;
  }

  render();
  if (!bootFromEmbeddedData()) {
    // Tool mode: the authoring script will present the start page.
    // Expose the loader so the authoring shell can kick things off.
    window.__startChartLoad = autoLoadData;
  }
  </script>
