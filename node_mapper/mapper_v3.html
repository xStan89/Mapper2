    ctx.beginPath();
    ctx.moveTo(leftTopX, leftTopY);
    ctx.lineTo(rightTopX, rightTopY);
    ctx.lineTo(rightPointX, rightPointY);
    ctx.lineTo(rightBottomX, rightBottomY);
    ctx.lineTo(leftBottomX, leftBottomY);
    ctx.closePath();
    ctx.fill();
    
    // Draw text with rotation
    ctx.save();
    // Calculate angle from tangent at center
    let angle = Math.atan2(uy, ux);
    
    // Keep text readable (flip if upside down)
    if (angle > Math.PI / 2 || angle < -Math.PI / 2) {
      angle += Math.PI;
    }
    
    // Translate to curve position, rotate, then draw text at origin
    ctx.translate(curveX, curveY);
    ctx.rotate(angle);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(text, 0, 0);
    ctx.restore();
    
    ctx.restore();
  }

  function drawLink(l, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    
    // Check if either end of the link is hovered
    const isHovered = (hoveredNode && (l.source === hoveredNode || l.target === hoveredNode)) ||
                      (hoveredConnection && 
                       ((l.source.id === hoveredConnection.source && l.target.id === hoveredConnection.target) ||
                        (l.source.id === hoveredConnection.target && l.target.id === hoveredConnection.source)));
    
    // Check if either end is selected OR both ends are connected to the selected node
    const isSelected = selectedNode && (
      l.source === selectedNode || 
      l.target === selectedNode ||
      (adjacency.get(selectedNode.id)?.has(l.source.id) && adjacency.get(selectedNode.id)?.has(l.target.id))
    );
    
    // Check if either end is highlighted in current view (Story Mode)
    let isHighlighted = false;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const sourceHighlights = entityHighlightsMap.get(l.source.id);
      const targetHighlights = entityHighlightsMap.get(l.target.id);
      isHighlighted = (sourceHighlights && sourceHighlights.has(currentViewId)) || 
                      (targetHighlights && targetHighlights.has(currentViewId));
    }
    
    // Use default formatting (no conditional format)
    const lineColor = isHovered ? formattingSettings.lineHoverColor : formattingSettings.lineColor;
    
    // Determine base line thickness
    let baseLineThickness;
    if (formattingSettings.lineSizeMode === 'connectionValue' && l.connectionValue != null && !isNaN(l.connectionValue)) {
      baseLineThickness = getScaledLineThickness(l.connectionValue);
    } else {
      baseLineThickness = formattingSettings.lineThickness;
    }
    // Hover/selected lines are 1px thicker
    if (isHovered) baseLineThickness += 1;
    
    // Scale line thickness with the UI scale factor
    const lineThickness = baseLineThickness * uiScale;
    
    // Calculate curve control point for subtle curve
    const dx = l.target.x - l.source.x;
    const dy = l.target.y - l.source.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Perpendicular offset (15% of distance for subtle curve)
    const offset = dist * 0.15;
    const midX = (l.source.x + l.target.x) / 2;
    const midY = (l.source.y + l.target.y) / 2;
    
    // Control point perpendicular to line
    const controlX = midX - (dy / dist) * offset;
    const controlY = midY + (dx / dist) * offset;
    
    ctx.beginPath();
    // Draw tapered line: 1.5x width at source (A), 0.5x at target (B)
    const halfWidthSrc = (lineThickness / zoomLevel) * 0.75; // 1.5x / 2
    const halfWidthTgt = (lineThickness / zoomLevel) * 0.25; // 0.5x / 2
    
    // Perpendicular at source
    const t0 = { x: 2*(controlX - l.source.x), y: 2*(controlY - l.source.y) };
    const t0Len = Math.sqrt(t0.x*t0.x + t0.y*t0.y) || 1;
    const p0x = -t0.y / t0Len, p0y = t0.x / t0Len;
    
    // Perpendicular at target
    const t1 = { x: 2*(l.target.x - controlX), y: 2*(l.target.y - controlY) };
    const t1Len = Math.sqrt(t1.x*t1.x + t1.y*t1.y) || 1;
    const p1x = -t1.y / t1Len, p1y = t1.x / t1Len;
    
    // Perpendicular at control point (midpoint tangent)
    const tMid = { x: l.target.x - l.source.x, y: l.target.y - l.source.y };
    const tMidLen = Math.sqrt(tMid.x*tMid.x + tMid.y*tMid.y) || 1;
    const pMx = -tMid.y / tMidLen, pMy = tMid.x / tMidLen;
    const halfWidthMid = (halfWidthSrc + halfWidthTgt) / 2;
    
    // Draw filled shape: top edge (source→target), then bottom edge (target→source)
    ctx.moveTo(l.source.x + p0x * halfWidthSrc, l.source.y + p0y * halfWidthSrc);
    ctx.quadraticCurveTo(
      controlX + pMx * halfWidthMid, controlY + pMy * halfWidthMid,
      l.target.x + p1x * halfWidthTgt, l.target.y + p1y * halfWidthTgt
    );
    ctx.lineTo(l.target.x - p1x * halfWidthTgt, l.target.y - p1y * halfWidthTgt);
    ctx.quadraticCurveTo(
      controlX - pMx * halfWidthMid, controlY - pMy * halfWidthMid,
      l.source.x - p0x * halfWidthSrc, l.source.y - p0y * halfWidthSrc
    );
    ctx.closePath();
    ctx.fillStyle = lineColor;
    ctx.fill();
    
    // Draw chevron label based on showConnectionLabels setting
    const shouldShowLabel = formattingSettings.showConnectionLabels === 'always' 
      || (formattingSettings.showConnectionLabels === 'hover' && (isSelected || isHovered || isHighlighted));
    if (shouldShowLabel) {
      // Build chevron text: Note + formatted Value
      let chevronText = l.note || '';
      if (l.connectionValue != null && !isNaN(l.connectionValue)) {
        const fmtVal = formatValue(l.connectionValue, formattingSettings.connectionValuePrefix);
        if (chevronText) {
          chevronText += ' ' + fmtVal;
        } else {
          chevronText = fmtVal;
        }
      }
      if (chevronText) {
        ctx.globalAlpha = 1.0;
        drawChevronLabel(l.source.x, l.source.y, l.target.x, l.target.y, chevronText, lineColor);
      }
    }
    
    ctx.restore();
  }

  // Compute min/max connection values for line scaling (cached)
  let _lineSizeRange = null;
  function getLineSizeRange() {
    if (_lineSizeRange) return _lineSizeRange;
    const values = links.filter(l => l.connectionValue != null && !isNaN(l.connectionValue)).map(l => l.connectionValue);
    if (values.length === 0) return { min: 0, max: 1 };
    _lineSizeRange = { min: Math.min(...values), max: Math.max(...values) };
    return _lineSizeRange;
  }

  function getScaledLineThickness(value) {
    const range = getLineSizeRange();
    if (range.max === range.min) return 11; // midpoint
    const normalized = (value - range.min) / (range.max - range.min);
    return 2 + normalized * (20 - 2);
  }

  function drawNode(n, opacity, showImage=true) {
    ctx.save();
    const x = n.x, y = n.y;
    
    // No conditional formatting — use defaults only
    const isHovered = (hoveredNode && n === hoveredNode) ||
                      (hoveredConnection && (n.id === hoveredConnection.source || n.id === hoveredConnection.target));
    const isSelected = selectedNode && n === selectedNode;
    
    // Check if this node is connected to the hovered node
    const isConnectedToHovered = hoveredNode && hoveredNode !== n && 
                                  adjacency.get(hoveredNode.id)?.has(n.id);
    
    // Check if this node should be highlighted in the current view (Story Mode)
    let isHighlightedInView = false;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const highlightViews = entityHighlightsMap.get(n.id);
      isHighlightedInView = highlightViews && highlightViews.has(currentViewId);
    }
    
    // Get node shape from Shape Legend Category
    const shape = getNodeShape(n);
    
    // Use default formatting colors, with Color Legend Category on OUTLINE
    const nodeCats = getNodeCategories(n);
    const catColor = nodeCats.length > 0 ? categoryColorMap.get(nodeCats[0]) : null;
    const baseNodeColor = formattingSettings.nodeColor;
    const nodeColor = isHovered ? formattingSettings.nodeHoverColor : baseNodeColor;
    const baseOutlineColor = catColor || formattingSettings.outlineColor;
    const outlineColor = (isHovered || isSelected || isConnectedToHovered || isHighlightedInView) ? formattingSettings.outlineHoverColor : baseOutlineColor;
    const baseOutlineThickness = (isHovered || isSelected || isConnectedToHovered || isHighlightedInView) ? (formattingSettings.outlineThickness + 1) : formattingSettings.outlineThickness;
    
    // Scale outline thickness with the UI scale factor
    const outlineThickness = baseOutlineThickness * uiScale;
    
    // Node radius already includes scale factor from computeGridLayout
    const r = n.r;

    if (showImage && n.imageBitmap) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      // Clip to shape
      drawShapePath(ctx, shape, x, y, r);
      ctx.clip();
      const img = n.imageBitmap;
      const iw = img.width || img.naturalWidth || 1;
      const ih = img.height || img.naturalHeight || 1;
      const target = r * 2;
      const scale = Math.max(target / iw, target / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = x - dw / 2;
      const dy = y - dh / 2;
      try {
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, dx, dy, dw, dh);
      } catch (e) {
        drawShapePath(ctx, shape, x, y, r);
        ctx.fillStyle = nodeColor;
        ctx.fill();
      }
      ctx.restore();
    } else {
      ctx.save();
      ctx.globalAlpha = opacity;
      drawShapePath(ctx, shape, x, y, r);
      ctx.fillStyle = nodeColor;
      ctx.fill();
      ctx.restore();
    }

    // Draw outline with glow if this is the selected node
    ctx.save();
    ctx.globalAlpha = opacity;
    
    // Add pulsing glow for selected node
    if (selectedNode && n === selectedNode) {
      const pulsePhase = Math.sin(animationTime * 0.002) * 0.5 + 0.5; // Oscillates between 0 and 1
      const glowSize = (5 + pulsePhase * 10) * uiScale; // Scale glow with UI
      const glowAlpha = 0.5 + pulsePhase * 0.5; // Varies between 0.5 and 1
      
      // Convert hover outline color to rgba for glow effect
      const hoverColor = formattingSettings.outlineHoverColor;
      const rr = parseInt(hoverColor.slice(1, 3), 16);
      const gg = parseInt(hoverColor.slice(3, 5), 16);
      const bb = parseInt(hoverColor.slice(5, 7), 16);
      
      ctx.shadowColor = `rgba(${rr}, ${gg}, ${bb}, ${glowAlpha})`;
      ctx.shadowBlur = glowSize;
    }
    
    drawShapePath(ctx, shape, x, y, r);
    ctx.lineWidth = outlineThickness / zoomLevel;
    ctx.strokeStyle = outlineColor;
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawLabel(n) {
    const text = n.name || '';
    if (!text) return;
    ctx.save();
    ctx.font = `${CONFIG.labelFontSize / zoomLevel}px Rubik, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const metrics = ctx.measureText(text);
    const textW = metrics.width;
    const pad = CONFIG.labelBoxPadding / zoomLevel;
    const boxW = textW + pad * 2;
    const boxH = (CONFIG.labelFontSize + 6) / zoomLevel;
    const x = n.x - boxW / 2;
    const y = n.y + n.r + CONFIG.labelOffsetY / zoomLevel;

    ctx.save();
    ctx.globalAlpha = CONFIG.labelBoxOpacity;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    roundRectPath(x, y, boxW, boxH, 6 / zoomLevel);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#111827';
    ctx.fillText(text, n.x, y + boxH / 2);
    ctx.restore();
  }

  function shouldHighlightNode(node) {
    // In story mode, nodes not in current view should be unhighlighted (low opacity)
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);
      if (!currentViewEntities.has(node.id)) {
        return false; // Not in current view, show with low opacity
      }
    }
    
    if (!selectedNode) return true;
    const activeSet = new Set([selectedNode.id, ...(adjacency.get(selectedNode.id) || [])]);
    return activeSet.has(node.id);
  }


  /************************************************************************
   * LEGEND FUNCTIONS
   ************************************************************************/
  // Function to extract unique categories and assign colors
  // Helper: get color legend category for a node (single value, not comma-separated)
  function getNodeCategories(node) {
    if (!node.raw || !node.raw['Color Legend Category']) return [];
    const cat = node.raw['Color Legend Category'].trim();
    return cat ? [cat] : [];
  }

  // Helper: get shape legend category for a node
  function getNodeShapeCategory(node) {
    if (!node.raw || !node.raw['Shape Legend Category']) return '';
    return node.raw['Shape Legend Category'].trim();
  }

  function updateCategoryColors() {
    // Build color map from colorLegendEntries (from Options CSV)
    categoryColorMap.clear();
    const enabledEntries = colorLegendEntries.filter(e => e.enabled && e.label && e.color);
    enabledEntries.forEach(e => {
      categoryColorMap.set(e.label, e.color);
    });
    
    // Collect unique categories from nodes, maintaining CSV legend order
    const categories = new Set();
    nodes.forEach(node => {
      getNodeCategories(node).forEach(cat => categories.add(cat));
    });
    
    // Order categories according to colorLegendEntries order
    const legendLabelOrder = colorLegendEntries.filter(e => e.enabled && e.label).map(e => e.label);
    uniqueCategories = [];
    legendLabelOrder.forEach(label => {
      if (categories.has(label)) uniqueCategories.push(label);
    });
    // Append any categories not in the legend entries at the end
    categories.forEach(cat => {
      if (!uniqueCategories.includes(cat)) uniqueCategories.push(cat);
    });
    
    // Only keep categories that have a color mapping in the legend
    // (nodes without a matching category get default color)
    
    // Add all categories as active by default
    uniqueCategories.forEach(cat => {
      if (!activeCategories.has(cat)) {
        activeCategories.add(cat);
      }
    });
    
    // Remove categories that no longer exist
    const currentCategories = new Set(uniqueCategories);
    Array.from(activeCategories).forEach(cat => {
      if (!currentCategories.has(cat)) {
        activeCategories.delete(cat);
      }
    });
    
    // Build shape categories
    const shapeCats = new Set();
    nodes.forEach(node => {
      const sc = getNodeShapeCategory(node);
      if (sc) shapeCats.add(sc);
    });
    uniqueShapeCategories = Array.from(shapeCats);
    // Maintain order from shapeLegendEntries
    const shapeLabelOrder = shapeLegendEntries.filter(e => e.enabled && e.label).map(e => e.label);
    uniqueShapeCategories.sort((a, b) => {
      const ia = shapeLabelOrder.indexOf(a);
      const ib = shapeLabelOrder.indexOf(b);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    });
    uniqueShapeCategories.forEach(cat => {
      if (!activeShapeCategories.has(cat)) activeShapeCategories.add(cat);
    });
    const currentShapeCats = new Set(uniqueShapeCategories);
    Array.from(activeShapeCategories).forEach(cat => {
      if (!currentShapeCats.has(cat)) activeShapeCategories.delete(cat);
    });
  }

  // Function to update legend display
  function updateLegend() {
    if (!legendContainer) return;
    
    // Only show legend if there are enabled color legend entries with matching categories
    const legendCategories = uniqueCategories.filter(cat => categoryColorMap.has(cat));
    
    if (legendCategories.length === 0) {
      legendContainer.style.display = 'none';
      return;
    }
    
    legendContainer.style.display = 'flex';
    legendContainer.innerHTML = '';
    
    legendCategories.forEach(category => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      if (!activeCategories.has(category)) {
        item.classList.add('inactive');
      }
      
      const colorBox = document.createElement('div');
      colorBox.className = 'legend-color-box';
      colorBox.style.backgroundColor = categoryColorMap.get(category);
      
      const label = document.createElement('span');
      label.textContent = category;
      
      item.appendChild(colorBox);
      item.appendChild(label);
      
      item.addEventListener('click', () => {
        const isOnlyActive = activeCategories.size === 1 && activeCategories.has(category);
        
        if (isOnlyActive) {
          activeCategories.clear();
          uniqueCategories.forEach(cat => activeCategories.add(cat));
        } else {
          activeCategories.clear();
          activeCategories.add(category);
        }
        
        updateLegend();
        render();
      });
      
      legendContainer.appendChild(item);
    });
    
    legendContainer.style.display = 'flex';
    legendContainer.style.visibility = 'visible';
    legendContainer.style.opacity = '1';
  }

  /************************************************************************
   * SHAPE DRAWING HELPERS
   ************************************************************************/
  function drawShapePath(ctx, shape, x, y, r) {
    switch (shape) {
      case 'square':
        ctx.beginPath();
        ctx.rect(x - r, y - r, r * 2, r * 2);
        break;
      case 'triangle':
        ctx.beginPath();
        ctx.moveTo(x, y - r * 1.15);
        ctx.lineTo(x + r * 1.05, y + r * 0.75);
        ctx.lineTo(x - r * 1.05, y + r * 0.75);
        ctx.closePath();
        break;
      case 'diamond':
        ctx.beginPath();
        ctx.moveTo(x, y - r * 1.15);
        ctx.lineTo(x + r * 1.0, y);
        ctx.lineTo(x, y + r * 1.15);
        ctx.lineTo(x - r * 1.0, y);
        ctx.closePath();
        break;
      case 'circle':
      default:
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        break;
    }
  }

  function getNodeShape(node) {
    // Check Shape Legend Category
    const shapeCat = getNodeShapeCategory(node);
    if (shapeCat && shapeCategoryMap.has(shapeCat)) {
      return shapeCategoryMap.get(shapeCat);
    }
    return formattingSettings.nodeShape || 'circle';
  }

  /************************************************************************
   * SHAPE LEGEND
   ************************************************************************/
  const SHAPE_ICONS = { circle: '〇', square: '◻', triangle: '△', diamond: '◇' };

  function updateShapeLegend() {
    if (!shapeLegendContainer) return;

    const activeItems = shapeLegendEntries.filter(e => e.enabled && e.label.trim());
    if (activeItems.length === 0) {
      shapeLegendContainer.style.display = 'none';
      return;
    }

    shapeLegendContainer.style.display = 'flex';
    shapeLegendContainer.innerHTML = '';

    activeItems.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'shape-legend-item';
      item.style.cursor = 'pointer';
      item.style.transition = 'all 0.2s';
      
      // Dim if this shape category is filtered out
      if (!activeShapeCategories.has(entry.label)) {
        item.style.opacity = '0.4';
      }

      const icon = document.createElement('span');
      icon.className = 'shape-legend-icon';
      icon.textContent = SHAPE_ICONS[entry.shape] || '〇';

      const label = document.createElement('span');
      label.textContent = entry.label;

      item.appendChild(icon);
      item.appendChild(label);
      
      item.addEventListener('click', () => {
        const isOnlyActive = activeShapeCategories.size === 1 && activeShapeCategories.has(entry.label);
        if (isOnlyActive) {
          activeShapeCategories.clear();
          uniqueShapeCategories.forEach(cat => activeShapeCategories.add(cat));
        } else {
          activeShapeCategories.clear();
          activeShapeCategories.add(entry.label);
        }
        updateShapeLegend();
        render();
      });
      
      shapeLegendContainer.appendChild(item);
    });
  }

  /************************************************************************
   * RENDER
   ************************************************************************/
  function drawGridOverlay() {
    const half = CONFIG.gridUnits / 2; // 30
    ctx.save();
    ctx.lineWidth = 1 / zoomLevel;
    for (let i = -half; i <= half; i++) {
      const isAxis = (i === 0);
      const isMajor = (i % 5 === 0);
      ctx.strokeStyle = isAxis ? 'rgba(0,0,0,0.32)'
        : isMajor ? 'rgba(0,0,0,0.16)'
        : 'rgba(0,0,0,0.06)';
      // vertical line at grid-x = i
      const v1 = gridToPixel(i, -half), v2 = gridToPixel(i, half);
      ctx.beginPath(); ctx.moveTo(v1.x, v1.y); ctx.lineTo(v2.x, v2.y); ctx.stroke();
      // horizontal line at grid-y = i
      const h1 = gridToPixel(-half, i), h2 = gridToPixel(half, i);
      ctx.beginPath(); ctx.moveTo(h1.x, h1.y); ctx.lineTo(h2.x, h2.y); ctx.stroke();
    }
    ctx.restore();
  }

  function render() {
    animationTime = Date.now();
    clearCanvas();
    if (!nodes || nodes.length === 0) return;

    ctx.save();
    applyTransform();

    // Snap-grid overlay (only while dragging a node in the tool)
    if (showGridOverlay) drawGridOverlay();

    // Filter nodes based on story mode
    let visibleNodes = nodes.filter(n => n.show);
    const highlightedNodes = [];
    const unhighlightedNodes = [];
    
    visibleNodes.forEach(node => {
      // Check if node should be highlighted based on selection AND legend filtering
      let shouldHighlight = shouldHighlightNode(node);
      
      // If color legend filtering is active, dim non-matching nodes
      if (activeCategories.size < uniqueCategories.length) {
        const nodeCats = getNodeCategories(node);
        if (nodeCats.length === 0 || !nodeCats.some(c => activeCategories.has(c))) {
          shouldHighlight = false;
        }
      }
      
      // If shape legend filtering is active, dim non-matching nodes
      if (activeShapeCategories.size < uniqueShapeCategories.length) {
        const sc = getNodeShapeCategory(node);
        if (!sc || !activeShapeCategories.has(sc)) {
          shouldHighlight = false;
        }
      }
      
      if (shouldHighlight) {
        highlightedNodes.push(node);
      } else {
        unhighlightedNodes.push(node);
      }
    });

    // Draw unhighlighted nodes first (dimmed)
    unhighlightedNodes.forEach(n => drawNode(n, CONFIG.unconnectedOpacity, CONFIG.showImages));

    const highlightedSet = new Set(highlightedNodes.map(n => n.id));
    let visibleLinks = links.filter(l => l.source.show && l.target.show);
    
    // In story mode, only show links where BOTH nodes are in current view
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);
      visibleLinks = visibleLinks.filter(l => currentViewEntities.has(l.source.id) && currentViewEntities.has(l.target.id));
    }
    
    // Draw links - ONLY draw links between highlighted nodes when there's a selection
    // Sort links by priority: selected & hovered > selected & not hovered > unselected & hovered > unselected & not hovered
    
    // Helper function to check if a node's category is active
    const isNodeCategoryActive = (node) => {
      // Color legend filter
      if (uniqueCategories.length > 0 && activeCategories.size < uniqueCategories.length) {
        const nodeCats = getNodeCategories(node);
        if (nodeCats.length === 0 || !nodeCats.some(c => activeCategories.has(c))) return false;
      }
      // Shape legend filter
      if (uniqueShapeCategories.length > 0 && activeShapeCategories.size < uniqueShapeCategories.length) {
        const sc = getNodeShapeCategory(node);
        if (!sc || !activeShapeCategories.has(sc)) return false;
      }
      return true;
    };
    const sortedLinks = visibleLinks.slice().sort((a, b) => {
      const aIsSelected = selectedNode && (a.source === selectedNode || a.target === selectedNode);
      const bIsSelected = selectedNode && (b.source === selectedNode || b.target === selectedNode);
      const aIsHovered = hoveredNode && (a.source === hoveredNode || a.target === hoveredNode);
      const bIsHovered = hoveredNode && (b.source === hoveredNode || b.target === hoveredNode);
      
      // Calculate priority (higher number = drawn later = appears on top)
      const aPriority = (aIsSelected ? 2 : 0) + (aIsHovered ? 1 : 0);
      const bPriority = (bIsSelected ? 2 : 0) + (bIsHovered ? 1 : 0);
      
      return aPriority - bPriority; // Draw lower priority first
    });
    
    if (selectedNode) {
      sortedLinks.forEach(l => {
        if (highlightedSet.has(l.source.id) && highlightedSet.has(l.target.id)) {
          const bothActive = isNodeCategoryActive(l.source) && isNodeCategoryActive(l.target);
          const opacity = bothActive ? CONFIG.linkOpacitySelected : CONFIG.unconnectedOpacity;
          drawLink(l, opacity);
        }
      });
    } else {
      sortedLinks.forEach(l => {
        const bothActive = isNodeCategoryActive(l.source) && isNodeCategoryActive(l.target);
        const opacity = bothActive ? CONFIG.linkOpacityNoSelection : CONFIG.unconnectedOpacity;
        drawLink(l, opacity);
      });
    }

    // Draw highlighted nodes on top
    highlightedNodes.forEach(n => drawNode(n, CONFIG.pointOpacity, CONFIG.showImages));

    // Draw labels based on showNodeLabels setting
    if (formattingSettings.showNodeLabels === 'always') {
      // Draw labels for ALL visible highlighted nodes
      highlightedNodes.forEach(n => drawLabel(n));
      unhighlightedNodes.forEach(n => drawLabel(n));
    } else {
      // Default 'hover' mode: labels on selection, connections, and hover
      if (selectedNode) {
        highlightedNodes.forEach(n => {
          if (adjacency.get(selectedNode.id).has(n.id) || n === selectedNode) {
            drawLabel(n);
          }
        });
      }

      // Draw label for hovered node (if not already labeled)
      if (hoveredNode && hoveredNode !== selectedNode && hoveredNode.show) {
        drawLabel(hoveredNode);
      }
    }

    ctx.restore();
    
    // Schedule next animation frame only if a node is selected (for glow animation)
    if (selectedNode && !animationScheduled) {
      animationScheduled = true;
      setTimeout(() => {
        animationScheduled = false;
        requestAnimationFrame(render);
      }, 50); // ~20 FPS for smooth animation with less CPU usage
    }
  }

  /************************************************************************
   * INTERACTION HELPERS
   ************************************************************************/
  function getCanvasPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.clientX - rect.left) * (canvas.width / (devicePixelRatio)) / rect.width;
    const y = (evt.clientY - rect.top) * (canvas.height / (devicePixelRatio)) / rect.height;
    
    const centerX = (canvas.width/(devicePixelRatio)) / 2;
    const centerY = (canvas.height/(devicePixelRatio)) / 2;
    
    const transformedX = (x - centerX - panX) / zoomLevel + centerX;
    const transformedY = (y - centerY - panY) / zoomLevel + centerY;
    
    return { x: transformedX, y: transformedY };
  }

  function findNodeAtPos(x, y) {
    if (!nodes || nodes.length === 0) return null;
    let visibleNodes = nodes.filter(n => n.show);
    
    if (selectedNode) {
      const activeSet = new Set([selectedNode.id, ...(adjacency.get(selectedNode.id) || [])]);
      const activeNodes = visibleNodes.filter(n => activeSet.has(n.id));
      for (let i = activeNodes.length - 1; i >= 0; i--) {
        const n = activeNodes[i];
        if (Math.hypot(n.x - x, n.y - y) <= n.r) return n;
      }
      const otherNodes = visibleNodes.filter(n => !activeSet.has(n.id));
      for (let i = otherNodes.length - 1; i >= 0; i--) {
        const n = otherNodes[i];
        if (Math.hypot(n.x - x, n.y - y) <= n.r) return n;
      }
    } else {
      for (let i = visibleNodes.length - 1; i >= 0; i--) {
        const n = visibleNodes[i];
        if (Math.hypot(n.x - x, n.y - y) <= n.r) return n;
      }
    }
    return null;
  }

  function updateCanvasCursor() {
    if (isDragging) {
      canvas.style.cursor = 'grabbing';
    } else if (zoomLevel > 1.0) {
      canvas.style.cursor = 'grab';
    } else {
      canvas.style.cursor = 'default';
    }
  }

  /************************************************************************
   * CANVAS EVENT LISTENERS
   ************************************************************************/
  canvas.addEventListener('mousedown', (evt) => {
    if (evt.button !== 0) return;
    if (AUTH && AUTH.onDown(evt)) return; // authoring drag took over

    didDrag = false;

    if (zoomLevel > 1.0) {
      // Panning canvas
      isDragging = true;
      dragStartX = evt.clientX;
      dragStartY = evt.clientY;
      dragStartPanX = panX;
      dragStartPanY = panY;
      updateCanvasCursor();
      evt.preventDefault();
    }
  });

  canvas.addEventListener('mousemove', (evt) => {
    if (AUTH && AUTH.onMove(evt)) return; // authoring drag took over

    if (isDragging && zoomLevel > 1.0) {
      didDrag = true;
      const deltaX = evt.clientX - dragStartX;
      const deltaY = evt.clientY - dragStartY;
      panX = dragStartPanX + deltaX / zoomLevel;
      panY = dragStartPanY + deltaY / zoomLevel;
      render();
      evt.preventDefault();
    } else {
      // Hover effect
      const pos = getCanvasPos(evt);
      const n = findNodeAtPos(pos.x, pos.y);
      if (n !== hoveredNode) {
        hoveredNode = n;
        render();
      }
      if (AUTH && !isStoryMode) {
        canvas.style.cursor = n ? 'grab' : (zoomLevel > 1.0 ? 'grab' : 'default');
      }
    }
  });

  canvas.addEventListener('mouseup', (evt) => {
    if (AUTH && AUTH.onUp(evt)) return; // authoring drag took over

    if (isDragging) {
      isDragging = false;
      updateCanvasCursor();
      
      // Only treat as click if we didn't drag
      if (!didDrag) {
        const pos = getCanvasPos(evt);
        const n = findNodeAtPos(pos.x, pos.y);
        if (n) {
          selectedNode = n;
          if (isStoryMode) {
            showEntityModal(n);
          } else {
            populateInfoPanel(n);
          }
          render();
        } else {
          selectedNode = null;
          if (isStoryMode) {
            hideEntityModal();
          } else {
            clearInfoPanel();
          }
          render();
        }
      }
      evt.preventDefault();
      return;
    }
  });

  canvas.addEventListener('click', (evt) => {
    if (didDrag) {
      didDrag = false;
      evt.preventDefault();
      return;
    }
    if (isDragging) return;
    const pos = getCanvasPos(evt);
    const n = findNodeAtPos(pos.x, pos.y);
    if (n) {
      selectedNode = n;
      if (isStoryMode) {
        showEntityModal(n);
      } else {
        populateInfoPanel(n);
      }
      render();
    } else {
      selectedNode = null;
      hoveredConnection = null;
      if (isStoryMode) {
        hideEntityModal();
      } else {
        clearInfoPanel();
      }
      render();
    }
  });

  canvas.addEventListener('mouseleave', (evt) => {
    isDragging = false;
    didDrag = false;
    updateCanvasCursor();
    if (hoveredNode) {
      hoveredNode = null;
      render();
    }
  });

  canvas.addEventListener('wheel', (evt) => {
    evt.preventDefault();
    if (evt.deltaY < 0) {
      zoomIn();
    } else {
      zoomOut();
    }
  });

  /************************************************************************
   * ZOOM CONTROLS
   ************************************************************************/
  function zoomIn() {
    zoomLevel = Math.min(CONFIG.zoomMax, zoomLevel + CONFIG.zoomStep);
    updateCanvasCursor();
    render();
  }
  
  function zoomOut() {
    zoomLevel = Math.max(CONFIG.zoomMin, zoomLevel - CONFIG.zoomStep);
    updateCanvasCursor();
    render();
  }
  
  function resetZoom() {
    zoomLevel = 0.9;
    panX = 0;
    panY = 0;
    
    // CRITICAL: Clear inline styles that lock canvas size!
    // resizeCanvas() sets inline styles, which prevent proper resizing
    canvas.style.width = '';
    canvas.style.height = '';
    
    // Force reflow so getBoundingClientRect() reads the CSS size
    void canvas.offsetHeight;
    
    // Now resize canvas (will read correct CSS dimensions)
    resizeCanvas();
    
    // Rescale nodes to fit the actual available space
    if (nodes.length > 0) {
      computeGridLayout();
    }
    
    // Update simulation center
    if (simulation && simulation.force) { 
      const c = simulation.force('center'); 
      if (c) {
        c.x((canvas.width/(devicePixelRatio))/2);
        c.y((canvas.height/(devicePixelRatio))/2);
      }
    }
    
    updateCanvasCursor();
    render();
  }

  zoomInBtn.addEventListener('click', zoomIn);
  zoomOutBtn.addEventListener('click', zoomOut);
  zoomResetBtn.addEventListener('click', resetZoom);

  /************************************************************************
   * FULLSCREEN FUNCTIONALITY
   ************************************************************************/
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      // Enter fullscreen
      const element = document.documentElement; // or document.getElementById('wrap') for just the tool
      if (element.requestFullscreen) {
        element.requestFullscreen().catch(err => {
        });
      } else if (element.webkitRequestFullscreen) { // Safari

      resizeCanvas();
      if (nodes.length > 0) {

  function onSearchInput() {
    const q = searchInput.value.trim();
    suggestionsEl.style('display', 'none').html('');
    msgEl.text('');
    if (!q || q.length < 3) return;
    const term = q.toLowerCase();
    const matches = [];
    
    // In story mode, only search within current view's entities
    let searchSpace = nameIndex;
    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = viewEntitiesCache.get(currentViewId) || [];
      searchSpace = currentViewEntities;
    }
    
    for (const name of searchSpace) {
      if (name && name.toLowerCase().includes(term)) matches.push(name);
      if (matches.length >= CONFIG.maxSuggestions) break;
    }
    if (matches.length === 0) {
      suggestionsEl.style('display','block').html('<div class="muted">No suggestions</div>');
      return;
    }
    suggestionsEl.style('display','block').html('');
    matches.forEach(m => {
      suggestionsEl.append('div').attr('class','suggestion').text(m).on('click', () => {
        searchInput.value = m;

  }

  function performSearch(q) {

    if (isStoryMode && sortedViewIds.length > 0) {
      const currentViewId = sortedViewIds[currentViewIndex];
      const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);
      searchNodes = nodes.filter(n => currentViewEntities.has(n.id));
    }
    
    const exact = searchNodes.find(n => n.name && n.name.toLowerCase() === q.toLowerCase());
    if (exact) {
      selectedNode = exact;
      
      if (isStoryMode) {
        showEntityModal(exact);
      } else {
        populateInfoPanel(exact);
      }
      
      render(); 
      msgEl.text(''); 
      return;
    }
    const matches = searchNodes.filter(n => n.name && n.name.toLowerCase().includes(q.toLowerCase()));
    if (matches.length === 1) {
      selectedNode = matches[0];
      
      if (isStoryMode) {
        showEntityModal(matches[0]);
      } else {
        populateInfoPanel(matches[0]);
      }
      
      render(); 
      msgEl.text(''); 
      return;
    } else if (matches.length > 1) {
      suggestionsEl.style('display','block').html('');
      matches.slice(0, CONFIG.maxSuggestions).forEach(m => {
        suggestionsEl.append('div').attr('class','suggestion').text(m.name).on('click', () => {

    } else {

    }
  }

  function bootFromEmbeddedData() {

    if (backBtn) { showScreen(backBtn.dataset.back); return; }
    if (!goBtn) return;
    const go = goBtn.dataset.go;
    if (go === 'new') {
      document.getElementById('sc-ent').value = DEMO_URLS.entities || '';
      document.getElementById('sc-conn').value = DEMO_URLS.connections || '';
      document.getElementById('sc-views').value = DEMO_URLS.views || '';
      showScreen('name');
    } else if (go === 'load') {
      showScreen('load');
    } else if (go === 'connect') {
      showScreen('connect');
    } else if (go === 'physics') {
      const ent = document.getElementById('sc-ent').value.trim();
      const conn = document.getElementById('sc-conn').value.trim();
      if (!ent || !conn) {
        document.getElementById('sc-connect-err').textContent = 'Entities and Connections links are both required.';
        return;
      }
      document.getElementById('sc-connect-err').textContent = '';
      showScreen('physics');
    } else if (go === 'create') {
      createNewChart();
    }
  });

  document.getElementById('sc-file').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const doc = new DOMParser().parseFromString(reader.result, 'text/html');
        const el = doc.getElementById('leo-chart-data');
        if (!el) throw new Error('This file has no saved chart data.');
        const data = JSON.parse(el.textContent);
        applyChartData(data);
        finishStart();
      } catch (err) {
        document.getElementById('sc-load-err').textContent = 'Could not read this file: ' + err.message;
      }
    };
    reader.onerror = () => { document.getElementById('sc-load-err').textContent = 'Could not read the file.'; };
    reader.readAsText(file);
  });

  function createNewChart() {
    chartName = (document.getElementById('sc-name').value.trim()) || 'Untitled Chart';
    document.title = chartName;
    CONFIG.entitiesUrl = document.getElementById('sc-ent').value.trim();
    CONFIG.connectionsUrl = document.getElementById('sc-conn').value.trim();
    CONFIG.viewsUrl = document.getElementById('sc-views').value.trim();
    CONFIG.formattingUrl = '';
    savedPositions = new Map();
    physicsMode = chosenPhysics;
    finishStart();
  }

  function finishStart() {
    ensureLegendArrays();
    overlay.style.display = 'none';
    buildOptionsForm();
    optionsPanel.classList.add('collapsed');
    if (typeof window.__startChartLoad === 'function') window.__startChartLoad();
  }

  function ensureLegendArrays() {
    while (colorLegendEntries.length < 12) colorLegendEntries.push({ enabled: false, label: '', color: '#888888' });
    const shapeDefs = [['Circle', 'circle'], ['Square', 'square'], ['Diamond', 'diamond'], ['Triangle', 'triangle']];
    if (shapeLegendEntries.length < 4) {
      const have = new Set(shapeLegendEntries.map(e => e.shape));
      shapeDefs.forEach(([, key]) => { if (!have.has(key)) shapeLegendEntries.push({ enabled: false, label: '', shape: key }); });
    }
  }

  /* ---------- options panel DOM ---------- */
  const optionsPanel = document.createElement('div');
  optionsPanel.id = 'options-panel';
  optionsPanel.className = 'authoring-only collapsed';
  optionsPanel.innerHTML = `
    <div id="options-head">
      <h2>Options</h2>
      <button class="auth-btn secondary" id="opt-newload" style="padding:6px 10px;font-size:12px;">New / Load</button>
      <button class="auth-btn" id="opt-collapse" style="padding:6px 10px;font-size:13px;">‹ Hide</button>
    </div>
    <div id="options-body"></div>`;
  document.body.appendChild(optionsPanel);

  const optionsToggle = document.createElement('button');
  optionsToggle.id = 'options-toggle';
  optionsToggle.className = 'authoring-only';
  optionsToggle.innerHTML = '⚙ Options';
  document.body.appendChild(optionsToggle);

  optionsToggle.addEventListener('click', () => {
    optionsPanel.classList.remove('collapsed');
    setTimeout(() => { if (nodes.length) computeGridLayout(); render(); }, 300);
  });
  optionsPanel.querySelector('#opt-collapse').addEventListener('click', () => {
    optionsPanel.classList.add('collapsed');
    setTimeout(() => { if (nodes.length) computeGridLayout(); render(); }, 300);
  });
  optionsPanel.querySelector('#opt-newload').addEventListener('click', () => {
    overlay.style.display = 'flex';
    showScreen('home');
  });

  /* ---------- apply settings live ---------- */
  function applyAndRender(restartPhysics) {
    document.documentElement.style.setProperty('--white', formattingSettings.backgroundColor || '#E3E3E3');
    rebuildShapeCategoryMap();
    CONFIG.force.linkStrength = getForceValue(formattingSettings.attractStrength, 'attract');
    CONFIG.force.linkDistance = getForceValue(formattingSettings.attractStrength, 'linkDistance');
    CONFIG.force.chargeStrength = getForceValue(formattingSettings.repelStrength, 'repel');
    CONFIG.force.collisionPadding = getForceValue(formattingSettings.paddingStrength, 'padding');
    updateNodeSizes();
    updateLogoFromSettings();
    updateTitleFromSettings();
    updateShareFromSettings();
    updateInfoPanelVisibility();
    loadBackgroundImage();
    updateCategoryColors();
    updateLegend();
    updateShapeLegend();
    computeGridLayout();
    if (restartPhysics && physicsMode === 'keepOn' && nodes.length) updatePhysics();
    if (selectedNode && !isStoryMode) {
    populateInfoPanel(selectedNode);
    }
    render();
  }

  /* ---------- form builder ---------- */
  const body = optionsPanel.querySelector('#options-body');

  function section(title, folded) {
    const sec = document.createElement('div');
    sec.className = 'opt-section' + (folded ? ' folded' : '');
    const h = document.createElement('h3'); h.textContent = title;
    const rows = document.createElement('div'); rows.className = 'opt-rows';
    h.addEventListener('click', () => sec.classList.toggle('folded'));
    sec.appendChild(h); sec.appendChild(rows);
    body.appendChild(sec);
    return rows;
  }
  function rowEl(labelText) {
    const r = document.createElement('div'); r.className = 'opt-row';
    if (labelText) { const l = document.createElement('label'); l.className = 'cap'; l.textContent = labelText; r.appendChild(l); }
    return r;
  }
  function checkboxRow(parent, labelText, key, restart) {
    const r = rowEl(labelText);
    const c = document.createElement('input'); c.type = 'checkbox'; c.checked = !!formattingSettings[key];
    c.addEventListener('change', () => { formattingSettings[key] = c.checked; applyAndRender(restart); });
    r.insertBefore(c, r.firstChild); parent.appendChild(r); return c;
  }
  function textRow(parent, labelText, key) {
    const r = rowEl(labelText);
    const t = document.createElement('input'); t.type = 'text'; t.value = formattingSettings[key] || '';
    t.addEventListener('input', () => { formattingSettings[key] = t.value; applyAndRender(false); });
    r.appendChild(t); parent.appendChild(r); return t;
  }
  function numberRow(parent, labelText, key, step) {
    const r = rowEl(labelText);
    const n = document.createElement('input'); n.type = 'number'; if (step) n.step = step; n.value = formattingSettings[key];
    n.addEventListener('input', () => { const v = parseFloat(n.value); if (!isNaN(v)) { formattingSettings[key] = v; applyAndRender(false); } });
    r.appendChild(n); parent.appendChild(r); return n;
  }
  function colorRow(parent, labelText, key) {
    const r = rowEl(labelText);
    const c = document.createElement('input'); c.type = 'color'; c.value = formattingSettings[key] || '#000000';
    c.addEventListener('input', () => { formattingSettings[key] = c.value; applyAndRender(false); });
    r.appendChild(c); parent.appendChild(r); return c;
  }
  function selectRow(parent, labelText, key, options, restart) {
    const r = rowEl(labelText);
    const s = document.createElement('select');
    options.forEach(([val, lab]) => { const o = document.createElement('option'); o.value = val; o.textContent = lab; s.appendChild(o); });
    s.value = formattingSettings[key];
    s.addEventListener('change', () => { formattingSettings[key] = s.value; applyAndRender(restart); });
    r.appendChild(s); parent.appendChild(r); return s;
  }

  const STRENGTHS = [['Barely at all', 'Barely at all'], ['A bit', 'A bit'], ['Moderately', 'Moderately'], ['A lot', 'A lot'], ['Strongly', 'Strongly']];

  function buildOptionsForm() {
    ensureLegendArrays();
    body.innerHTML = '';

    // Title
    let s = section('Title');
    checkboxRow(s, 'Show chart title', 'chartTitleEnabled', false);
    textRow(s, 'Chart title', 'chartTitle');
    checkboxRow(s, 'Show subtitle', 'chartSubtitleEnabled', false);
    textRow(s, 'Subtitle', 'chartSubtitle');

    // Nodes
    s = section('Nodes');
    selectRow(s, 'Size mode', 'nodeSizeMode', [
      ['connections', '# of connections'], ['custom', 'Fixed size'],
      ['connectionsOutTotal', 'Connections out total'], ['connectionsInTotal', 'Connections in total']
    ], false);
    numberRow(s, 'Fixed node size', 'nodeSize');
    numberRow(s, 'Min node size', 'minNodeSize');
    numberRow(s, 'Max node size', 'maxNodeSize');
    numberRow(s, 'Scale node size', 'sizeScale', '0.1');
    selectRow(s, 'Default shape', 'nodeShape', [['circle', 'Circle'], ['square', 'Square'], ['diamond', 'Diamond'], ['triangle', 'Triangle']], false);
    colorRow(s, 'Node color', 'nodeColor');
    colorRow(s, 'Node hover color', 'nodeHoverColor');
    colorRow(s, 'Outline color', 'outlineColor');
    colorRow(s, 'Outline hover color', 'outlineHoverColor');
    numberRow(s, 'Outline thickness', 'outlineThickness');

    // Lines
    s = section('Lines');
    selectRow(s, 'Line size mode', 'lineSizeMode', [['fixed', 'Fixed size'], ['connectionValue', 'Connection value']], false);
    numberRow(s, 'Line thickness', 'lineThickness');
    colorRow(s, 'Line color', 'lineColor');
    colorRow(s, 'Line hover color', 'lineHoverColor');

    // Auto-position
    s = section('Auto-position (physics)', true);
    // Physics mode binds to the module-level `physicsMode`, not formattingSettings
    const pmRow = rowEl('Physics mode');
    const pmSel = document.createElement('select');
    [['keepOn', 'Keep physics on for unfixed nodes'], ['freezeAfterInitial', 'Freeze after initial placement']]
      .forEach(([val, lab]) => { const o = document.createElement('option'); o.value = val; o.textContent = lab; pmSel.appendChild(o); });
    pmSel.value = physicsMode;
    pmSel.addEventListener('change', () => { physicsMode = pmSel.value; if (nodes.length) updatePhysics(); });
    pmRow.appendChild(pmSel); s.appendChild(pmRow);
    selectRow(s, 'Attract connected nodes', 'attractStrength', STRENGTHS, true);
    selectRow(s, 'Repel unconnected nodes', 'repelStrength', STRENGTHS, true);
    selectRow(s, 'Repel all nodes (padding)', 'paddingStrength', STRENGTHS, true);

    // Labels
    s = section('Labels');
    selectRow(s, 'Show node labels', 'showNodeLabels', [['hover', 'On hover'], ['always', 'Always']], false);
    selectRow(s, 'Show connection labels', 'showConnectionLabels', [['never', 'Never'], ['hover', 'On hover'], ['always', 'Always']], false);
    textRow(s, 'Connection value prefix', 'connectionValuePrefix');

    // Background & images
    s = section('Background & images');
    colorRow(s, 'Background color', 'backgroundColor');
    checkboxRow(s, 'Background image on', 'backgroundImageEnabled', false);
    textRow(s, 'Background image URL', 'backgroundImageUrl');
    checkboxRow(s, 'Logo on', 'logoEnabled', false);
    textRow(s, 'Logo URL', 'logoUrl');

    // Info panel
    s = section('Info panel', true);
    checkboxRow(s, 'Info panel on', 'infoPanelOn', false);
    checkboxRow(s, 'Show color legend category name', 'showColorLegendCategoryName', false);
    textRow(s, 'Color category title', 'colorLegendCategoryTitle');
    checkboxRow(s, 'Show shape legend category name', 'showShapeLegendCategoryName', false);
    textRow(s, 'Shape category title', 'shapeLegendCategoryTitle');
    checkboxRow(s, 'Show total IN value', 'showTotalInValue', false);
    textRow(s, 'Total IN title', 'totalInTitle');
    checkboxRow(s, 'Show total OUT value', 'showTotalOutValue', false);
    textRow(s, 'Total OUT title', 'totalOutTitle');
    checkboxRow(s, 'Show connections box title', 'showConnectionsBoxTitle', false);
    textRow(s, 'Connections box title', 'connectionsBoxTitle');

    // Color legend (12)
    s = section('Color legend', true);
    colorLegendEntries.forEach((entry, i) => {
      const r = document.createElement('div'); r.className = 'opt-legend-row';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!entry.enabled;
      const lab = document.createElement('input'); lab.type = 'text'; lab.placeholder = 'Category ' + (i + 1); lab.value = entry.label || '';
      const col = document.createElement('input'); col.type = 'color'; col.value = (entry.color && entry.color.startsWith('#')) ? entry.color : '#888888';
      cb.addEventListener('change', () => { entry.enabled = cb.checked; applyAndRender(false); });
      lab.addEventListener('input', () => { entry.label = lab.value; applyAndRender(false); });
      col.addEventListener('input', () => { entry.color = col.value; applyAndRender(false); });
      r.appendChild(cb); r.appendChild(lab); r.appendChild(col); s.appendChild(r);
    });

    // Shape legend (4)
    s = section('Shape legend', true);
    const shapeLabelByKey = { circle: 'Circle', square: 'Square', diamond: 'Diamond', triangle: 'Triangle' };
    shapeLegendEntries.forEach((entry) => {
      const r = document.createElement('div'); r.className = 'opt-legend-row';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!entry.enabled;
      const tag = document.createElement('span'); tag.style.cssText = 'font-size:12px;width:64px;'; tag.textContent = shapeLabelByKey[entry.shape] || entry.shape;
      const lab = document.createElement('input'); lab.type = 'text'; lab.placeholder = 'Category label'; lab.value = entry.label || '';
      cb.addEventListener('change', () => { entry.enabled = cb.checked; applyAndRender(false); });
      lab.addEventListener('input', () => { entry.label = lab.value; applyAndRender(false); });
      r.appendChild(cb); r.appendChild(tag); r.appendChild(lab); s.appendChild(r);
    });

    // Sharing
    s = section('Sharing', true);
    checkboxRow(s, 'Show sharing button', 'sharingEnabled', false);
    textRow(s, 'Sharing URL', 'sharingUrl');

    // Export
    s = section('Export');
    const hint = document.createElement('div'); hint.className = 'opt-hint';
    hint.textContent = 'Saved HTML reopens here to keep editing, and also works on its own as a live chart.';
    s.appendChild(hint);
    const ex = document.createElement('div'); ex.className = 'opt-export';
    const bHtml = document.createElement('button'); bHtml.className = 'auth-btn'; bHtml.textContent = 'Export saved HTML';
    const bPng = document.createElement('button'); bPng.className = 'auth-btn secondary'; bPng.textContent = 'Export PNG (4000px)';
    bHtml.addEventListener('click', exportHTML);
    bPng.addEventListener('click', exportPNG);
    ex.appendChild(bHtml); ex.appendChild(bPng); s.appendChild(ex);
  }

  /* ---------- node drag / shake / snap (tool only) ---------- */
  let dragNode = null, dragStartClient = null, dragOffset = null, dragMoved = false, shakeFlips = 0, lastSign = 0;
  AUTH = {
    onDown(evt) {
      if (isStoryMode) return false;
      const pos = getCanvasPos(evt);
      const n = findNodeAtPos(pos.x, pos.y);
      if (!n) return false;
      dragNode = n;
      dragStartClient = { x: evt.clientX, y: evt.clientY };
      dragOffset = { x: pos.x - n.x, y: pos.y - n.y };
      dragMoved = false; shakeFlips = 0; lastSign = 0;
      showGridOverlay = true;
      canvas.style.cursor = 'grabbing';
      evt.preventDefault();
      render();
      return true;
    },
    onMove(evt) {
      if (!dragNode) return false;
      const pos = getCanvasPos(evt);
      const nx = pos.x - dragOffset.x, ny = pos.y - dragOffset.y;
      const dx = nx - dragNode.x;
      const sign = dx > 0 ? 1 : (dx < 0 ? -1 : 0);
      if (sign !== 0 && lastSign !== 0 && sign !== lastSign && Math.abs(dx) > 2) shakeFlips++;
      if (sign !== 0) lastSign = sign;
      dragNode.x = nx; dragNode.y = ny; dragNode.fx = nx; dragNode.fy = ny;
      if (Math.hypot(evt.clientX - dragStartClient.x, evt.clientY - dragStartClient.y) > 4) dragMoved = true;
      render();
      evt.preventDefault();
      return true;
    },
    onUp(evt) {
      if (!dragNode) return false;
      const n = dragNode;
      dragNode = null; showGridOverlay = false; didDrag = true;
      canvas.style.cursor = 'grab';
      if (!dragMoved) {
        selectedNode = n;
        if (isStoryMode) showEntityModal(n); else populateInfoPanel(n);
        render();
        return true;
      }
      const shake = (physicsMode === 'keepOn' && shakeFlips >= 5);
      if (shake) {
        n.hasGridCoords = false; n.fx = null; n.fy = null;
        savedPositions.delete(n.name);
        if (simulation) simulation.alpha(0.7).restart();
      } else {
        const g = pixelToGrid(n.x, n.y);
        n.gridX = Math.round(g.gx / SNAP_UNITS) * SNAP_UNITS;
        n.gridY = Math.round(g.gy / SNAP_UNITS) * SNAP_UNITS;
        n.hasGridCoords = true;
        const px = gridToPixel(n.gridX, n.gridY);
        n.x = px.x; n.y = px.y; n.fx = px.x; n.fy = px.y;
        savedPositions.set(n.name, { x: n.gridX, y: n.gridY });
        if (physicsMode === 'keepOn' && simulation) simulation.alpha(0.5).restart();
      }
      render();
      return true;
    }
  };

  /* ---------- export: saved HTML ---------- */
  function gatherPositions() {
    const positions = {};
    nodes.forEach(n => {
      if (n.hasGridCoords && isFinite(n.gridX) && isFinite(n.gridY)) {
        positions[n.name] = { x: +(+n.gridX).toFixed(4), y: +(+n.gridY).toFixed(4) };
      }
    });
    return positions;
  }

  function exportHTML() {
    const data = {
      v: 1,
      title: chartName || 'chart',
      urls: { entities: CONFIG.entitiesUrl, connections: CONFIG.connectionsUrl, views: CONFIG.viewsUrl },
      physicsMode: physicsMode,
      settings: formattingSettings,
      colorLegend: colorLegendEntries,
      shapeLegend: shapeLegendEntries,
      positions: gatherPositions()
    };
    const clone = document.documentElement.cloneNode(true);
    clone.querySelectorAll('.authoring-only').forEach(el => el.remove());
    clone.querySelectorAll('#authoring-script, #html2canvas-script').forEach(el => el.remove());
    clone.querySelectorAll('#leo-chart-data').forEach(el => el.remove());
    const head = clone.querySelector('head');
    const dataScript = document.createElement('script');
    dataScript.id = 'leo-chart-data';
    dataScript.type = 'application/json';
    dataScript.textContent = JSON.stringify(data);
    head.appendChild(dataScript);
    const html = '<!doctype html>\n' + clone.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = sanitizeFilename(data.title) + '.html';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  /* ---------- export: high-res PNG ---------- */
  async function exportPNG() {
    if (typeof html2canvas === 'undefined') { alert('PNG library not loaded — check your connection and try again.'); return; }
    const savedSel = selectedNode, savedHover = hoveredNode, savedHoverConn = hoveredConnection;
    selectedNode = null; hoveredNode = null; hoveredConnection = null;
    const wasCollapsed = optionsPanel.classList.contains('collapsed');
    optionsPanel.classList.add('collapsed');
    const topControls = document.getElementById('top-controls');
    const tcDisplay = topControls ? topControls.style.display : '';
    if (topControls) topControls.style.display = 'none';
    const legToggle = document.getElementById('legend-toggle');
    const ltDisplay = legToggle ? legToggle.style.display : '';
    if (legToggle) legToggle.style.display = 'none';
    const ga = document.getElementById('graph-area');
    render();
    await new Promise(r => setTimeout(r, 60));
    const scale = 4000 / ga.getBoundingClientRect().width;
    try {
      const out = await html2canvas(ga, {
        scale: scale,
        backgroundColor: formattingSettings.backgroundColor || '#ffffff',
        useCORS: true,
        logging: false
      });
      const a = document.createElement('a');
      a.href = out.toDataURL('image/png');
      a.download = sanitizeFilename(chartName || 'chart') + '.png';
      document.body.appendChild(a); a.click(); a.remove();
    } catch (err) {
      alert('PNG export failed (an image may block cross-origin capture): ' + err.message);
    } finally {
      if (topControls) topControls.style.display = tcDisplay;
      if (legToggle) legToggle.style.display = ltDisplay;
      if (!wasCollapsed) optionsPanel.classList.remove('collapsed');
      selectedNode = savedSel; hoveredNode = savedHover; hoveredConnection = savedHoverConn;
      render();
    }
  }

  /* ---------- init: tool starts on the start page ---------- */
  const lo = document.getElementById('loading-overlay');
  if (lo) lo.style.display = 'none';   // hide spinner until a load actually begins
  showScreen('home');
  overlay.style.display = 'flex';
})();
</script>
