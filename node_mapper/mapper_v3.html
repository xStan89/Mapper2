<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Map Viewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap');
    
    :root {
      --white: #FFFFFF;
      --light-grey:  #d8d8d8;
      --panel-grey: #C2C2C2;
      --shadow-grey: #9E9E9E;
      --near-black: #383838;
      --text-black: #020202;
      --light-yellow: #FFEDB4;
      --main-yellow: #FFD241;
      --shadow-yellow: #DEB555;
      --error-red: #dc2626;
      --font-family: 'Rubik', Arial, Helvetica, sans-serif;
    }
    
    html,body { 
      width:100%;
      height: 100vh;
      margin:0; 
      font-family: var(--font-family); 
      background:var(--white); 
      align-items: center;
      justify-content: center;
    }
    html, body {overscroll-behavior: none;}

    #wrap { display:flex; width:100%; height:100%; overflow:hidden; }

    /* GRAPH AREA */
    #graph-area { position:relative; flex:1; background:var(--white); }
    canvas { width:100%; height:100%; display:block; background:var(--white); }

    /* LOGO */
    #logo {
      position: absolute;
      bottom: 6px;
      right: 22px;
      z-index: 10;
      opacity: 1;
      pointer-events: none;
    }
    
    #logo img {
      height: 55px;
      width: auto;
    }

    /* Legend styles */
    #legend-container {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 96%;
      max-height: 30vh;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      justify-content: center;
      align-items: center;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.95);
      border: 0px solid var(--panel-grey);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 100;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
    }

    #legend-container.collapsed {
      max-height: 0;
      padding: 0 12px;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 11px;
      font-weight: 500;
      user-select: none;
      line-height: 1.2;
    }

    .legend-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .legend-item.inactive {
      opacity: 0.4;
    }

    .legend-color-box {
      width: 8px;
      height: 8px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    /* Shape Legend Container */
    #shape-legend-container {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 96%;
      max-height: 30vh;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      justify-content: center;
      align-items: center;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.95);
      border: 0px solid var(--panel-grey);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .shape-legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      user-select: none;
      line-height: 1.2;
    }

    .shape-legend-icon {
      font-size: 10px;
      flex-shrink: 0;
      line-height: 1;
    }

    #legend-toggle {
      display: none;
      position: absolute;
      justify-content: center;
      align-items: center;
      padding: 4px;
      border: 1px solid var(--near-black);
      top: 12px;
      right: 12px;
      height: 20px;
      width: 20px;
      background: var(--white);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      z-index: 101;
      user-select: none;
      transition: all 0.2s;
      color: var(--text-black);
      line-height: 28px; 
    }

    #legend-toggle:hover {
      background: rgba(255, 255, 255, 1);
      background-color: var(--light-yellow);
    }

    #legend-toggle-icon {
      display: flex;
      transition: transform 0.3s ease;
      transform: rotate(90deg);
    }

    #legend-toggle-icon.collapsed {
      transform: rotate(90deg);
    }

    /* Mobile view adjustments */
    @media (max-width: 768px) {
      #legend-toggle {
        display: block;
      }
      
      #legend-container {
        left: auto;
        right: 10px;
        transform: none;
        padding-top: 10px;
        justify-content: flex-start;
      }
      
      #legend-container.collapsed {
        padding-top: 0;
      }
    }

    /* TOP CONTROLS - ZOOM */
    #top-controls {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    #zoom-controls {
      display: flex;
      gap: 8px;
    }
    
    .zoom-btn {
      height: 28px;
      width: 28px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: var(--white);
      color: var(--text-black);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family);
      border: 1px solid var(--near-black);
    }
    
    .zoom-btn:hover {
      background: var(--light-yellow);
    }
    
    #fullscreen-btn {
      height: 28px;
      width: 28px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: var(--white);
      color: var(--text-black);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family);
      border: 1px solid var(--near-black);
    }
    
    #fullscreen-btn:hover {
      background: var(--light-yellow);
    }

    #share-btn {
      height: 28px;
      width: 28px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: var(--white);
      color: var(--text-black);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family);
      border: 1px solid var(--near-black);
    }
    
    #share-btn:hover {
      background: var(--light-yellow);
    }

    #chart-title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-black);
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    #chart-subtitle {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-black);
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    /* INFO PANEL (RIGHT) */
    #info-panel {
      display: none;
      width: clamp(220px, 28vw, 420px);
      min-width: 200px;  
      max-width: 420px;
      height: 100vh;
      background: var(--white);
      color: var(--text-black);
      padding: clamp(8px, 1.2vw, 16px) clamp(10px, 1.5vw, 20px) clamp(8px, 1.2vw, 16px) clamp(8px, 1vw, 12px);
      box-sizing: border-box;
      flex-direction: column;
      border-left: 1px solid var(--white);
      font-size: clamp(12px, 1.1vw, 15px);
      overflow: hidden;
      transition: width 0.3s ease, min-width 0.3s ease, max-width 0.3s ease, padding 0.3s ease;
      position: relative;
    }
    
    #controls { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
      flex-shrink: 0; 
      margin-bottom: 8px;
    }
    #search-box { display: flex; width: 100%; gap: 6px; flex-wrap: wrap; }
    #search-input { 
      flex: 1; 
      min-width: 0;
      padding: 6px 8px; 
      border-radius: 4px; 
      border: 1px solid var(--shadow-grey); 
      background: rgba(255,255,255,0.5); 
      color: var(--text-black);
      font-family: var(--font-family); 
    }
    #search-btn { 
      height: 29px;
      padding: 1px 8px; 
      border-radius: 4px; 
      border: none; 
      cursor: pointer; 
      background: var(--main-yellow); 
      color: var(--text-black);
      font-family: var(--font-family);
      flex-shrink: 0;
      font-size: 18px;
      white-space: nowrap;
    }
    #clear-btn { 
      height: 29px;
      padding: 6px 6px; 
      border-radius: 4px; 
      border: none; 
      cursor: pointer; 
      background: var(--main-yellow); 
      color: var(--text-black);
      font-family: var(--font-family);
      flex-shrink: 0;
      white-space: nowrap;
      font-weight: bold;
    }
    
    #search-btn:hover, #clear-btn:hover {
      background: var(--light-yellow);
    }
    
    /* Hide search buttons in story mode */
    .story-mode-hide {
      display: none !important;
    }

    #suggestions { 
      background: rgba(255,255,255,0.5); 
      border: 1px solid var(--shadow-grey); 
      max-height: 160px; 
      overflow: auto; 
      display: none; 
      padding: 6px; 
      border-radius: 4px; 
    }
    .suggestion { 
      padding: 6px; 
      cursor: pointer; 
      border-bottom: 1px dashed var(--shadow-grey); 
    }
    .suggestion:hover { 
      background: var(--light-yellow); 
    }

    #node-info { 
      margin-top: 0px; 
      margin-bottom: 6px; 
      padding-left: 6px; 
      padding-right: 6px; 
      background: var(--white); 
      border-radius: 6px; 
      flex-shrink: 0;
    }
    #node-title { 
      font-weight: 700; 
      margin-top: 8px;
      font-size: clamp(13px, 1.1vw, 16px);
    }
    .muted { color: var(--shadow-grey); font-weight: 700; }

    #node-links {
      margin-top: 6px;
      flex-shrink: 0;
    }

    #connections-box {
      margin-top: 4px;
      background: var(--white);
      border-radius: 6px;
      padding: 6px;
      overflow: auto;
      border: 1px solid var(--shadow-grey);
      flex: 1;
      min-height: 2;
    }
    .conn-item {
      padding: clamp(4px, 0.5vw, 6px);
      cursor: pointer;
      font-size: clamp(12px, 1vw, 14px);
      color: var(--text-black);
      border-bottom: 1px dashed var(--shadow-grey);
    }
    .conn-item:hover { 
      background: var(--light-yellow); 
    }

    #msg { margin-top: 6px; color: var(--error-red); font-size: 14px; min-height: 18px; }

    /* MOBILE RESPONSIVE - HORIZONTAL BOTTOM PANEL */
    @media (max-width: 700px) {
      #wrap {
        flex-direction: column;
      }
      
      #graph-area {
        flex: 1;
        height: auto;
        max-height: 60vh;
      }
      
      #info-panel {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        height: 40vh;
        padding: 12px;
        border-left: none;
        border-top: 2px solid var(--shadow-grey);
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto auto auto 1fr auto;
        gap: 2px;
      }
      
      /* Row 1: Controls + Story button */
      #controls {
        grid-column: 1 / 2;
        grid-row: 1;
        margin-bottom: 0;
      }
      
      #search-box {
        display: flex;
        gap: 3px;
      }
      
      #search-input {
        flex: 1;
        min-width: 40px;
        font-size: 12px;
        padding: 4px 6px;
      }
      
      #search-btn {
        height: 29px;
        padding: 0px 6px;
        font-size: 16px;
      }
      
      #clear-btn {
        height: 29px;
        padding: 6px 6px;
        font-size: 11px;
      }
      
      #story-btn {
        height: 29px;
        grid-column: 2;
        grid-row: 1;
        width: auto !important;
        margin: 0 !important;
        padding: 6px 6px !important;
        font-size: 11px !important;
        align-self: start;
      }
      
      /* Row 2: Suggestions */
      #suggestions {
        grid-column: 1 / -1;
        grid-row: 2;
      }
      
      /* Row 3: Story view content */
      #view-content {
        grid-column: 1 / -1;
        grid-row: 2;
      }
      
      /* Row 4: Node info (title/description) */
      #node-info {
        grid-column: 1 / -1;
        grid-row: 3;
      }
      
      #node-title {
        font-size: 13px;
        grid-row: 2;
      }
      
      /* Row 5: Node links label */
      #node-links {
        grid-column: 1 / -1;
        grid-row: 4;
      }
      
      /* Row 6: Connections box (flexible/scrollable) */
      #connections-box {
        grid-column: 1 / -1;
        grid-row: 4;
        overflow: auto;
        min-height: 2px;
      }
      
      /* Row 7: Message */
      #msg {
        grid-column: 1 / -1;
        grid-row: 7;
      }
      
      #logo {
        bottom: 12px;
        right: 12px;
      }
      
      #logo img {
        height: 40px;
      }
    }

    /* LOADING OVERLAY */
    #loading-overlay {
      position: fixed;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: rgba(250,250,250,0.9);
      z-index: 99999;
      font-size: 16px;
      color: var(--text-black);
    }
    .spinner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 8px solid var(--shadow-grey);
      border-left-color: var(--main-yellow);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* STORY MODE BUTTONS */
    #story-btn {
      height: 29px;
      padding: 6px 6px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--main-yellow);
      color: black;
      font-family: var(--font-family);
      font-weight: bold;
      flex-shrink: 0;
      white-space: nowrap;
      margin-bottom: 8px;
      width: 100%;
      display: none;
      animation: outlinePulse 2s ease-in-out infinite;
    }
    
    @media (max-width: 768px) {
      #story-btn {
        width: auto;
      }
    }

    #story-btn:hover {
      background: var(--light-yellow);
    }

    #story-nav-container {
      display: none;
      gap: 4px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    #story-nav-container.active {
      display: flex;
    }

    .story-nav-btn {
      padding: 6px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--main-yellow);
      color: black;
      font-family: var(--font-family);
      font-weight: bold;
      font-size: 13px;
      white-space: nowrap;
      flex: 1;
    }

    .story-nav-btn:hover:not(:disabled) {
      background: var(--light-yellow);
    }

    .story-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .exit-story-nav-btn {
      padding: 6px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--panel-grey);
      color: black;
      font-family: var(--font-family);
      font-weight: bold;
      font-size: 13px;
      white-space: nowrap;
      flex: 1;
    }

    .exit-story-nav-btn:hover:not(:disabled) {
      background: var(--light-grey);
    }

    .exit-story-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @keyframes outlinePulse {
      0%, 100% { 
        outline: 0px solid var(--main-yellow);
        outline-offset: 0px;
        opacity: 1;
      }
      50% { 
        outline: 0px solid var(--light-yellow);
        outline-offset: 0px;
        opacity: 0.8;
      }
    }

    /* ENTITY MODAL IN STORY MODE */
    #entity-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--panel-grey);
      z-index: 1000;
      display: none;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
    }

    #entity-modal.active {
      display: flex;
    }

    #entity-modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: var(--error-red);
      color: white;
      font-family: var(--font-family);
      font-weight: bold;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }

    #entity-modal-close:hover {
      background: #b91c1c;
    }

    #entity-modal-content {
      flex: 1;
      overflow: auto;
      margin-top: 8px;
    }

    /* VIEW CONTENT STYLES */
    #view-content {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #view-content.active {
      display: flex;
    }
    #view-content {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #view-content.active {
      display: block;
    }

    .view-title {
      font-size: 28px;
      font-weight: 700;
      margin-top: 12px;
      margin-bottom: 12px;
      color: var(--text-black);
    }

    .view-progress {
      font-size: 13px;
      font-weight: 700;
      color: var(--shadow-grey);
      margin-top: 4px;
    }

    .view-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 12px;
      object-fit: contain;
    }

    .view-text {
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
      min-height: 0;
    }

    /* Story mode MOBILE adjustments */
    @media (max-width: 768px) {
      .view-title {
        font-size: 20px !important;
        margin-top: 6px !important;
        margin-bottom: 6px !important;
      }
      
      .view-text {
        font-size: 14px !important;
        line-height: 1.4 !important;
        padding-bottom: 6px !important;
      }
      
      .view-image {
        display: none !important;
      }
      
      #story-nav-container {
        margin-bottom: 6px !important;
        gap: 3px !important;
      }
      
      .story-nav-btn {
        padding: 6px 7px !important;
        font-size: 11px !important;
      }

      .exit-story-nav-btn {
        padding: 6px 7px !important;
        font-size: 11px !important;
      }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="graph-area">
      <canvas id="canvas"></canvas>
      
      <div id="logo">
        <img src="https://i.ibb.co/60z33Lp3/scroller-11.png" alt="Logo">
      </div>
      
      <!-- Shape Legend Container -->
      <div id="shape-legend-container" style="display: none;"></div>
      
      <!-- Legend Container -->
      <div id="legend-container" style="display: none;"></div>
      
      <!-- Legend Toggle Button for Mobile -->
      <div id="legend-toggle">
        <span id="legend-toggle-icon">Ⅲ</span>
      </div>

      
      <div id="top-controls">
        <div id="zoom-controls">
          <button id="zoom-in" class="zoom-btn" title="Zoom In">+</button>
          <button id="zoom-out" class="zoom-btn" title="Zoom Out">–</button>
          <button id="zoom-reset" class="zoom-btn" title="Reset Zoom">⛶</button>
          <button id="fullscreen-btn" title="Toggle Fullscreen">⌜⌟</button>
          <button id="share-btn" title="Copy Link" style="display:none;">🔗</button>
        </div>
      </div>

      <!-- Chart Title -->
      <div id="chart-title" style="display:none;"></div>
      <div id="chart-subtitle" style="display:none;"></div>

      <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading data...</div>
      </div>
    </div>

    <aside id="info-panel">
      <div id="controls">
        <div id="search-box">
          <input id="search-input" placeholder="Search..." />
          <button id="search-btn">⌕</button>
          <button id="clear-btn">Clear</button>
        </div>
      </div>
      <button id="story-btn">Start Story</button>
      <div id="suggestions"></div>

      <div id="view-content">
      <div id="story-nav-container">
        <div class="view-progress" id="view-progress"></div>
      </div>
        <button id="story-prev-btn" class="story-nav-btn">◄ Back</button>
        <button id="story-next-btn" class="story-nav-btn">Next ►</button>
        <button id="story-exit-btn" class="exit-story-nav-btn">Exit Story</button>
        <div class="view-title" id="view-title"></div>
        <img class="view-image" id="view-image" style="display: none;" />
        <div class="view-text" id="view-text"></div>
      </div>


      <div id="node-info">
        <div id="node-title">Click/hover on map or search for a person/group</div>
      </div>

      <div id="node-links"></div>

      <div id="connections-box"></div>

      <div id="msg"></div>

      <!-- Entity Modal for Story Mode -->
      <div id="entity-modal">
        <button id="entity-modal-close">✕</button>
        <div id="entity-modal-content">
          <div id="entity-modal-title"></div>
          <div id="entity-modal-connections"></div>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  // Toggle legend collapse state

  // Auto-collapse on mobile, expand on desktop

    if (isMobileView()) {

        legendContainer.classList.add('collapsed');
        legendToggleIcon.classList.add('collapsed');

    } else {

        legendContainer.classList.remove('collapsed');
        legendToggleIcon.classList.remove('collapsed');
      }

    // Rescale nodes if collapse state changed

  // Get the height of legend for padding calculations

  function getLegendPadding() {

    const titlePad = getTitlePadding();
    
    // Account for shape legend
    const hasShapeLegend = shapeLegendEntries.some(e => e.enabled && e.label.trim());

      shapeLegendContainer.style.top = (10 + titlePad) + 'px';
      padding += shapeLegendContainer.offsetHeight + 10;
    }
    
    if (legendContainer.style.display === 'none') return titlePad + (padding > 0 ? padding + 10 : 0);

  /************************************************************************

   ************************************************************************/
  function resizeCanvas() {
    // Clear inline styles to let CSS percentage sizing work
    canvas.style.width = '';
    canvas.style.height = '';
    
    // Force reflow to get actual available space
    void canvas.offsetHeight;
    
    const rect = canvas.getBoundingClientRect();
    const hiResScale = devicePixelRatio * 1.5;
    canvas.width  = Math.max(600, Math.floor(rect.width  * hiResScale));
    canvas.height = Math.max(400, Math.floor(rect.height * hiResScale));
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  /************************************************************************
   * NODE SIZING
   ************************************************************************/
  function updateNodeSizes() {
    if (nodes.length === 0) return;
    
    const mode = formattingSettings.nodeSizeMode;
    
    if (mode === 'custom') {
      // Fixed size for all nodes
      nodes.forEach(n => {
        n.baseR = formattingSettings.nodeSize;
        n.r = n.baseR;
      });
    } else {
      // Compute the metric for each node based on mode
      let metricValues = [];
      nodes.forEach(n => {
        let val = 0;
        if (mode === 'connections') {
          val = (adjacency.get(n.id) || new Set()).size;
        } else if (mode === 'connectionsOutTotal') {
          val = connectionOutTotals.get(n.id) || 0;
        } else if (mode === 'connectionsInTotal') {
          val = connectionInTotals.get(n.id) || 0;
        }
        n._sizeMetric = val;
        metricValues.push(val);
      });
      
      const maxVal = Math.max(...metricValues, 1);
      const minVal = Math.min(...metricValues, 0);
      
      nodes.forEach(n => {
        const normalized = maxVal > minVal 
          ? (n._sizeMetric - minVal) / (maxVal - minVal)
          : 0.5;
        n.baseR = formattingSettings.minNodeSize + normalized * (formattingSettings.maxNodeSize - formattingSettings.minNodeSize);
        n.r = n.baseR;
      });
    }
  }

  /************************************************************************
   * VALUE FORMATTING
   ************************************************************************/
  function formatValue(value, prefix) {
    if (value == null || isNaN(value)) return '';
    const absVal = Math.abs(value);
    let num, suffix;
    if (absVal >= 1e9) { num = value / 1e9; suffix = 'B'; }
    else if (absVal >= 1e6) { num = value / 1e6; suffix = 'M'; }
    else if (absVal >= 1e3) { num = value / 1e3; suffix = 'k'; }
    else { return (prefix || '') + String(Math.round(value)); }
    let str = num.toFixed(1);
    if (str.endsWith('.0')) str = str.slice(0, -2);
    return (prefix || '') + str + suffix;
  }

  /************************************************************************
   * PHYSICS STRENGTH MAPPING
   ************************************************************************/
  function getForceValue(strengthLabel, type) {
    const label = (strengthLabel || 'Moderately').trim();
    const map = {
      // linkStrength: how rigidly connected nodes pull together (0-1)
      attract:      { 'Barely at all': 0.05, 'A bit': 0.15, 'Moderately': 0.3,  'A lot': 0.5,  'Strongly': 0.7 },
      // linkDistance: target distance in px between connected nodes
      linkDistance:  { 'Barely at all': 300,  'A bit': 250,  'Moderately': 180,   'A lot': 140,  'Strongly': 100 },
      // chargeStrength: repulsion between ALL node pairs (negative = repel)
      repel:        { 'Barely at all': -50,   'A bit': -150, 'Moderately': -300,  'A lot': -600, 'Strongly': -1000 },
      // collisionPadding: extra px around node radius for collision avoidance
      padding:      { 'Barely at all': 5,     'A bit': 10,   'Moderately': 20,    'A lot': 35,   'Strongly': 50 }
    };
    return map[type]?.[label] ?? map[type]?.['Moderately'];
  }

  /************************************************************************
   * AUTO-LOAD DATA FROM GOOGLE SHEETS
   ************************************************************************/
  async function autoLoadData() {
    if (!CONFIG.entitiesUrl || !CONFIG.connectionsUrl) {
      loadingText.textContent = 'Set entitiesUrl and connectionsUrl in CONFIG.';
      return;
    }

    loadingOverlay.style.display = 'flex';
    loadingText.textContent = 'Loading data...';
    
    try {
      // Fetch entities and connections (required)
      const [entitiesResponse, connectionsResponse] = await Promise.all([
        fetch(CONFIG.entitiesUrl),
        fetch(CONFIG.connectionsUrl)
      ]);
      
      if (!entitiesResponse.ok || !connectionsResponse.ok) {
        throw new Error('Could not load required sheets (Entities and Connections)');
      }
      
      const entitiesText = await entitiesResponse.text();
      const connectionsText = await connectionsResponse.text();
      
      const entitiesData = Papa.parse(entitiesText, { header: true, skipEmptyLines: true }).data;
      const connectionsData = Papa.parse(connectionsText, { header: true, skipEmptyLines: true }).data;

      // NOTE: formatting is no longer read from a sheet — it is set via the
      // in-tool Options menu and stored in the saved HTML file.

      // Try to load views (optional)
      if (CONFIG.viewsUrl) {
        try {
          const viewsResponse = await fetch(CONFIG.viewsUrl);
          if (viewsResponse.ok) {
            const viewsText = await viewsResponse.text();
            const viewsDataParsed = Papa.parse(viewsText, { header: true, skipEmptyLines: true }).data;
            parseViewsData(viewsDataParsed);
          }
        } catch (e) {
          // Views sheet is optional, ignore errors
        }
      }
      
      loadSession(entitiesData, connectionsData);
      
    } catch (err) {
      loadingText.textContent = 'Error: ' + err.message;
      setTimeout(() => {
        // Update story button visibility
    updateStoryButtonVisibility();

    loadingOverlay.style.display = 'none';
      }, 3000);
    }
  }

  function parseViewsData(data) {
    if (!data || data.length === 0) return;
    
    // Clean headers
    data.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });

    viewsData = data.map(r => ({
      id: String(r['View ID'] || '').trim(),
      title: String(r['View Title'] || '').trim(),
      text: String(r['View Text'] || '').trim(),
      image: String(r['View Image'] || '').trim()
    })).filter(v => v.id);

    // Build views by ID map
    viewsById.clear();
    viewsData.forEach(v => {
      viewsById.set(v.id, v);
    });

    // Sort view IDs numerically
    sortedViewIds = viewsData.map(v => v.id).sort((a, b) => {
      const numA = parseInt(a);
      const numB = parseInt(b);
      if (!isNaN(numA) && !isNaN(numB)) {
        return numA - numB;
      }
      return a.localeCompare(b);
    });
  }

  function loadFormattingData(data) {
    if (!data || data.length === 0) return;
    
    // Clean headers
    data.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });
    
    // Build a lookup by Rule name, tracking current Category for blank-category rows
    const ruleMap = new Map();
    let currentCategory = '';
    data.forEach(row => {
      const cat = (row['Category'] || '').trim();
      const rule = (row['Rule'] || '').trim();
      if (cat) currentCategory = cat;
      if (!rule) return; // skip header/blank rows
      ruleMap.set(rule, {
        category: currentCategory,
        opt1: (row['Option 1'] || '').trim(),
        opt2: (row['Option 2'] || '').trim(),
        opt3: (row['Option 3'] || '').trim()
      });
    });
    
    const get = (rule) => ruleMap.get(rule);
    const toBool = (v) => String(v).toUpperCase() === 'TRUE';
    const toFloat = (v) => { const n = parseFloat(v); return isNaN(n) ? null : n; };
    
    // --- Auto-Size ---
    const nodeSizeMode = get('Node Size Mode');
    if (nodeSizeMode) {
      const modeStr = nodeSizeMode.opt1.toLowerCase();
      if (modeStr === '# of connections') formattingSettings.nodeSizeMode = 'connections';
      else if (modeStr === 'fixed size') formattingSettings.nodeSizeMode = 'custom';
      else if (modeStr === 'connections out total') formattingSettings.nodeSizeMode = 'connectionsOutTotal';
      else if (modeStr === 'connections in total') formattingSettings.nodeSizeMode = 'connectionsInTotal';
    }
    const lineSizeMode = get('Line Size Mode');
    if (lineSizeMode) {
      const modeStr = lineSizeMode.opt1.toLowerCase();
      if (modeStr === 'fixed size') formattingSettings.lineSizeMode = 'fixed';
      else if (modeStr === 'connection value') formattingSettings.lineSizeMode = 'connectionValue';
    }
    
    // --- Auto-Position ---
    const attract = get('Attract Connected Nodes');
    if (attract) formattingSettings.attractStrength = attract.opt1 || 'Moderately';
    const repel = get('Repel Unconnected Nodes');
    if (repel) formattingSettings.repelStrength = repel.opt1 || 'Moderately';
    const padding = get('Repel All Nodes (Padding)');
    if (padding) formattingSettings.paddingStrength = padding.opt1 || 'Moderately';
    
    // --- Sizing ---
    const fixedNodeSize = get('Fixed Node Size');
    if (fixedNodeSize) {
      const v = toFloat(fixedNodeSize.opt1);
      if (v !== null) formattingSettings.nodeSize = v;
    }
    const minNodeSize = get('Min Node Size');
    if (minNodeSize) {
      const v = toFloat(minNodeSize.opt1);
      if (v !== null) formattingSettings.minNodeSize = v;
    }
    const maxNodeSize = get('Max Node Size');
    if (maxNodeSize) {
      const v = toFloat(maxNodeSize.opt1);
      if (v !== null) formattingSettings.maxNodeSize = v;
    }
    const scaleNodeSize = get('Scale Node Size');
    if (scaleNodeSize) {
      const v = toFloat(scaleNodeSize.opt1);
      if (v !== null) formattingSettings.sizeScale = v;
    }
    const lineThickness = get('Line Thickness');
    if (lineThickness) {
      const v = toFloat(lineThickness.opt1);
      if (v !== null) formattingSettings.lineThickness = v;
    }
    const outlineThickness = get('Node Outline Thickness');
    if (outlineThickness) {
      const v = toFloat(outlineThickness.opt1);
      if (v !== null) formattingSettings.outlineThickness = v;
    }
    
    // --- Color ---
    const nodeColor = get('Node Color');
    if (nodeColor) {
      if (nodeColor.opt1 && nodeColor.opt1.startsWith('#')) formattingSettings.nodeColor = nodeColor.opt1;
      if (nodeColor.opt2 && nodeColor.opt2.startsWith('#')) formattingSettings.nodeHoverColor = nodeColor.opt2;
    }
    const outlineColor = get('Node Outline Color');
    if (outlineColor) {
      if (outlineColor.opt1 && outlineColor.opt1.startsWith('#')) formattingSettings.outlineColor = outlineColor.opt1;
      if (outlineColor.opt2 && outlineColor.opt2.startsWith('#')) formattingSettings.outlineHoverColor = outlineColor.opt2;
    }
    const lineColorSetting = get('Line Color');
    if (lineColorSetting) {
      if (lineColorSetting.opt1 && lineColorSetting.opt1.startsWith('#')) formattingSettings.lineColor = lineColorSetting.opt1;
      if (lineColorSetting.opt2 && lineColorSetting.opt2.startsWith('#')) formattingSettings.lineHoverColor = lineColorSetting.opt2;
    }
    const bgColor = get('Chart Background Color');
    if (bgColor && bgColor.opt1 && bgColor.opt1.startsWith('#')) {
      formattingSettings.backgroundColor = bgColor.opt1;
      document.documentElement.style.setProperty('--white', bgColor.opt1);
    }
    
    // --- Info Panel ---
    const infoPanelOn = get('Info Panel On');
    if (infoPanelOn) formattingSettings.infoPanelOn = toBool(infoPanelOn.opt1);
    const showColorCat = get('Show Color Legend Category Name');
    if (showColorCat) {
      formattingSettings.showColorLegendCategoryName = toBool(showColorCat.opt1);
      if (showColorCat.opt2) formattingSettings.colorLegendCategoryTitle = showColorCat.opt2;
    }
    const showShapeCat = get('Show Shape Legend Category Name');
    if (showShapeCat) {
      formattingSettings.showShapeLegendCategoryName = toBool(showShapeCat.opt1);
      if (showShapeCat.opt2) formattingSettings.shapeLegendCategoryTitle = showShapeCat.opt2;
    }
    const showTotalIn = get('Show Total IN Connection Value');
    if (showTotalIn) {
      formattingSettings.showTotalInValue = toBool(showTotalIn.opt1);
      if (showTotalIn.opt2) formattingSettings.totalInTitle = showTotalIn.opt2;
    }
    const showTotalOut = get('Show Total OUT Connection Value');
    if (showTotalOut) {
      formattingSettings.showTotalOutValue = toBool(showTotalOut.opt1);
      if (showTotalOut.opt2) formattingSettings.totalOutTitle = showTotalOut.opt2;
    }
    const showConnTitle = get('Show Connections Box Title');
    if (showConnTitle) {
      formattingSettings.showConnectionsBoxTitle = toBool(showConnTitle.opt1);
      if (showConnTitle.opt2) formattingSettings.connectionsBoxTitle = showConnTitle.opt2;
    }
    
    // --- Labels ---
    const showNodeLabels = get('Show Node Labels');
    if (showNodeLabels) {
      formattingSettings.showNodeLabels = showNodeLabels.opt1.toLowerCase().includes('always') ? 'always' : 'hover';
    }
    const showConnLabels = get('Show Connection Labels');
    if (showConnLabels) {
      const val = showConnLabels.opt1.toLowerCase();
      if (val.includes('never')) formattingSettings.showConnectionLabels = 'never';
      else if (val.includes('always')) formattingSettings.showConnectionLabels = 'always';
      else formattingSettings.showConnectionLabels = 'hover';
    }
    const valuePrefix = get('Connection Value Prefix');
    if (valuePrefix) formattingSettings.connectionValuePrefix = valuePrefix.opt1;
    
    // --- Color Legend ---
    colorLegendEntries = [];
    for (let i = 1; i <= 12; i++) {
      const entry = get(`Color Legend - Value ${i}`);
      if (entry) {
        colorLegendEntries.push({
          enabled: toBool(entry.opt1),
          label: entry.opt2 || '',
          color: entry.opt3 || ''
        });
      }
    }
    
    // --- Shape Legend ---
    shapeLegendEntries = [];
    const shapeNames = ['Circle', 'Square', 'Diamond', 'Triangle'];
    const shapeKeys = ['circle', 'square', 'diamond', 'triangle'];
    shapeNames.forEach((name, i) => {
      const entry = get(`Shape Legend - ${name}`);
      if (entry) {
        shapeLegendEntries.push({
          enabled: toBool(entry.opt1),
          label: entry.opt2 || '',
          shape: shapeKeys[i]
        });
      }
    });
    // Build shape category map
    shapeCategoryMap.clear();
    shapeLegendEntries.forEach(e => {
      if (e.enabled && e.label) shapeCategoryMap.set(e.label, e.shape);
    });
    
    // --- Title ---
    const chartTitle = get('Chart Title');
    if (chartTitle) {
      formattingSettings.chartTitleEnabled = toBool(chartTitle.opt1);
      if (chartTitle.opt2) formattingSettings.chartTitle = chartTitle.opt2;
    }
    const chartSubtitle = get('Chart Subtitle');
    if (chartSubtitle) {
      formattingSettings.chartSubtitleEnabled = toBool(chartSubtitle.opt1);
      if (chartSubtitle.opt2) formattingSettings.chartSubtitle = chartSubtitle.opt2;
    }
    
    // --- Images ---
    const logoImage = get('Chart Logo Image');
    if (logoImage) {
      formattingSettings.logoEnabled = toBool(logoImage.opt1);
      if (logoImage.opt2) formattingSettings.logoUrl = logoImage.opt2;
    }
    const bgImage = get('Background Image');
    if (bgImage) {
      formattingSettings.backgroundImageEnabled = toBool(bgImage.opt1);
      if (bgImage.opt2) formattingSettings.backgroundImageUrl = bgImage.opt2;
    }
    
    // --- Sharing ---
    const sharing = get('Show Sharing Option');
    if (sharing) {
      formattingSettings.sharingEnabled = toBool(sharing.opt1);
      if (sharing.opt2) formattingSettings.sharingUrl = sharing.opt2;
    }
  }

  /************************************************************************
   * LOAD SESSION
   ************************************************************************/
  function loadSession(entitiesData, connectionsData) {
    // Clean headers
    entitiesData.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });
    
    connectionsData.forEach(r => { 
      Object.keys(r).forEach(k => { 
        if (k !== k.trim()) { 
          r[k.trim()] = r[k]; 
          delete r[k]; 
        } 
      }); 
    });

    // Check if Entities.csv has Views column
    if (entitiesData.length > 0) {
      hasViewsColumn = 'Views' in entitiesData[0];
    }

    // Create nodes
    nodes = entitiesData.map((d, i) => createNodeFromData(d, i));
    nodeById = new Map(nodes.map(n => [n.id, n]));

    // Build entity views map if we have views
    if (hasViewsColumn) {
      buildEntityViewsMap(entitiesData);
      buildViewEntitiesCache();
    }

    // Create links
    processLinksData(connectionsData);

    // Build adjacency and compute connection value totals
    buildAdjacency();
    computeConnectionValueTotals();

    // Apply any manually-saved node positions (overrides sheet X/Y)
    applySavedPositions();

    nameIndex = nodes.map(n => n.name);

    // Calculate node sizes
    updateNodeSizes();

    // Determine layout: if most nodes have grid coords, use static grid;
    // otherwise let physics handle positioning
    const gridCount = nodes.filter(n => n.hasGridCoords).length;
    const isStaticLayout = gridCount > nodes.length * 0.5;

    // Compute initial grid layout (positions grid nodes, scales radii)
    computeGridLayout();

    // Load images
    loadAllImages();
    
    // Load background image if enabled
    loadBackgroundImage();

    // Preload all story mode view images immediately
    preloadStoryImages();

    // Apply physics settings from formatting
    CONFIG.force.linkStrength = getForceValue(formattingSettings.attractStrength, 'attract');
    CONFIG.force.linkDistance = getForceValue(formattingSettings.attractStrength, 'linkDistance');
    CONFIG.force.chargeStrength = getForceValue(formattingSettings.repelStrength, 'repel');
    CONFIG.force.collisionPadding = getForceValue(formattingSettings.paddingStrength, 'padding');

    // Start physics (for non-grid nodes)
    updatePhysics(isStaticLayout);

    // Update story button visibility
    updateStoryButtonVisibility();
    
    // Update UI elements from formatting
    updateLogoFromSettings();
    updateTitleFromSettings();
    updateShareFromSettings();
    updateInfoPanelVisibility();

    // Update legend after nodes are loaded
    updateCategoryColors();
    updateLegend();
    updateShapeLegend();
    
    // FORCE legend update again to be absolutely certain
    setTimeout(() => {
      updateCategoryColors();
      updateLegend();
      updateShapeLegend();
      computeGridLayout();
      render();
    }, 150);

    loadingOverlay.style.display = 'none';
  }

  /************************************************************************
   * GRID LAYOUT — maps grid coordinates to canvas pixels
   * Grid is 60×60: x ∈ [-30,30], y ∈ [-30,30], (0,0) = centre
   * Positive Y = up (canvas Y is inverted)
   ************************************************************************/
  function computeGridLayout() {
    if (nodes.length === 0) return;

    const cw = canvas.width / devicePixelRatio;
    const ch = canvas.height / devicePixelRatio;
    const legendPad = getLegendPadding();
    const pad = CONFIG.gridPadding;

    const availW = cw - pad * 2;
    const availH = ch - pad * 2 - legendPad;

    // One grid unit = gridScale pixels; fit 60 units into the smaller axis
    gridScale = Math.min(availW, availH) / CONFIG.gridUnits;

    // UI scale: how big things look relative to a ~900px-wide reference
    uiScale = Math.min(availW, availH) / CONFIG.baseChartWidth;

    const centerX = cw / 2;
    const centerY = pad + legendPad + availH / 2;
    gridCenterX = centerX;
    gridCenterY = centerY;

    nodes.forEach(n => {
      // Only reposition nodes that have grid coordinates
      if (n.hasGridCoords) {
        const px = centerX + n.gridX * gridScale;
        const py = centerY - n.gridY * gridScale;   // flip Y
        n.x = px;
        n.y = py;
        n.fx = px;
        n.fy = py;
      }

      // Scale radius for ALL nodes (grid + physics)
      n.r = (n.baseR || formattingSettings.minNodeSize)
            * formattingSettings.sizeScale
            * uiScale;
    });

    // Update collision force if simulation is active
    if (simulation && simulation.force('collision')) {
      simulation.force('collision').radius(d => d.r + CONFIG.force.collisionPadding);
    }
  }

  /************************************************************************
   * GRID <-> PIXEL HELPERS + POSITION PERSISTENCE
   ************************************************************************/
  function gridToPixel(gx, gy) {
    return { x: gridCenterX + gx * gridScale, y: gridCenterY - gy * gridScale };
  }
  function pixelToGrid(px, py) {
    if (!gridScale) return { gx: 0, gy: 0 };
    return { gx: (px - gridCenterX) / gridScale, gy: (gridCenterY - py) / gridScale };
  }

  // Freeze every currently-unfixed node at its present position (mode 'freezeAfterInitial')
  function freezeAllNodes() {
    nodes.forEach(n => {
      if (!n.hasGridCoords) {
        const g = pixelToGrid(n.x, n.y);
        n.gridX = g.gx;
        n.gridY = g.gy;
        n.hasGridCoords = true;
        n.fx = n.x;
        n.fy = n.y;
      }
    });
    if (simulation) simulation.stop();
  }

  // Apply manually-saved grid positions (overrides any X/Y from the sheet)
  function applySavedPositions() {
    if (!savedPositions || savedPositions.size === 0) return;
    nodes.forEach(n => {
      if (savedPositions.has(n.name)) {
        const p = savedPositions.get(n.name);
        n.gridX = p.x;
        n.gridY = p.y;
        n.hasGridCoords = true;
      }
    });
  }

  function rebuildShapeCategoryMap() {
    shapeCategoryMap.clear();
    shapeLegendEntries.forEach(e => {
      if (e.enabled && e.label) shapeCategoryMap.set(e.label, e.shape);
    });
  }

  function sanitizeFilename(name) {
    return (String(name || 'chart').trim() || 'chart')
      .replace(/[^a-z0-9\-_ ]/gi, '')
      .replace(/\s+/g, '-')
      .slice(0, 80) || 'chart';
  }

  // Apply a parsed saved-chart data object to the live viewer state.
  // Used by both the standalone boot path and the tool's "load saved chart".
  function applyChartData(data) {
    if (!data) return;
    if (data.settings) Object.assign(formattingSettings, data.settings);
    if (Array.isArray(data.colorLegend)) colorLegendEntries = data.colorLegend;
    if (Array.isArray(data.shapeLegend)) { shapeLegendEntries = data.shapeLegend; rebuildShapeCategoryMap(); }
    if (data.physicsMode) physicsMode = data.physicsMode;
    if (data.title) { chartName = data.title; document.title = data.title; }
    if (data.urls) {
      CONFIG.entitiesUrl = data.urls.entities || '';
      CONFIG.connectionsUrl = data.urls.connections || '';
      CONFIG.viewsUrl = data.urls.views || '';
    }
    CONFIG.formattingUrl = ''; // formatting now lives in settings, never a sheet
    if (data.positions) {
      savedPositions = new Map(Object.entries(data.positions).map(([k, v]) => [k, { x: v.x, y: v.y }]));
    }
    if (formattingSettings.backgroundColor) {
      document.documentElement.style.setProperty('--white', formattingSettings.backgroundColor);
    }
  }

    function createNodeFromData(d, i) {
        const id = d['Entity Name'] ? String(d['Entity Name']).trim() : `__P_${i}`;
        
        const show = d['Show'] === undefined ? true : (String(d['Show']).toUpperCase() === 'TRUE' || d['Show'] === '1' || d['Show'] === true);

        // Force all nodes to start without grid coordinates. 
        // Ignores the spreadsheet entirely.
        const hasGridCoords = false;
        const gridX = 0;
        const gridY = 0;

        const cw = canvas.width / devicePixelRatio;
        const ch = canvas.height / devicePixelRatio;
        const x = Math.random() * cw;
        const y = Math.random() * ch;
        
        return {
        id, 
        name: id, 
        raw: d, 
        show,
        hasGridCoords,
        gridX,
        gridY,
        image: d['Image'] ? d['Image'].trim() : null, 
        imageBitmap: null,
        x, 
        y,
        fx: null,
        fy: null,
        vx: 0, 
        vy: 0, 
        baseR: formattingSettings.minNodeSize,
        r: formattingSettings.minNodeSize
        };
    }

  function processLinksData(connectionsData) {
    _lineSizeRange = null; // Reset line sizing cache
    const tmpLinks = connectionsData.map(r => {
      const rawValue = (r['Value']||'').toString().trim().replace(/[, ]/g, '');
      const parsedValue = parseFloat(rawValue);
      return {
        sourceName: (r['A']||'').toString().trim(),
        targetName: (r['B']||'').toString().trim(),
        connectionValue: !isNaN(parsedValue) ? parsedValue : null,
        source: (r['Source']||'').toString().trim(),
        note: (r['Note']||'').toString().trim(),
        text: (r['Text']||'').toString().trim()
      };
    }).filter(l => l.sourceName && l.targetName);

    // Add missing nodes from links
    tmpLinks.forEach(l => {
      if (!nodeById.has(l.sourceName)) {
        const n = { 
          id: l.sourceName, 
          name: l.sourceName, 
          raw: {}, 
          show: true,
          hasGridCoords: false,
          gridX: 0,
          gridY: 0,
          image: null, 
          imageBitmap: null, 
          x: Math.random() * (canvas.width/(devicePixelRatio)), 
          y: Math.random() * (canvas.height/(devicePixelRatio)), 
          fx: null,
          fy: null,
          vx: 0, 
          vy: 0, 
          baseR: formattingSettings.minNodeSize,
          r: formattingSettings.minNodeSize
        };
        nodes.push(n);
        nodeById.set(n.id, n);
      }
      if (!nodeById.has(l.targetName)) {
        const n = { 
          id: l.targetName, 
          name: l.targetName, 
          raw: {}, 
          show: true,
          hasGridCoords: false,
          gridX: 0,
          gridY: 0,
          image: null, 
          imageBitmap: null, 
          x: Math.random() * (canvas.width/(devicePixelRatio)), 
          y: Math.random() * (canvas.height/(devicePixelRatio)), 
          fx: null,
          fy: null,
          vx: 0, 
          vy: 0, 
          baseR: formattingSettings.minNodeSize,
          r: formattingSettings.minNodeSize
        };
        nodes.push(n);
        nodeById.set(n.id, n);
      }
    });

    // Build links with references to node objects
    links = tmpLinks.map(l => ({
      source: nodeById.get(l.sourceName),
      target: nodeById.get(l.targetName),
      connectionValue: l.connectionValue,
      sourceUrl: l.source,
      note: l.note,
      text: l.text
    })).filter(l => l.source && l.target);
  }

  function buildEntityViewsMap(entitiesData) {
    entityViewsMap.clear();
    entityHighlightsMap.clear();
    
    entitiesData.forEach(row => {
      const entityName = String(row['Entity Name'] || '').trim();
      const viewsStr = String(row['Views'] || '').trim();
      const highlightStr = String(row['View Highlight'] || '').trim();
      
      if (entityName && viewsStr) {
        const viewIds = viewsStr.split(',').map(id => id.trim()).filter(id => id);
        entityViewsMap.set(entityName, viewIds);
      }
      
      if (entityName && highlightStr) {
        const highlightViewIds = highlightStr.split(',').map(id => id.trim()).filter(id => id);
        entityHighlightsMap.set(entityName, new Set(highlightViewIds));
      }
    });
  }

  function buildViewEntitiesCache() {
    viewEntitiesCache.clear();
    
    // Initialize cache for all views
    sortedViewIds.forEach(viewId => {
      viewEntitiesCache.set(viewId, []);
    });

    // Populate cache
    entityViewsMap.forEach((viewIds, entityId) => {
      viewIds.forEach(viewId => {
        // Only add if view exists in viewsById
        if (viewsById.has(viewId)) {
          const entityList = viewEntitiesCache.get(viewId);
          if (entityList) {
            entityList.push(entityId);
          }
        }
      });
    });
  }

  function updateStoryButtonVisibility() {
    const shouldShow = viewsData.length > 0 && hasViewsColumn;
    storyBtn.style.display = shouldShow ? 'block' : 'none';
  }

  function buildAdjacency() {
    adjacency.clear();
    connectionSources.clear();
    connectionTexts.clear();
    
    links.forEach(l => {
      const sId = l.source.id;
      const tId = l.target.id;
      
      if (!adjacency.has(sId)) adjacency.set(sId, new Set());
      if (!adjacency.has(tId)) adjacency.set(tId, new Set());
      adjacency.get(sId).add(tId);
      adjacency.get(tId).add(sId);
      
      // Track source URLs for connections
      if (l.sourceUrl) {
        if (!connectionSources.has(sId)) connectionSources.set(sId, new Map());
        if (!connectionSources.has(tId)) connectionSources.set(tId, new Map());
        connectionSources.get(sId).set(tId, l.sourceUrl);
        connectionSources.get(tId).set(sId, l.sourceUrl);
      }
      
      // Track text descriptions for connections
      if (l.text) {
        if (!connectionTexts.has(sId)) connectionTexts.set(sId, new Map());
        if (!connectionTexts.has(tId)) connectionTexts.set(tId, new Map());
        connectionTexts.get(sId).set(tId, l.text);
        connectionTexts.get(tId).set(sId, l.text);
      }
    });
  }

  function computeConnectionValueTotals() {
    connectionOutTotals.clear();
    connectionInTotals.clear();
    links.forEach(l => {
      const sId = l.source.id;
      const tId = l.target.id;
      const val = l.connectionValue;
      if (val != null && !isNaN(val)) {
        connectionOutTotals.set(sId, (connectionOutTotals.get(sId) || 0) + val);
        connectionInTotals.set(tId, (connectionInTotals.get(tId) || 0) + val);
      }
    });
  }

  function loadBackgroundImage() {
    if (formattingSettings.backgroundImageEnabled && formattingSettings.backgroundImageUrl) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { backgroundImageObj = img; render(); };
      img.onerror = () => { backgroundImageObj = null; };
      img.src = formattingSettings.backgroundImageUrl;
    } else {
      backgroundImageObj = null;
    }
  }

  function updateLogoFromSettings() {
    const logoEl = document.getElementById('logo');
    const logoImg = logoEl ? logoEl.querySelector('img') : null;
    if (!formattingSettings.logoEnabled) {
      if (logoEl) logoEl.style.display = 'none';
    } else {
      if (logoEl) logoEl.style.display = 'block';
      if (logoImg && formattingSettings.logoUrl) logoImg.src = formattingSettings.logoUrl;
    }
  }

  function updateTitleFromSettings() {
    const titleEl = document.getElementById('chart-title');
    const subtitleEl = document.getElementById('chart-subtitle');
    if (titleEl) {
      titleEl.style.display = formattingSettings.chartTitleEnabled && formattingSettings.chartTitle ? 'block' : 'none';
      titleEl.textContent = formattingSettings.chartTitle || '';
    }
    if (subtitleEl) {
      subtitleEl.style.display = formattingSettings.chartSubtitleEnabled && formattingSettings.chartSubtitle ? 'block' : 'none';
      subtitleEl.textContent = formattingSettings.chartSubtitle || '';
    }
  }

  function updateShareFromSettings() {
    const shareBtn = document.getElementById('share-btn');
    if (shareBtn) {
      shareBtn.style.display = formattingSettings.sharingEnabled ? 'flex' : 'none';
    }
  }

  function updateInfoPanelVisibility() {
    const panel = document.getElementById('info-panel');
    if (!panel) return;
    if (formattingSettings.infoPanelOn) {
      const isMobile = window.matchMedia('(max-width: 700px)').matches;
      panel.style.display = isMobile ? 'grid' : 'flex';
    } else {
      panel.style.display = 'none';
    }
    setTimeout(() => {
      resizeCanvas();
      if (nodes.length > 0) computeGridLayout();
      render();
    }, 50);
  }

  /************************************************************************
   * STORY MODE
   ************************************************************************/
  function enterStoryMode() {
    if (sortedViewIds.length === 0) return;
    
    isStoryMode = true;
    currentViewIndex = 0;
    
    // Clear selection
    selectedNode = null;
    clearInfoPanel();
    
    // Hide normal UI elements
    storyBtn.style.display = 'none';
    nodeInfo.style.display = 'none';
    document.getElementById('node-links').style.display = 'none';
    connectionsBox.style.display = 'none';
    
    // Hide search controls and clear button in story mode
    document.getElementById('controls').classList.add('story-mode-hide');
    clearBtn.classList.add('story-mode-hide');
    
    // Show story UI elements
    storyNavContainer.classList.add('active');
    viewContent.classList.add('active');
    
    // Display current view
    updateStoryModeUI();
    
    // Animate pan & zoom to first view's nodes
    animateToViewNodes();
  }

  function exitStoryMode() {
    isStoryMode = false;
    
    // Clear selection
    selectedNode = null;
    hideEntityModal();
    
    // Reset zoom and pan
    zoomLevel = 1.0;
    panX = 0;
    panY = 0;
    
    // Show normal UI elements
    updateStoryButtonVisibility();
    nodeInfo.style.display = 'block';
    document.getElementById('node-links').style.display = 'block';
    connectionsBox.style.display = 'block';
    
    // Show search controls and clear button when exiting story mode
    document.getElementById('controls').classList.remove('story-mode-hide');
    clearBtn.classList.remove('story-mode-hide');
    
    // Hide story UI elements
    storyNavContainer.classList.remove('active');
    viewContent.classList.remove('active');
    
    // Clear info panel
    clearInfoPanel();
    render();
  }

  function navigateView(direction) {
    if (direction === 'prev' && currentViewIndex > 0) {
      currentViewIndex--;
    } else if (direction === 'next' && currentViewIndex < sortedViewIds.length - 1) {
      currentViewIndex++;
    }
    
    // Clear selection and hide modal when navigating
    selectedNode = null;
    hideEntityModal();
    
    updateStoryModeUI();
    
    // Animate pan & zoom to focus on current view nodes
    animateToViewNodes();
  }
  
  function animateToViewNodes() {
    const viewId = sortedViewIds[currentViewIndex];
    const viewEntities = new Set(viewEntitiesCache.get(viewId) || []);
    
    // Filter nodes in current view
    const viewNodes = nodes.filter(n => viewEntities.has(n.id));
    
    if (viewNodes.length === 0) {
      render();
      return;
    }
    
    // Calculate bounding box of view nodes including their radii
    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    
    viewNodes.forEach(n => {
      const radius = n.r || 15; // Use actual node radius
      minX = Math.min(minX, n.x - radius);
      maxX = Math.max(maxX, n.x + radius);
      minY = Math.min(minY, n.y - radius);
      maxY = Math.max(maxY, n.y + radius);
    });
    
    const width = maxX - minX;
    const height = maxY - minY;
    const dataCenterX = (minX + maxX) / 2;
    const dataCenterY = (minY + maxY) / 2;
    
    // Calculate target zoom to fit all nodes with padding
    const canvasWidth = canvas.width / devicePixelRatio;
    const canvasHeight = canvas.height / devicePixelRatio;
    const canvasCenterX = canvasWidth / 2;
    
    // In Story Mode, account for legend space at top
    const legendSpace = 50; // Legend height + margin
    const effectiveHeight = canvasHeight - legendSpace;
    const canvasCenterY = legendSpace + (effectiveHeight / 2); // Shift center down
    
    const padding = 70; // padding in pixels
    
    const targetZoomX = width > 0 ? (canvasWidth - padding * 2) / width : 1.5;
    const targetZoomY = height > 0 ? (effectiveHeight - padding * 2) / height : 1.5;
    let targetZoom = Math.min(targetZoomX, targetZoomY);
    
    // Clamp zoom to configured limits
    targetZoom = Math.max(CONFIG.zoomMin, Math.min(CONFIG.zoomMax, targetZoom));
    
    // Calculate target pan to center the nodes
    // Based on the transform: screen = (data - canvasCenter) * zoom + pan + canvasCenter
    // To center data at canvasCenter: pan = -(data - canvasCenter) * zoom
    const targetPanX = -(dataCenterX - canvasCenterX) * targetZoom;
    const targetPanY = -(dataCenterY - canvasCenterY) * targetZoom;
    
    // Store starting values
    const startZoom = zoomLevel;
    const startPanX = panX;
    const startPanY = panY;
    
    // Animation parameters
    const duration = 600; // milliseconds
    const startTime = Date.now();
    
    function animate() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      
      // Ease-in-out function for smooth animation
      const eased = progress < 0.5 
        ? 2 * progress * progress 
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;
      
      // Interpolate zoom and pan
      zoomLevel = startZoom + (targetZoom - startZoom) * eased;
      panX = startPanX + (targetPanX - startPanX) * eased;
      panY = startPanY + (targetPanY - startPanY) * eased;
      
      render();
      
      if (progress < 1) {
        requestAnimationFrame(animate);
      }
    }
    
    animate();
  }

  function updateStoryModeUI() {
    const viewId = sortedViewIds[currentViewIndex];
    const view = viewsById.get(viewId);
    
    if (!view) return;
    
    // Update progress
    viewProgress.textContent = `Page ${currentViewIndex + 1} of ${sortedViewIds.length}`;
    
    // Update title
    viewTitle.textContent = view.title;
    
    // Update image
    if (view.image) {
      viewImage.src = view.image;
      viewImage.style.display = 'block';
    } else {
      viewImage.style.display = 'none';
    }
    
    // Update text
    viewText.innerHTML = processHtmlLinks(view.text);
    
    // Update navigation buttons
    storyPrevBtn.disabled = currentViewIndex === 0;
    storyNextBtn.disabled = currentViewIndex === sortedViewIds.length - 1;
  }

  function showEntityModal(node) {
    entityModal.classList.add('active');
    populateEntityModal(node);
  }

  function hideEntityModal() {
    entityModal.classList.remove('active');
    selectedNode = null;
  }

  function populateEntityModal(d) {
    const desc = (d.raw && (d.raw['Description'] || '')) || '';
    const colorCat = (d.raw && (d.raw['Color Legend Category'] || '')) || '';

    // Build category/value summary for modal
    let catHtml = '';
    if (formattingSettings.showColorLegendCategoryName && colorCat) {
      const title = formattingSettings.colorLegendCategoryTitle || 'Category';
      catHtml = `<div style="font-size: 16px; font-weight: bold; margin-top: 6px;">${title}: ${colorCat}</div>`;
    }
    
    let valHtml = '';
    if (formattingSettings.showTotalInValue) {
      const totalIn = connectionInTotals.get(d.id) || 0;
      if (totalIn > 0) valHtml += `<div style="font-size:14px;margin-top:4px;"><b>${formattingSettings.totalInTitle}:</b> ${formatValue(totalIn, formattingSettings.connectionValuePrefix)}</div>`;
    }
    if (formattingSettings.showTotalOutValue) {
      const totalOut = connectionOutTotals.get(d.id) || 0;
      if (totalOut > 0) valHtml += `<div style="font-size:14px;margin-top:4px;"><b>${formattingSettings.totalOutTitle}:</b> ${formatValue(totalOut, formattingSettings.connectionValuePrefix)}</div>`;
    }

    entityModalTitle.html(`
      <div style="display:flex; align-items:center; gap:8px; font-size:24px; font-weight:700;">
        <span>${d.name}</span>
        ${d.image ? `<img src="${d.image}" style="width:40px; height:40px; object-fit:cover; border-radius:50%;">` : ''}
      </div>
      ${catHtml}
      ${valHtml}
      ${desc ? `<div style="font-size: 14px; font-weight: normal; max-height: 350px; overflow-y: auto; margin-top: 6px;">${processHtmlLinks(desc.replace(/\n/g, '<br>'))}</div>` : ''}

    `);

    // Get current view's entities for filtering connections
    const currentViewId = sortedViewIds[currentViewIndex];
    const currentViewEntities = new Set(viewEntitiesCache.get(currentViewId) || []);

    const conns = Array.from(adjacency.get(d.id) || []).slice();
    
    // Filter connections to only show those in current view
    const filteredConns = conns.filter(name => currentViewEntities.has(name));
    
    filteredConns.sort((a,b) => a.localeCompare(b, undefined, {sensitivity:'base'}));
    entityModalConnections.innerHTML = '';
    
    if (filteredConns.length === 0) {
      entityModalConnections.innerHTML = '<div class="muted" style="margin-top: 8px;">No connections in this view</div>';
      return;
    }
    
    const connBox = document.createElement('div');
    connBox.style.marginTop = '8px';
    connBox.style.background = 'var(--light-grey)';
    connBox.style.borderRadius = '6px';
    connBox.style.padding = '6px';
    connBox.style.border = '1px solid var(--shadow-grey)';
    connBox.style.maxHeight = '300px';
    connBox.style.overflow = 'auto';
    
    const frag = document.createDocumentFragment();
    const nodeSourceMap = connectionSources.get(d.id);
    const nodeTextsMap = connectionTexts.get(d.id);
    
    filteredConns.forEach(name => {
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.style.display = 'flex';
      item.style.alignItems = 'center';
      item.style.justifyContent = 'space-between';
      item.style.gap = '8px';
      
      const nameSpan = document.createElement('span');
      // Display the text description if available, otherwise fall back to node name
      const textDesc = nodeTextsMap ? nodeTextsMap.get(name) : null;
      nameSpan.innerHTML = processHtmlLinks(textDesc || name);
      nameSpan.style.flex = '1';
      nameSpan.style.cursor = 'pointer';
      nameSpan.addEventListener('click', () => {
        const targetNode = nodeById.get(name);
        if (targetNode) {
          selectedNode = targetNode;
          populateEntityModal(targetNode);
          render();
        }
      });
      item.appendChild(nameSpan);
      
      const sourceUrl = nodeSourceMap ? nodeSourceMap.get(name) : null;
      if (sourceUrl) {
        const sourceIcon = document.createElement('a');
        sourceIcon.href = normalizeUrl(sourceUrl) || '#';
        sourceIcon.target = '_blank';
        sourceIcon.rel = 'noopener';
        sourceIcon.innerHTML = '➜]';
        sourceIcon.style.fontSize = '16px';
        sourceIcon.style.textDecoration = 'none';
        sourceIcon.style.cursor = 'pointer';
        sourceIcon.style.flexShrink = '0';
        sourceIcon.title = 'Source';
        sourceIcon.addEventListener('click', (e) => {
          e.stopPropagation();
        });
        item.appendChild(sourceIcon);
      }
      
      
      // Add hover handlers to highlight connection in chart
      item.addEventListener('mouseenter', () => {
        hoveredConnection = { source: d.id, target: name };
        render();
      });
      item.addEventListener('mouseleave', () => {
        hoveredConnection = null;
        render();
      });
      frag.appendChild(item);
    });
    
    connBox.appendChild(frag);
    entityModalConnections.appendChild(connBox);
  }

  /************************************************************************
   * IMAGE LOADING
   ************************************************************************/
  function loadAllImages() {
    const imgNodes = nodes.filter(n => n.image && CONFIG.showImages);
    Promise.allSettled(imgNodes.map(n => loadImage(n))).then(() => render());
  }

  function loadImage(node) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        node.imageBitmap = img;
        resolve();
      };
      img.onerror = () => {
        // Retry with crossOrigin for CORS-enabled servers
        const img2 = new Image();
        img2.crossOrigin = 'anonymous';
        img2.onload = () => { node.imageBitmap = img2; resolve(); };
        img2.onerror = () => { node.imageBitmap = null; resolve(); };
        img2.src = node.image;
      };
      img.src = node.image;
    });
  }

  /************************************************************************
   * PRELOAD STORY MODE VIEW IMAGES
   ************************************************************************/
  const storyImageCache = new Map();

  function preloadStoryImages() {
    viewsData.forEach(v => {
      if (v.image && !storyImageCache.has(v.image)) {
        const img = new Image();
        img.src = v.image;
        storyImageCache.set(v.image, img);
      }
    });
  }

  /************************************************************************
   * PHYSICS SIMULATION
   ************************************************************************/
  function updatePhysics(isStaticLayout) {
    if (simulation) simulation.stop();
    
    const visibleNodes = nodes.filter(n => n.show);
    const visibleLinks = links.filter(l => l.source.show && l.target.show);
    
    if (visibleNodes.length === 0) {
      render();
      return;
    }
    
    const cw = canvas.width / devicePixelRatio;
    const ch = canvas.height / devicePixelRatio;
    const nodeCount = visibleNodes.length;
    
    // Scale link distance with node count so larger graphs spread out more
    const scaledLinkDist = CONFIG.force.linkDistance * Math.max(1, Math.sqrt(nodeCount / 15));
    
    simulation = d3.forceSimulation(visibleNodes)
      // Link force: pulls connected nodes toward target distance
      .force('link', d3.forceLink(visibleLinks)
        .id(d => d.id)
        .distance(scaledLinkDist)
        .strength(CONFIG.force.linkStrength))
      // Many-body force: repulsion between all node pairs (Coulomb-like)
      // distanceMax limits the range so far-away nodes don't repel as strongly
      .force('charge', d3.forceManyBody()
        .strength(CONFIG.force.chargeStrength)
        .distanceMax(scaledLinkDist * 4)
        .distanceMin(10))
      // Gentle centering: pulls nodes toward canvas center (prevents drift)
      .force('x', d3.forceX(cw / 2).strength(0.03))
      .force('y', d3.forceY(ch / 2).strength(0.03))
      // Collision: prevents node overlap with padding
      .force('collision', d3.forceCollide()
        .radius(d => d.r + CONFIG.force.collisionPadding)
        .strength(0.8)
        .iterations(2))
      // Simulation parameters
      .velocityDecay(CONFIG.force.velocityDecay)
      .alphaDecay(0.06)  
      .alphaMin(0.0005)
      .on('tick', () => {
        visibleNodes.forEach(n => {
          n.x = Math.max(n.r + PADDING, Math.min(cw - n.r - PADDING, n.x));
          n.y = Math.max(n.r + PADDING, Math.min(ch - n.r - PADDING, n.y));
          
          // Track physics-positioned nodes
          if (!n.hasGridCoords) {
            n.physicsX = n.x;
            n.physicsY = n.y;
          }
        });
        render();
      })
      .on('end', () => {
        // In 'freeze after initial placement' mode, pin every node where
        // physics left it; the simulation then never runs again.
        if (physicsMode === 'freezeAfterInitial') {
          freezeAllNodes();
          render();
        }
      })
;
    
    simulation.alpha(1.0).restart();
  }
  
  /************************************************************************
   * RENDERING HELPERS
   ************************************************************************/
  function clearCanvas() {
    const bgColor = formattingSettings.backgroundColor || '#E3E3E3';
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width/(devicePixelRatio), canvas.height/(devicePixelRatio));
    
    // Draw background image if enabled
    if (backgroundImageObj) {
      const cw = canvas.width / devicePixelRatio;
      const ch = canvas.height / devicePixelRatio;
      const img = backgroundImageObj;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      const scale = Math.max(cw / iw, ch / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = (cw - dw) / 2;
      const dy = (ch - dh) / 2;
      ctx.drawImage(img, dx, dy, dw, dh);
    }
  }

  function applyTransform() {
    const centerX = (canvas.width/(devicePixelRatio)) / 2;
    const centerY = (canvas.height/(devicePixelRatio)) / 2;
    ctx.translate(centerX + panX, centerY + panY);
    ctx.scale(zoomLevel, zoomLevel);
    ctx.translate(-centerX, -centerY);
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawChevronLabel(x1, y1, x2, y2, text, lineColor) {
    if (!text || text.trim() === '') return;
    
    // Calculate curve control point (same as in drawLink)
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Perpendicular offset (15% of distance for subtle curve)
    const offset = dist * 0.15;
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;
    
    // Control point perpendicular to line
    const controlX = midX - (dy / dist) * offset;
    const controlY = midY + (dx / dist) * offset;
    
    // Text measurements - calculate first to know chevron size
    ctx.save();
    const fontSize = 16 / zoomLevel;
    ctx.font = `${fontSize}px Rubik, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const metrics = ctx.measureText(text);
    const textWidth = metrics.width;
    
    // Chevron dimensions
    const padding = 8 / zoomLevel;
    const chevronWidth = textWidth + padding * 2;
    const chevronHeight = fontSize + padding * 2;
    const chevronPointSize = chevronHeight * 0.4;
    
    // Helper function to get point on quadratic bezier curve
    function getPointOnCurve(t) {
      return {
        x: (1-t)*(1-t)*x1 + 2*(1-t)*t*controlX + t*t*x2,
        y: (1-t)*(1-t)*y1 + 2*(1-t)*t*controlY + t*t*y2
      };
    }
    
    // Helper function to get tangent on quadratic bezier curve
    function getTangentOnCurve(t) {
      const tx = 2*(1-t)*(controlX - x1) + 2*t*(x2 - controlX);
      const ty = 2*(1-t)*(controlY - y1) + 2*t*(y2 - controlY);
      const length = Math.sqrt(tx * tx + ty * ty);
      return { x: tx / length, y: ty / length, length };
    }
    
    // Approximate arc length using numerical integration
    function approximateArcLength(t1, t2, steps = 10) {
      let length = 0;
      for (let i = 0; i < steps; i++) {
        const t = t1 + (t2 - t1) * (i / steps);
        const tangent = getTangentOnCurve(t);
        length += tangent.length * (t2 - t1) / steps;
      }
      return length;
    }
    
    // Find approximate t values for the left and right edges of chevron
    // by calculating what portion of the curve the chevron should occupy
    const totalArcLength = approximateArcLength(0, 1);
    const halfChevronWidth = (chevronWidth + chevronPointSize) / 2;
    
    // Find t values that correspond to the desired arc-length positions
    let tLeft = 0.5, tRight = 0.5;
    
    // Use iterative approach to find t values at specific arc lengths
    if (totalArcLength > 0) {
      // For left edge: find t where arc length from 0 to t equals half curve - half chevron
      const targetLeftLength = totalArcLength / 2 - halfChevronWidth;
      if (targetLeftLength > 0) {
        for (let i = 0; i < 5; i++) { // 5 iterations for reasonable accuracy
          const currentLength = approximateArcLength(0, tLeft);
          const error = currentLength - targetLeftLength;
          if (Math.abs(error) < 1) break;
          tLeft -= error / totalArcLength * 0.5; // Adjust t
          tLeft = Math.max(0.1, Math.min(0.9, tLeft)); // Keep in bounds
        }
      }
      
      // For right edge: find t where arc length from 0 to t equals half curve + half chevron
      const targetRightLength = totalArcLength / 2 + halfChevronWidth;
      if (targetRightLength < totalArcLength) {
        for (let i = 0; i < 5; i++) {
          const currentLength = approximateArcLength(0, tRight);
          const error = currentLength - targetRightLength;
          if (Math.abs(error) < 1) break;
          tRight -= error / totalArcLength * 0.5;
          tRight = Math.max(0.1, Math.min(0.9, tRight));
        }
      }
    }
    
    // Get positions for left and right edges along the curve
    const leftPoint = getPointOnCurve(tLeft);
    const rightPoint = getPointOnCurve(tRight);
    
    // Calculate the geometric center of the chevron (midpoint between left and right)
    const curveX = (leftPoint.x + rightPoint.x) / 2;
    const curveY = (leftPoint.y + rightPoint.y) / 2;
    
    // Get tangent at the geometric center for text orientation
    const tCenter = (tLeft + tRight) / 2;
    const centerTangent = getTangentOnCurve(tCenter);
    const ux = centerTangent.x;
    const uy = centerTangent.y;
    
    // Get tangents at left and right for perpendicular offsets
    const leftTangent = getTangentOnCurve(tLeft);
    const rightTangent = getTangentOnCurve(tRight);
    
    // Perpendicular vectors
    const leftPx = -leftTangent.y;
    const leftPy = leftTangent.x;
    const rightPx = -rightTangent.y;
    const rightPy = rightTangent.x;
    
    const halfHeight = chevronHeight / 2;
    
    // Left side vertices using curve position
    const leftTopX = leftPoint.x + leftPx * halfHeight;
    const leftTopY = leftPoint.y + leftPy * halfHeight;
    const leftBottomX = leftPoint.x - leftPx * halfHeight;
    const leftBottomY = leftPoint.y - leftPy * halfHeight;
    
    // Right side vertices using curve position
    const rightTopX = rightPoint.x + rightPx * halfHeight;
    const rightTopY = rightPoint.y + rightPy * halfHeight;
    const rightBottomX = rightPoint.x - rightPx * halfHeight;
    const rightBottomY = rightPoint.y - rightPy * halfHeight;
    
    // Point extends from right edge
    const rightPointX = rightPoint.x + rightTangent.x * chevronPointSize;
    const rightPointY = rightPoint.y + rightTangent.y * chevronPointSize;
    
    // Draw chevron shape
    ctx.fillStyle = lineColor;
